name: Static Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Discover Python targets
        id: py_targets
        shell: bash
        run: |
          set -euo pipefail
          dirs=()
          while IFS= read -r -d '' file; do
            dirs+=("$(dirname "$file")")
          done < <(
            find . -type f -name '*.py' \
              -not -path './.git/*' \
              -not -path './lib/*' \
              -not -path './include/*' \
              -not -path './bin/*' \
              -not -path './.venv/*' \
              -not -path './venv/*' \
              -not -path './node_modules/*' \
              -print0
          )

          if (( ${#dirs[@]} == 0 )); then
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t targets < <(printf '%s\n' "${dirs[@]}" | sort -u)

          if (( ${#targets[@]} == 0 )); then
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf -v joined '%s ' "${targets[@]}"
          echo "has_targets=true" >> "$GITHUB_OUTPUT"
          echo "dirs=${joined% }" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.py_targets.outputs.has_targets == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.py_targets.outputs.has_targets == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.6.5" "bandit==1.7.9"

      - name: Ruff lint
        if: steps.py_targets.outputs.has_targets == 'true'
        run: ruff check ${{ steps.py_targets.outputs.dirs }}

      - name: Bandit security scan
        if: steps.py_targets.outputs.has_targets == 'true'
        run: bandit -r ${{ steps.py_targets.outputs.dirs }} -ll

      - name: Skip when no Python files exist
        if: steps.py_targets.outputs.has_targets != 'true'
        run: echo "No Python sources detected; skipping Ruff and Bandit."
