name: Static Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Python sources
        id: detect_python
        run: |
          if find . -type f -name "*.py" | grep -q .; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.detect_python.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.detect_python.outputs.has_python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Ruff lint
        if: steps.detect_python.outputs.has_python == 'true'
        run: ruff check .

      - name: Bandit security scan
        if: steps.detect_python.outputs.has_python == 'true'
        run: bandit -r . -ll

      - name: Skip when no Python files exist
        if: steps.detect_python.outputs.has_python != 'true'
        run: echo "No Python sources detected; skipping Ruff and Bandit."
