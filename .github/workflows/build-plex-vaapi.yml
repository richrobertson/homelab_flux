name: Build Custom Plex VAAPI Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g., v1.43.0.10492-ubuntu24.04)"
        required: true
        type: string
      push:
        description: "Push to registry"
        required: false
        type: boolean
        default: true
  push:
    paths:
      - "docker-builds/plex-vaapi/**"
      - ".github/workflows/build-plex-vaapi.yml"
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: richrobertson/plex-vaapi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine push mode
        id: pushmode
        env:
          INPUT_PUSH: ${{ github.event.inputs.push }}
          GITHUB_TOKEN_VALUE: ${{ github.token }}
        run: |
          REQUESTED_PUSH="false"
          if [ "${{ github.event_name }}" = "push" ] || [ "$INPUT_PUSH" = "true" ]; then
            REQUESTED_PUSH="true"
          fi

          HAVE_CREDS="false"
          if [ -n "$GITHUB_TOKEN_VALUE" ]; then
            HAVE_CREDS="true"
          fi

          SHOULD_PUSH="false"
          if [ "$REQUESTED_PUSH" = "true" ] && [ "$HAVE_CREDS" = "true" ]; then
            SHOULD_PUSH="true"
          fi

          echo "requested_push=${REQUESTED_PUSH}" >> "$GITHUB_OUTPUT"
          echo "have_registry_creds=${HAVE_CREDS}" >> "$GITHUB_OUTPUT"
          echo "should_push=${SHOULD_PUSH}" >> "$GITHUB_OUTPUT"

      - name: Log in to registry
        if: steps.pushmode.outputs.should_push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Determine image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="$(date +%Y%m%d-%H%M%S)"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full-image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_OUTPUT
          echo "latest-image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Build and push (if requested)
        if: steps.pushmode.outputs.should_push == 'true'
        uses: docker/build-push-action@v5
        with:
          context: docker-builds/plex-vaapi
          push: true
          tags: |
            ${{ steps.meta.outputs.full-image }}
            ${{ steps.meta.outputs.latest-image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build only (dry-run)
        if: steps.pushmode.outputs.should_push != 'true'
        uses: docker/build-push-action@v5
        with:
          context: docker-builds/plex-vaapi
          push: false
          tags: |
            ${{ steps.meta.outputs.full-image }}
          cache-from: type=gha

      - name: Image summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ steps.meta.outputs.full-image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Push requested**: ${{ steps.pushmode.outputs.requested_push }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry credentials present**: ${{ steps.pushmode.outputs.have_registry_creds }}" >> $GITHUB_STEP_SUMMARY
          echo "**Push executed**: ${{ steps.pushmode.outputs.should_push }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.pushmode.outputs.should_push }}" = "true" ]; then
            echo "To deploy in staging:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "# Update apps/staging/plex/plex-values.yaml" >> $GITHUB_STEP_SUMMARY
            echo "image:" >> $GITHUB_STEP_SUMMARY
            echo "  repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
            echo "  tag: ${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.pushmode.outputs.requested_push }}" = "true" ]; then
            echo "Push was requested but registry credentials were not configured; build completed in dry-run mode." >> $GITHUB_STEP_SUMMARY
          fi
