name: Build UniFi Security Reporter Image

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push to registry"
        required: false
        type: boolean
        default: true
  push:
    paths:
      - "docker-builds/unifi-security-reporter/**"
      - ".github/workflows/build-unifi-security-reporter.yml"
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: richrobertson/unifi-security-reporter
  IMAGE_TAG: 0.1.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker-builds/unifi-security-reporter
          push: ${{ github.event_name == 'push' || inputs.push != false }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package publicly pullable
        if: ${{ github.event_name == 'push' || inputs.push != false }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method PATCH \
            /user/packages/container/unifi-security-reporter/visibility \
            --field visibility=public
