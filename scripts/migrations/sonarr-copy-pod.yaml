apiVersion: v1
kind: Pod
metadata:
  name: migrate-sonarr-config
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: copier
      image: alpine:3.20
      command:
        - /bin/sh
        - -c
        - find /dst -mindepth 1 ! -name lost+found -exec rm -rf {} + && cd /src && tar cpf - . | (cd /dst && tar xpf -) && sync && echo copied-sonarr-rbd
      volumeMounts:
        - name: src
          mountPath: /src
          readOnly: true
        - name: dst
          mountPath: /dst
  volumes:
    - name: src
      persistentVolumeClaim:
        claimName: sonarr-config
    - name: dst
      persistentVolumeClaim:
        claimName: sonarr-config-rbd
