apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: csi-cephfs-sc-noenc-test
provisioner: cephfs.csi.ceph.com
parameters:
  clusterID: 1b5c261a-cdac-495a-b046-ea5ff229f33a
  csi.storage.k8s.io/controller-expand-secret-name: csi-cephfs-secret
  csi.storage.k8s.io/controller-expand-secret-namespace: ceph-csi
  csi.storage.k8s.io/controller-publish-secret-name: csi-cephfs-secret
  csi.storage.k8s.io/controller-publish-secret-namespace: ceph-csi
  csi.storage.k8s.io/node-stage-secret-name: csi-cephfs-secret
  csi.storage.k8s.io/node-stage-secret-namespace: ceph-csi
  csi.storage.k8s.io/provisioner-secret-name: csi-cephfs-secret
  csi.storage.k8s.io/provisioner-secret-namespace: ceph-csi
  fsName: kubernetes-prod-cephfs
  pool: kubernetes-prod-cephfs_data
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
