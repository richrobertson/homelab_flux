apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-standard-client-scopes-v6
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider-bootstrap
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: identity-provider-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: configure-standard-scopes
          image: quay.io/keycloak/keycloak:26.6.1
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak.default.svc.cluster.local
            - name: KEYCLOAK_REALM
              value: homelab
            - name: KEYCLOAK_ADMIN_USERNAME
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-password
          command:
            - /bin/bash
            - -ec
          args:
            - |
              cd /opt/keycloak

              csv_first_id() {
                sed -n 's/^"\([^"]*\)".*/\1/p' | head -1
              }

              for i in {1..60}; do
                if bin/kcadm.sh config credentials \
                  --server "${KEYCLOAK_URL}" \
                  --realm master \
                  --user "${KEYCLOAK_ADMIN_USERNAME}" \
                  --password "${KEYCLOAK_ADMIN_PASSWORD}" >/dev/null; then
                  break
                fi
                if [ "${i}" = "60" ]; then
                  echo "Timed out waiting for Keycloak admin login." >&2
                  exit 1
                fi
                sleep 5
              done

              ensure_client_scope() {
                local scope_name="$1"
                local scope_id
                scope_id="$(bin/kcadm.sh get client-scopes -r "${KEYCLOAK_REALM}" --fields id,name --format csv | sed -n "s/^\"\\([^\"]*\\)\",\"${scope_name}\"$/\\1/p" | head -1)"
                if [ -z "${scope_id}" ]; then
                  bin/kcadm.sh create client-scopes -r "${KEYCLOAK_REALM}" \
                    -s "name=${scope_name}" \
                    -s protocol=openid-connect
                  scope_id="$(bin/kcadm.sh get client-scopes -r "${KEYCLOAK_REALM}" --fields id,name --format csv | sed -n "s/^\"\\([^\"]*\\)\",\"${scope_name}\"$/\\1/p" | head -1)"
                fi
                printf '%s' "${scope_id}"
              }

              create_scope_mapper() {
                local scope_id="$1"
                local mapper_name="$2"
                local mapper_type="$3"

                if bin/kcadm.sh get "client-scopes/${scope_id}/protocol-mappers/models" -r "${KEYCLOAK_REALM}" --fields name --format csv | grep -q "\"${mapper_name}\""; then
                  return
                fi

                bin/kcadm.sh create "client-scopes/${scope_id}/protocol-mappers/models" -r "${KEYCLOAK_REALM}" \
                  -s "name=${mapper_name}" \
                  -s protocol=openid-connect \
                  -s "protocolMapper=${mapper_type}" \
                  -s consentRequired=false
              }

              BASIC_SCOPE_ID="$(ensure_client_scope basic)"
              ROLES_SCOPE_ID="$(ensure_client_scope roles)"
              WEB_ORIGINS_SCOPE_ID="$(ensure_client_scope web-origins)"
              ACR_SCOPE_ID="$(ensure_client_scope acr)"

              create_scope_mapper "${BASIC_SCOPE_ID}" sub oidc-sub-mapper
              create_scope_mapper "${BASIC_SCOPE_ID}" auth_time oidc-usersessionmodel-note-mapper
              create_scope_mapper "${ROLES_SCOPE_ID}" "realm roles" oidc-usermodel-realm-role-mapper
              create_scope_mapper "${ROLES_SCOPE_ID}" "client roles" oidc-usermodel-client-role-mapper
              create_scope_mapper "${ROLES_SCOPE_ID}" "audience resolve" oidc-audience-resolve-mapper
              create_scope_mapper "${WEB_ORIGINS_SCOPE_ID}" "allowed web origins" oidc-allowed-origins-mapper
              create_scope_mapper "${ACR_SCOPE_ID}" "acr loa level" oidc-acr-mapper

              OIDC_CLIENTS="account account-console security-admin-console grafana_staging grafana_prod mealie_staging mealie_prod vikunja_staging vikunja_prod nextcloud_staging nextcloud_prod guacamole_staging guacamole_prod"

              for client_id in ${OIDC_CLIENTS}; do
                CLIENT_UUID="$(bin/kcadm.sh get clients -r "${KEYCLOAK_REALM}" -q "clientId=${client_id}" --fields id,clientId --format csv | csv_first_id)"
                if [ -z "${CLIENT_UUID}" ]; then
                  continue
                fi
                for scope_id in "${WEB_ORIGINS_SCOPE_ID}" "${ACR_SCOPE_ID}" "${ROLES_SCOPE_ID}" "${BASIC_SCOPE_ID}"; do
                  bin/kcadm.sh update "clients/${CLIENT_UUID}/default-client-scopes/${scope_id}" -r "${KEYCLOAK_REALM}" >/dev/null 2>&1 || true
                done
              done

              bin/kcadm.sh create clear-realm-cache -r "${KEYCLOAK_REALM}" -s "realm=${KEYCLOAK_REALM}" || true

              echo "Ensured standard OIDC client scopes for ${KEYCLOAK_REALM}."
        - name: configure-account-console-scope-mapping
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak.default.svc.cluster.local
            - name: KEYCLOAK_REALM
              value: homelab
            - name: KEYCLOAK_ADMIN_USERNAME
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-password
          command:
            - python
            - -c
          args:
            - |
              import json
              import os
              import time
              import urllib.parse
              import urllib.request

              base = os.environ["KEYCLOAK_URL"].rstrip("/")
              realm = os.environ["KEYCLOAK_REALM"]
              admin_user = os.environ["KEYCLOAK_ADMIN_USERNAME"]
              admin_password = os.environ["KEYCLOAK_ADMIN_PASSWORD"]

              def request(method, path, token=None, data=None):
                  headers = {}
                  body = None
                  if token:
                      headers["Authorization"] = f"Bearer {token}"
                  if data is not None:
                      body = json.dumps(data).encode()
                      headers["Content-Type"] = "application/json"
                  req = urllib.request.Request(f"{base}{path}", data=body, headers=headers, method=method)
                  with urllib.request.urlopen(req, timeout=20) as response:
                      payload = response.read()
                      if not payload:
                          return None
                      return json.loads(payload.decode())

              token = None
              for attempt in range(60):
                  try:
                      form = urllib.parse.urlencode({
                          "client_id": "admin-cli",
                          "username": admin_user,
                          "password": admin_password,
                          "grant_type": "password",
                      }).encode()
                      req = urllib.request.Request(
                          f"{base}/realms/master/protocol/openid-connect/token",
                          data=form,
                          headers={"Content-Type": "application/x-www-form-urlencoded"},
                          method="POST",
                      )
                      with urllib.request.urlopen(req, timeout=20) as response:
                          token = json.loads(response.read().decode())["access_token"]
                      break
                  except Exception:
                      if attempt == 59:
                          raise
                      time.sleep(5)

              account = request("GET", f"/admin/realms/{realm}/clients?clientId=account", token)[0]
              account_console = request("GET", f"/admin/realms/{realm}/clients?clientId=account-console", token)[0]
              role = request("GET", f"/admin/realms/{realm}/clients/{account['id']}/roles/manage-account", token)
              request("POST", f"/admin/realms/{realm}/clients/{account_console['id']}/scope-mappings/clients/{account['id']}", token, [role])
              mapped = request("GET", f"/admin/realms/{realm}/clients/{account_console['id']}/scope-mappings/clients/{account['id']}", token)
              mapped_names = sorted(item["name"] for item in mapped)
              if "manage-account" not in mapped_names:
                  raise RuntimeError(f"account-console scope mapping missing manage-account: {mapped_names}")

              mapper_configs = {
                  "realm roles": {
                      "introspection.token.claim": "true",
                      "userinfo.token.claim": "true",
                      "multivalued": "true",
                      "id.token.claim": "true",
                      "access.token.claim": "true",
                      "claim.name": "realm_access.roles",
                      "jsonType.label": "String",
                  },
                  "client roles": {
                      "introspection.token.claim": "true",
                      "userinfo.token.claim": "true",
                      "multivalued": "true",
                      "id.token.claim": "true",
                      "access.token.claim": "true",
                      "claim.name": "resource_access.${client_id}.roles",
                      "jsonType.label": "String",
                  },
                  "audience resolve": {
                      "introspection.token.claim": "true",
                      "access.token.claim": "true",
                  },
              }

              for attempt in range(60):
                  scopes = request("GET", f"/admin/realms/{realm}/client-scopes", token)
                  roles_scope = next((scope for scope in scopes if scope.get("name") == "roles"), None)
                  if roles_scope:
                      mappers = request("GET", f"/admin/realms/{realm}/client-scopes/{roles_scope['id']}/protocol-mappers/models", token)
                      if mapper_configs.keys() <= {mapper.get("name") for mapper in mappers}:
                          break
                  if attempt == 59:
                      raise RuntimeError("Timed out waiting for roles client scope protocol mappers")
                  time.sleep(5)

              for mapper in mappers:
                  config = mapper_configs.get(mapper.get("name"))
                  if not config:
                      continue
                  mapper["config"] = config
                  request("PUT", f"/admin/realms/{realm}/client-scopes/{roles_scope['id']}/protocol-mappers/models/{mapper['id']}", token, mapper)

              request("POST", f"/admin/realms/{realm}/clear-realm-cache", token)
              print(f"Ensured account-console scope mapping and roles token mappers for {realm}: {mapped_names}")
