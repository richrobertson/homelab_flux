apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-webauthn-default-flow-v2
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider-bootstrap
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: identity-provider-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: configure-webauthn-default-flow
          image: quay.io/keycloak/keycloak:26.6.1
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak.default.svc.cluster.local
            - name: KEYCLOAK_REALM
              value: homelab
            - name: KEYCLOAK_ADMIN_USERNAME
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-password
            - name: KEYCLOAK_FLOW_ALIAS
              value: homelab-webauthn-browser-v1
          command:
            - /bin/bash
            - -ec
          args:
            - |
              cd /opt/keycloak

              for i in {1..60}; do
                if bin/kcadm.sh config credentials \
                  --server "${KEYCLOAK_URL}" \
                  --realm master \
                  --user "${KEYCLOAK_ADMIN_USERNAME}" \
                  --password "${KEYCLOAK_ADMIN_PASSWORD}" >/dev/null; then
                  break
                fi
                if [ "${i}" = "60" ]; then
                  echo "Timed out waiting for Keycloak admin login." >&2
                  exit 1
                fi
                sleep 5
              done

              flow_id_by_alias() {
                local flow_alias="$1"
                bin/kcadm.sh get authentication/flows -r "${KEYCLOAK_REALM}" --fields id,alias --format csv |
                  sed -n "s/^\"\\([^\"]*\\)\",\"${flow_alias}\"$/\\1/p" | head -1
              }

              if [ -z "$(flow_id_by_alias "${KEYCLOAK_FLOW_ALIAS}")" ]; then
                bin/kcadm.sh create authentication/flows/browser/copy \
                  -r "${KEYCLOAK_REALM}" \
                  -s "newName=${KEYCLOAK_FLOW_ALIAS}"
              fi

              execution_id_by_provider() {
                local provider_id="$1"
                bin/kcadm.sh get "authentication/flows/${KEYCLOAK_FLOW_ALIAS}/executions" \
                  -r "${KEYCLOAK_REALM}" \
                  --fields id,displayName,providerId \
                  --format csv |
                  sed -n "s/^\"\\([^\"]*\\)\",\"[^\"]*\",\"${provider_id}\"$/\\1/p" | head -1
              }

              execution_id_by_display_name() {
                local display_name="$1"
                bin/kcadm.sh get "authentication/flows/${KEYCLOAK_FLOW_ALIAS}/executions" \
                  -r "${KEYCLOAK_REALM}" \
                  --fields id,displayName,providerId \
                  --format csv |
                  sed -n "s/^\"\\([^\"]*\\)\",\"${display_name}\",.*$/\\1/p" | head -1
              }

              set_execution_requirement() {
                local execution_id="$1"
                local requirement="$2"
                if [ -z "${execution_id}" ]; then
                  echo "Could not find execution for requirement ${requirement}." >&2
                  exit 1
                fi
                bin/kcadm.sh update "authentication/flows/${KEYCLOAK_FLOW_ALIAS}/executions" \
                  -r "${KEYCLOAK_REALM}" \
                  -b "{\"id\":\"${execution_id}\",\"requirement\":\"${requirement}\"}"
              }

              set_execution_requirement "$(execution_id_by_provider auth-cookie)" ALTERNATIVE
              set_execution_requirement "$(execution_id_by_display_name "${KEYCLOAK_FLOW_ALIAS} Browser - Conditional 2FA")" CONDITIONAL
              set_execution_requirement "$(execution_id_by_provider conditional-user-configured)" REQUIRED
              set_execution_requirement "$(execution_id_by_provider auth-otp-form)" ALTERNATIVE
              set_execution_requirement "$(execution_id_by_provider webauthn-authenticator)" ALTERNATIVE
              set_execution_requirement "$(execution_id_by_provider auth-recovery-authn-code-form)" DISABLED

              # The copied browser flow must remain password first, then MFA.
              bin/kcadm.sh create "authentication/executions/$(execution_id_by_provider auth-username-password-form)/raise-priority" \
                -r "${KEYCLOAK_REALM}" >/dev/null 2>&1 || true

              bin/kcadm.sh update authentication/required-actions/webauthn-register \
                -r "${KEYCLOAK_REALM}" \
                -s enabled=true \
                -s defaultAction=true

              bin/kcadm.sh update authentication/required-actions/webauthn-register-passwordless \
                -r "${KEYCLOAK_REALM}" \
                -s enabled=true \
                -s defaultAction=false

              bin/kcadm.sh update "realms/${KEYCLOAK_REALM}" \
                -s "browserFlow=${KEYCLOAK_FLOW_ALIAS}"

              bin/kcadm.sh create clear-realm-cache -r "${KEYCLOAK_REALM}" -s "realm=${KEYCLOAK_REALM}" || true

              echo "Bound ${KEYCLOAK_REALM} to ${KEYCLOAK_FLOW_ALIAS}; WebAuthn registration is now a default required action."
