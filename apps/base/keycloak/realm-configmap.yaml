apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  labels:
    app.kubernetes.io/name: keycloak
data:
  homelab-realm.json: |
    {
      "realm": "homelab",
      "enabled": true,
      "displayName": "Homelab",
      "registrationAllowed": false,
      "resetPasswordAllowed": true,
      "rememberMe": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "bruteForceProtected": true,
      "defaultSignatureAlgorithm": "RS256",
      "requiredCredentials": ["password"],
      "webAuthnPolicyRpEntityName": "Homelab SSO",
      "webAuthnPolicySignatureAlgorithms": ["ES256", "RS256"],
      "webAuthnPolicyAttestationConveyancePreference": "not specified",
      "webAuthnPolicyAuthenticatorAttachment": "not specified",
      "webAuthnPolicyRequireResidentKey": "not specified",
      "webAuthnPolicyUserVerificationRequirement": "preferred",
      "webAuthnPolicyCreateTimeout": 0,
      "webAuthnPolicyAvoidSameAuthenticatorRegister": true,
      "webAuthnPolicyAcceptableAaguids": [],
      "clientScopes": [
        {
          "name": "profile",
          "description": "Standard OpenID Connect profile scope.",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true"
          },
          "protocolMappers": [
            {
              "name": "username",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "user.attribute": "username",
                "claim.name": "preferred_username",
                "jsonType.label": "String",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "full name",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-full-name-mapper",
              "consentRequired": false,
              "config": {
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "email",
          "description": "Standard OpenID Connect email scope.",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true"
          },
          "protocolMappers": [
            {
              "name": "email",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "user.attribute": "email",
                "claim.name": "email",
                "jsonType.label": "String",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "email verified",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "user.attribute": "emailVerified",
                "claim.name": "email_verified",
                "jsonType.label": "boolean",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "groups",
          "description": "Expose Keycloak/AD group membership in OIDC tokens.",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true"
          },
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "consentRequired": false,
              "config": {
                "claim.name": "groups",
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "basic",
          "description": "Standard OpenID Connect basic scope.",
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "sub",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-sub-mapper",
              "consentRequired": false,
              "config": {}
            },
            {
              "name": "auth_time",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usersessionmodel-note-mapper",
              "consentRequired": false,
              "config": {}
            }
          ]
        },
        {
          "name": "roles",
          "description": "Standard OpenID Connect roles scope.",
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "realm roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "consentRequired": false,
              "config": {}
            },
            {
              "name": "client roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-client-role-mapper",
              "consentRequired": false,
              "config": {}
            },
            {
              "name": "audience resolve",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-resolve-mapper",
              "consentRequired": false,
              "config": {}
            }
          ]
        },
        {
          "name": "web-origins",
          "description": "Standard OpenID Connect web origins scope.",
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "allowed web origins",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-allowed-origins-mapper",
              "consentRequired": false,
              "config": {}
            }
          ]
        },
        {
          "name": "acr",
          "description": "Standard OpenID Connect ACR scope.",
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "acr loa level",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-acr-mapper",
              "consentRequired": false,
              "config": {}
            }
          ]
        }
      ],
      "components": {
        "org.keycloak.storage.UserStorageProvider": [
          {
            "name": "Microsoft Active Directory LDAPS",
            "providerId": "ldap",
            "config": {
              "enabled": ["true"],
              "priority": ["0"],
              "fullSyncPeriod": ["86400"],
              "changedSyncPeriod": ["3600"],
              "cachePolicy": ["DEFAULT"],
              "evictionDay": [],
              "evictionHour": [],
              "evictionMinute": [],
              "maxLifespan": [],
              "batchSizeForSync": ["1000"],
              "editMode": ["READ_ONLY"],
              "syncRegistrations": ["false"],
              "vendor": ["ad"],
              "usernameLDAPAttribute": ["sAMAccountName"],
              "rdnLDAPAttribute": ["cn"],
              "uuidLDAPAttribute": ["objectGUID"],
              "userObjectClasses": ["person, organizationalPerson, user"],
              "connectionUrl": ["ldaps://rhonda.myrobertson.net"],
              "usersDn": ["cn=Users,dc=myrobertson,dc=net"],
              "authType": ["simple"],
              "bindDn": ["ldap@myrobertson.net"],
              "bindCredential": ["${KC_LDAP_BIND_CREDENTIAL}"],
              "searchScope": ["2"],
              "useTruststoreSpi": ["ldapsOnly"],
              "connectionPooling": ["true"],
              "pagination": ["true"],
              "allowKerberosAuthentication": ["false"],
              "debug": ["false"],
              "importEnabled": ["true"],
              "validatePasswordPolicy": ["false"],
              "trustEmail": ["false"]
            }
          }
        ]
      },
      "groups": [
        {
          "name": "proxAdmins"
        }
      ],
      "clients": [
        {
          "clientId": "homelab-migration-smoke-test",
          "name": "Homelab migration smoke test",
          "enabled": false,
          "protocol": "openid-connect",
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "redirectUris": ["https://keycloak.local.invalid/callback"],
          "webOrigins": ["+"]
        },
        {
          "clientId": "mealie_staging",
          "name": "Mealie Staging",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KC_MEALIE_STAGING_CLIENT_SECRET}",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "redirectUris": ["https://mealie.staging.myrobertson.net/login"],
          "webOrigins": ["https://mealie.staging.myrobertson.net"],
          "defaultClientScopes": ["web-origins", "acr", "profile", "roles", "basic", "email", "groups"]
        },
        {
          "clientId": "vikunja_staging",
          "name": "Vikunja Staging",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KC_VIKUNJA_STAGING_CLIENT_SECRET}",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "redirectUris": ["https://tasks.staging.myrobertson.net/auth/openid/authelia"],
          "webOrigins": ["https://tasks.staging.myrobertson.net"],
          "defaultClientScopes": ["web-origins", "acr", "profile", "roles", "basic", "email", "groups"]
        }
      ]
    }
