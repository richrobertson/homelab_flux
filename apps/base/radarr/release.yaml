---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: radarr
  values:
    persistence:
      config:
        enabled: true
        storageClass: synology-iscsi-storage
        accessModes: ReadWriteMany
        targetSelector:
          main:
            main:
              mountPath: /config
            exportarr:
              mountPath: /config
              readOnly: true
      
      downloads:
        enabled: true
        existingClaim: syncthing-downloads
        mountPath: /var/downloads
        readOnly: true
      
      media:
        enabled: false
        type: pvc
        mountPath: /media
        targetSelectAll: true
        static:
          mode: nfs
          server: "192.168.1.215"
          share: "/volume1/radarr/radarr"
      
      plex:
        enabled: false
        type: pvc
        mountPath: /plex
        targetSelectAll: true
        static:
          mode: nfs
          server: "192.168.1.215"
          share: "/volume1/plex"