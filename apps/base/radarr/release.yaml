---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: radarr
  values:
    persistence:
      config:
        enabled: true
        storageClass: synology-iscsi-storage
        existingClaim: radarr-config
        accessModes: ReadWriteMany
        targetSelector:
          main:
            main:
              mountPath: /config
            exportarr:
              mountPath: /config
              readOnly: true
      
      
      downloads:
        enabled: false
        type: nfs
        mountPath: /var/downloads
        path: /volume1/downloads/
        server: scooter.myrobertson.net
        targetSelectAll: true
      
      media:
        enabled: false
        type: nfs
        mountPath: /media
        path: /volume1/radarr/radarr
        server: scooter.myrobertson.net
        targetSelectAll: true

      plex:
        enabled: false
        type: nfs
        mountPath: /plex
        server: "scooter.myrobertson.net"
        path: "/volume1/plex"
        targetSelectAll: true