apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  releaseName: jellyfin
  chart:
    spec:
      chart: jellyfin
      sourceRef:
        kind: HelmRepository
        name: jellyfin
  interval: 50m
  install:
    remediation:
      retries: 10
  values:
    replicaCount: 1
    # resources: 
    #   requests: 
    #     gpu.intel.com/i915: "1" 
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    persistence:
      config:
        storageClass: synology-iscsi-storage
        accessMode: ReadWriteMany
        size: 10Gi
      media:
        enabled: false
    securityContext:
      capabilities:
        add:
          - "SYS_ADMIN"
        drop:
          - "ALL"
      privileged: false

    extraVolumes:
      - name: hwa
        hostPath:
          path: /dev/dri

    extraVolumeMounts:
      - name: hwa
        mountPath: /dev/dri 