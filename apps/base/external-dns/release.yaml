apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: external-dns
    namespace: external-dns
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    serviceTypeFilter: [ LoadBalancer ]
    provider: pdns
    pdns:
      apiUrl: http://192.168.7.201
      apiPort: 8001
      secretName: external-dns-pdns-apikey
    loglevel: info
    logformat: json
    interval: 30s
    metrics:
      serviceMonitor:
        enabled: true