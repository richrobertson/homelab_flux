apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  chart:
    spec:
      chart: './charts/external-dns'
      sourceRef:
        kind: GitRepository
        name: external-dns
        namespace: external-dns
      interval: 10m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  
  values:
    # global:
    #   imagePullSecrets:
    #     - name: imagepullsecrets
    sources: 
      - gateway-httproute
    logLevel: info
    logFormat: json
    rbac:  # @schema additionalProperties: true
      # -- If `true`, create a `ClusterRole` & `ClusterRoleBinding` with access to the Kubernetes API.
      create: true
      # -- Additional rules to add to the `ClusterRole`.
      additionalPermissions:
        - apiGroups: [""]
          resources: ["services", "pods", "nodes", "endpoints", "namespaces"]
          verbs: ["get", "watch", "list"]
        - apiGroups: ["networking.k8s.io"]
          resources: ["ingresses", "ingressclasses", "httproutes"]
          verbs: ["get", "watch", "list"]
        - apiGroups: ["gateway.networking.k8s.io"]
          resources: ["gateways", "httproutes"]
          verbs: ["get", "watch", "list"]
        - apiGroups: ["discovery.k8s.io"]
          resources: ["endpointslices"]
          verbs: ["get", "watch", "list"]
        - apiGroups: ["externaldns.k8s.io"]
          resources: ["dnsendpoints"]
          verbs: ["get", "watch", "list"]

    serviceMonitor:
      enabled: true
