apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  chart:
    spec:
      chart: './charts/external-dns'
      sourceRef:
        kind: GitRepository
        name: external-dns
        namespace: external-dns
      interval: 10m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  
  extraVolumes: # to mount the PDNS API key secret
    - name: pdns-apikey
      secret:
        secretName: external-dns-pdns-apikey

  extraVolumeMounts:
    - name: pdns-apikey
      mountPath: /var/secrets/pdns
      readOnly: true
  env: # to set the PDNS API key from the mounted secret
    - name: PDNS_API_KEY
      valueFrom:
        secretKeyRef:
          name: external-dns-pdns-apikey
          key: pdns-api-key
  values:
    # global:
    #   imagePullSecrets:
    #     - name: imagepullsecrets
    serviceTypeFilter: [ LoadBalancer ]
    provider:
      name: pdns
    extraArgs:
        - --source=service # or ingress or both
        - --provider=pdns
        - --pdns-server=http://192.168.7.201:8001
        - --pdns-server-id=subns
        - --pdns-api-key=$(PDNS_API_KEY) 
        - --txt-owner-id=staging.myrobertson.net
        - --domain-filter=staging.myrobertson.net # will make ExternalDNS see only the zones matching provided domain; omit to process all available zones in PowerDNS
        - --log-level=info
        - --interval=30s
    pdns:
      apiUrl:
      apiPort: 
      secretName: external-dns-pdns-apikey
    loglevel: info
    logformat: json
    interval: 30s
    metrics:
      serviceMonitor:
        enabled: true