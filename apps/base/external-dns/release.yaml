apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  chart:
    spec:
      chart: './charts/external-dns'
      sourceRef:
        kind: GitRepository
        name: external-dns
        namespace: external-dns
      interval: 10m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    # global:
    #   imagePullSecrets:
    #     - name: imagepullsecrets
    serviceTypeFilter: [ LoadBalancer ]
    provider: pdns
    pdns:
      apiUrl: http://192.168.7.201
      apiPort: 8001
      secretName: external-dns-pdns-apikey
    loglevel: info
    logformat: json
    interval: 30s
    metrics:
      serviceMonitor:
        enabled: true