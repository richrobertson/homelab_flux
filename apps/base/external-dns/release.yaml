---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      sourceRef:
        kind: OCIRepository
        name: external-dns
        namespace: external-dns
      interval: 12h
  values:
    serviceTypeFilter: LoadBalancer
    provider: pdns
    pdns.apiUrl	: http://192.168.7.201
    pdns.apiPort: 8001
    pdns.secretName: external-dns-pdns-apiKey
    loglevel: info
    logformat: json
    interval: 30s