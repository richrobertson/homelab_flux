apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: external-dns
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
    serviceTypeFilter: LoadBalancer
    provider: pdns
    pdns.apiUrl	: http://192.168.7.201
    pdns.apiPort: 8001
    pdns.secretName: external-dns-pdns-apiKey
    loglevel: info
    logformat: json
    interval: 30s
    metrics:
      serviceMonitor:
        enabled: true