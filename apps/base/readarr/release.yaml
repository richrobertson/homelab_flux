---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: readarr
  values:
    persistence:
      config:
        enabled: true
        storageClass: csi-cephfs-sc
        existingClaim: readarr-config-ceph
        accessModes: ReadWriteMany
        targetSelector:
          main:
            main:
              mountPath: /config

      media:
        enabled: false
        type: nfs
        mountPath: /media
        path: /volume1/radarr
        server: scooter.myrobertson.net
        targetSelectAll: true
