---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: sonarr
  values:
    persistence:
      config:
        enabled: true
        storageClass: synology-iscsi-storage
        existingClaim: sonarr-config
        accessModes: ReadWriteMany
        targetSelector:
          main:
            main:
              mountPath: /config
            exportarr:
              mountPath: /config
              readOnly: true
      
      downloads:
        enabled: false
        type: nfs
        mountPath: /Downloads
        path: /volume1/downloads/torrents
        server: scooter.myrobertson.net
        targetSelectAll: true
      
      media:
        enabled: false
        type: nfs
        mountPath: /media
        path: /volume1/radarr/sonarr
        server: scooter.myrobertson.net
        targetSelectAll: true