apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: redis-operator
      version: "0.24.0"
      sourceRef:
        kind: HelmRepository
        name: redis-operator
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    redisOperator:
      imageName: ghcr.io/ot-container-kit/redis-operator/redis-operator
      imageTag: v0.24.0
      initContainerImageTag: v0.24.0
