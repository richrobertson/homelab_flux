apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  releaseName: plex
  interval: 1h
  chart:
    spec:
      chart: plex-media-server
      sourceRef:
        kind: HelmRepository
        name: plex
      version: ">=1.5.0 <2.0.0"
  values:
    image:
      tag: "1.43.1.10611-1e34174b1" # {"$imagepolicy": "default:plex:tag"}
    fullnameOverride: plex
    pms:
      configExistingClaim: plex-config-ceph
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 8Gi
    extraEnv:
      PLEX_UID: "568"
      PLEX_GID: "568"
    extraVolumes:
      - name: media4k
        nfs:
          server: scooter.myrobertson.net
          path: /volume1/plex
      - name: radarr-media
        nfs:
          server: scooter.myrobertson.net
          path: /volume1/radarr/radarr
      - name: sonarr-media
        nfs:
          server: scooter.myrobertson.net
          path: /volume1/radarr/sonarr
    extraVolumeMounts:
      - name: media4k
        mountPath: /plex
      - name: radarr-media
        mountPath: /radarr
      - name: sonarr-media
        mountPath: /sonarr
