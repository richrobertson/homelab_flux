---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  releaseName: plex
  interval: 1h
  chart:
    spec:
      chart: plex-media-server
      sourceRef:
        kind: HelmRepository
        name: plex
      version: ">=1.5.0 <2.0.0"
  values:
    fullnameOverride: plex
    pms:
      configExistingClaim: plex-config-ceph
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 8Gi
    extraEnv:
      PLEX_UID: "568"
      PLEX_GID: "568"
    extraVolumes:
      - name: media4k
        nfs:
          server: scooter.myrobertson.net
          path: /volume1/plex
    extraVolumeMounts:
      - name: media4k
        mountPath: /media/4k
        subPath: 4k
