---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whisparr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: whisparr
  values:
    persistence:
      config:
        enabled: true
        storageClass: synology-iscsi-storage
        accessModes: ReadWriteMany
        targetSelector:
          main:
            main:
              mountPath: /config
            exportarr:
              mountPath: /config
              readOnly: true
      
      downloads:
        enabled: false
        type: nfs
        mountPath: /downloads
        path: /volume1/downloads/completed_xxx
        server: scooter.myrobertson.net
        targetSelectAll: true
      
      media:
        enabled: false
        type: nfs
        mountPath: /xxx
        path: /volume1/janice/xxx
        server: scooter.myrobertson.net
        targetSelectAll: true