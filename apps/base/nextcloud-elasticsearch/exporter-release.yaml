apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-search-exporter
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus-elasticsearch-exporter
      version: 7.2.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    podLabels:
      app.kubernetes.io/part-of: nextcloud
      app.kubernetes.io/component: monitoring
    service:
      labels:
        app.kubernetes.io/part-of: nextcloud
        app.kubernetes.io/component: monitoring
        elasticsearch.k8s.elastic.co/cluster-name: nextcloud-search
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
    env:
      ES_USERNAME: elastic
    extraEnvSecrets:
      ES_PASSWORD:
        secret: nextcloud-search-es-elastic-user
        key: elastic
    es:
      uri: http://nextcloud-search-es-http.nextcloud.svc.cluster.local:9200
      all: true
      indices: true
      indices_settings: true
      indices_mappings: true
      shards: true
      snapshots: false
      cluster_settings: true
      timeout: 30s
    serviceMonitor:
      enabled: true
      namespace: monitoring
      interval: 30s
      scrapeTimeout: 10s
      jobLabel: app.kubernetes.io/instance
      labels:
        app.kubernetes.io/part-of: nextcloud
        app.kubernetes.io/component: monitoring
      targetLabels:
        - app.kubernetes.io/part-of
        - elasticsearch.k8s.elastic.co/cluster-name
