apiVersion: batch/v1
kind: CronJob
metadata:
  name: bitwarden-files-backup
  namespace: default
spec:
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:3.20
              command:
                - /bin/sh
                - -ec
                - |
                  mkdir -p /data/backups/files
                  TS="$(date -u +%Y%m%dT%H%M%SZ)"
                  OUT="/data/backups/files/vaultwarden-files-${TS}.tar.gz"

                  tar -czf "${OUT}" \
                    --ignore-failed-read \
                    /data/attachments \
                    /data/sends \
                    /data/icon_cache \
                    /data/rsa_key.der \
                    /data/rsa_key.pem \
                    /data/rsa_key.pub.der \
                    /data/rsa_key.pub.pem \
                    /data/config.json

                  ls -1t /data/backups/files/vaultwarden-files-*.tar.gz | tail -n +15 | xargs -r rm -f
                  echo "Created ${OUT}"
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: bitwarden-data-ceph
