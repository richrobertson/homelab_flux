apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole
  labels:
    app.kubernetes.io/name: guacamole
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: guacamole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: guacamole
      app.kubernetes.io/component: web
      app.kubernetes.io/part-of: guacamole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacamole
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: guacamole
    spec:
      containers:
        - name: guacamole
          image: guacamole/guacamole:1.6.0
          imagePullPolicy: IfNotPresent
          env:
            - name: WEBAPP_CONTEXT
              value: ROOT
            - name: REMOTE_IP_VALVE_ENABLED
              value: "true"
            - name: GUACD_HOSTNAME
              value: guacd.guacamole.svc.cluster.local
            - name: GUACD_PORT
              value: "4822"
            - name: POSTGRESQL_ENABLED
              value: "true"
            - name: POSTGRESQL_HOSTNAME
              value: guacamole-cnpg-rw.guacamole.svc.cluster.local
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_DATABASE
              value: guacamole
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: guacamole-cnpg-app
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: guacamole-cnpg-app
                  key: password
            - name: OPENID_ENABLED
              value: "true"
            - name: OPENID_SCOPE
              value: "openid profile groups email"
            - name: OPENID_USERNAME_CLAIM_TYPE
              value: preferred_username
            - name: OPENID_GROUPS_CLAIM_TYPE
              value: groups
            - name: EXTENSION_PRIORITY
              value: openid,postgresql,ban
            - name: OPENID_CLIENT_ID
              value: guacamole
            - name: OPENID_ISSUER
              value: https://auth.example.invalid
            - name: OPENID_AUTHORIZATION_ENDPOINT
              value: https://auth.example.invalid/api/oidc/authorization?state=guacamole
            - name: OPENID_JWKS_ENDPOINT
              value: https://auth.example.invalid/jwks.json
            - name: OPENID_REDIRECT_URI
              value: https://rdp.example.invalid
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
