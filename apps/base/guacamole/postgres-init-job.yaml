apiVersion: batch/v1
kind: Job
metadata:
  name: guacamole-postgres-init
  labels:
    app.kubernetes.io/name: guacamole
    app.kubernetes.io/component: database-bootstrap
    app.kubernetes.io/part-of: guacamole
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacamole
        app.kubernetes.io/component: database-bootstrap
        app.kubernetes.io/part-of: guacamole
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: render-schema
          image: guacamole/guacamole:1.6.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - /opt/guacamole/bin/initdb.sh --postgresql > /schema/initdb.sql
          volumeMounts:
            - name: schema
              mountPath: /schema
      containers:
        - name: apply-schema
          image: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: guacamole-cnpg-rw.guacamole.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: guacamole
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: guacamole-cnpg-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: guacamole-cnpg-app
                  key: password
          command:
            - /bin/sh
            - -ec
            - |
              until pg_isready; do
                sleep 5
              done
              if psql -tAc "select to_regclass('public.guacamole_user') is not null" | grep -q t; then
                echo "Guacamole schema already exists; skipping initialization."
                exit 0
              fi
              psql -v ON_ERROR_STOP=1 -f /schema/initdb.sql
          volumeMounts:
            - name: schema
              mountPath: /schema
              readOnly: true
      volumes:
        - name: schema
          emptyDir: {}

