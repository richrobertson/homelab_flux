apiVersion: batch/v1
kind: Job
metadata:
  name: guacamole-admin-groups
  labels:
    app.kubernetes.io/name: guacamole
    app.kubernetes.io/component: database-bootstrap
    app.kubernetes.io/part-of: guacamole
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacamole
        app.kubernetes.io/component: database-bootstrap
        app.kubernetes.io/part-of: guacamole
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grant-admin-groups
          image: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: PGHOST
              value: guacamole-cnpg-rw.guacamole.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: guacamole
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: guacamole-cnpg-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: guacamole-cnpg-app
                  key: password
            - name: GUACAMOLE_ADMIN_GROUP
              value: Domain Admins
          command:
            - /bin/sh
            - -ec
            - |
              until pg_isready; do
                sleep 5
              done

              until psql -tAc "select to_regclass('public.guacamole_user_group') is not null" | grep -q t; do
                echo "Waiting for Guacamole schema."
                sleep 5
              done

              psql -v ON_ERROR_STOP=1 -c "
              insert into guacamole_entity (name, type)
              select '${GUACAMOLE_ADMIN_GROUP}', 'USER_GROUP'::guacamole_entity_type
              where not exists (
                select 1
                from guacamole_entity
                where name = '${GUACAMOLE_ADMIN_GROUP}'
                  and type = 'USER_GROUP'::guacamole_entity_type
              );

              insert into guacamole_user_group (entity_id, disabled)
              select entity_id, false
              from guacamole_entity
              where name = '${GUACAMOLE_ADMIN_GROUP}'
                and type = 'USER_GROUP'::guacamole_entity_type
                and not exists (
                  select 1
                  from guacamole_user_group
                  where entity_id = guacamole_entity.entity_id
                );

              update guacamole_user_group
              set disabled = false
              where entity_id in (
                select entity_id
                from guacamole_entity
                where name = '${GUACAMOLE_ADMIN_GROUP}'
                  and type = 'USER_GROUP'::guacamole_entity_type
              );

              insert into guacamole_system_permission (entity_id, permission)
              select entity_id, 'ADMINISTER'::guacamole_system_permission_type
              from guacamole_entity
              where name = '${GUACAMOLE_ADMIN_GROUP}'
                and type = 'USER_GROUP'::guacamole_entity_type
                and not exists (
                  select 1
                  from guacamole_system_permission
                  where entity_id = guacamole_entity.entity_id
                    and permission = 'ADMINISTER'::guacamole_system_permission_type
                );
              "

              echo "Granted Guacamole ADMINISTER to ${GUACAMOLE_ADMIN_GROUP}."
