apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  interval: 1h
  chart:
    spec:
      chart: nextcloud
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
  install:
    disableWait: true
  upgrade:
    disableWait: true
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: nextcloud
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/startupProbe
                value:
                  httpGet:
                    path: /status.php
                    port: 80
                    scheme: HTTP
                    httpHeaders:
                      - name: Host
                        value: localhost
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
                  successThreshold: 1
              - op: add
                path: /spec/template/spec/containers/0/livenessProbe/httpGet/httpHeaders
                value:
                  - name: Host
                    value: localhost
              - op: add
                path: /spec/template/spec/containers/0/readinessProbe/httpGet/httpHeaders
                value:
                  - name: Host
                    value: localhost
              - op: add
                path: /spec/template/spec/containers/0/args
                value:
                  - apache2-foreground
                  - -C
                  - ServerName cloud.myrobertson.com
  values:
    replicaCount: 1

    image:
      repository: nextcloud
      tag: 33-apache
      pullPolicy: IfNotPresent

    nextcloud:
      host: cloud.myrobertson.com
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: NEXTCLOUD_ADMIN_USER
        passwordKey: NEXTCLOUD_ADMIN_PASSWORD
        smtpUsernameKey: SMTP_USERNAME
        smtpPasswordKey: SMTP_PASSWORD
      extraEnv:
        - name: OVERWRITEPROTOCOL
          value: "https"
        - name: OVERWRITECLIURL
          value: "https://cloud.myrobertson.com"
        - name: LDAP_ENABLED
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_ENABLED
              optional: true
        - name: LDAP_HOST
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_HOST
              optional: true
        - name: LDAP_PORT
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_PORT
              optional: true
        - name: LDAP_BASE_DN
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BASE_DN
              optional: true
        - name: LDAP_BIND_DN
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BIND_DN
              optional: true
        - name: LDAP_BIND_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BIND_PASSWORD
              optional: true
        - name: LDAP_LOGIN_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_LOGIN_FILTER
              optional: true
        - name: LDAP_USER_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_USER_FILTER
              optional: true
        - name: LDAP_GROUP_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_GROUP_FILTER
              optional: true
        - name: LDAP_TLS
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_TLS
              optional: true
        - name: LDAP_ADMIN_GROUP
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_ADMIN_GROUP
              optional: true
        - name: NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-mail-provisioning
              key: MASTER_PASSWORD
              optional: true
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_proxies' => ['10.0.0.0/8'],
            'forwarded_for_headers' => ['HTTP_X_FORWARDED_FOR'],
            'overwrite.cli.url' => getenv('OVERWRITECLIURL') ?: 'https://cloud.myrobertson.com',
            'overwriteprotocol' => getenv('OVERWRITEPROTOCOL') ?: 'https',
          );
      phpConfigs:
        uploads.ini: |-
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
          memory_limit = 1G
      hooks:
        before-starting: |-
          #!/bin/sh
          set -eu

          if find /usr/local/share/ca-certificates -maxdepth 1 -name '*.crt' | grep -q .; then
            # Nextcloud uses its own CA bundle for outbound HTTPS, so extend it
            # with any custom certs we mount into the container.
            python3 - <<'PY'
          from pathlib import Path

          bundle = Path('/var/www/html/resources/config/ca-bundle.crt')
          cert_dir = Path('/usr/local/share/ca-certificates')

          if not bundle.exists() or not cert_dir.exists():
              raise SystemExit(0)

          bundle_text = bundle.read_text()
          changed = False

          for cert_path in sorted(cert_dir.glob('*.crt')):
              cert_text = cert_path.read_text().strip()
              if cert_text and cert_text not in bundle_text:
                  bundle_text = bundle_text.rstrip() + '\n' + cert_text + '\n'
                  changed = True

          if changed:
              bundle.write_text(bundle_text)
          PY
          fi

          # Nextcloud 33 on PHP 8.4 can return a native bool here, which breaks LDAP auth checks.
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/var/www/html/lib/private/Config/UserConfig.php')
          old_variants = [
              """\tpublic function getValueBool(\n\t\tstring $userId,\n\t\tstring $app,\n\t\tstring $key,\n\t\tbool $default = false,\n\t\tbool $lazy = false,\n\t): bool {\n\t\t$b = strtolower($this->getTypedValue($userId, $app, $key, $default ? 'true' : 'false', $lazy, ValueType::BOOL));\n\t\treturn in_array($b, ['1', 'true', 'yes', 'on']);\n\t}\n""",
              """\tpublic function getValueBool(\n\t\tstring $userId,\n\t\tstring $app,\n\t\tstring $key,\n\t\tbool $default = false,\n\t\tbool $lazy = false,\n\t): bool {\n\t\t$b = $this->getTypedValue($userId, $app, $key, $default ? 'true' : 'false', $lazy, ValueType::BOOL);\n\t\tif (is_bool($b)) {\n\t\t\treturn $b;\n\t\t}\n\n\t\t$b = strtolower((string)$b);\n\t\treturn in_array($b, ['1', 'true', 'yes', 'on']);\n\t}\n""",
          ]
          new = """\tpublic function getValueBool(\n\t\tstring $userId,\n\t\tstring $app,\n\t\tstring $key,\n\t\tbool $default = false,\n\t\tbool $lazy = false,\n\t): bool {\n\t\t$b = $this->getTypedValue($userId, $app, $key, $default ? 'true' : 'false', $lazy, ValueType::BOOL);\n\t\tif (is_bool($b)) {\n\t\t\treturn $b;\n\t\t}\n\n\t\tif (!is_scalar($b) && $b !== null) {\n\t\t\treturn false;\n\t\t}\n\n\t\treturn filter_var((string)$b, FILTER_VALIDATE_BOOLEAN);\n\t}\n"""
          text = path.read_text()
          if new not in text:
              for old in old_variants:
                  if old in text:
                      path.write_text(text.replace(old, new, 1))
                      break
          PY

          NEXTCLOUD_PUBLIC_URL="${OVERWRITECLIURL:-https://cloud.myrobertson.com}"
          NEXTCLOUD_PUBLIC_HOST="${NEXTCLOUD_PUBLIC_URL#https://}"
          NEXTCLOUD_PUBLIC_HOST="${NEXTCLOUD_PUBLIC_HOST#http://}"
          NEXTCLOUD_PUBLIC_HOST="${NEXTCLOUD_PUBLIC_HOST%%/*}"

          OCC_STATUS="$(php occ status 2>/dev/null || true)"
          if ! printf '%s\n' "${OCC_STATUS}" | grep -q 'installed: true'; then
            echo "Nextcloud not installed yet; skipping Office and LDAP bootstrap until after initial install."
            exit 0
          fi

          # Keep trusted domains aligned with expected public and in-cluster access.
          php occ config:system:set trusted_domains 0 --value=localhost
          php occ config:system:set trusted_domains 1 --value="${NEXTCLOUD_PUBLIC_HOST}"
          php occ config:system:set trusted_domains 2 --value=nextcloud.default.svc.cluster.local
          php occ config:system:set trusted_domains 3 --value=nextcloud.default.svc

          # Major upgrades expose only a reduced occ command set until migrations finish.
          if php occ status 2>/dev/null | grep -q 'needsDbUpgrade: true'; then
            echo "Nextcloud upgrade pending; skipping Office and LDAP bootstrap until after migrations."
            exit 0
          fi

          # Calendar invitations and other server notifications use Nextcloud's
          # system SMTP settings, while the Mail app uses its own provisioned
          # IMAP/SMTP account configuration.
          php occ config:system:set mail_smtpmode --value=smtp
          php occ config:system:set mail_smtphost --value=mailu-postfix.default.svc.cluster.local
          php occ config:system:set mail_smtpport --type=integer --value=25
          php occ config:system:set mail_smtpauth --type=boolean --value=false
          php occ config:system:set mail_from_address --value=calendar
          php occ config:system:set mail_domain --value=myrobertson.net
          php occ config:system:delete mail_smtpsecure || true
          php occ config:system:delete mail_smtpname || true
          php occ config:system:delete mail_smtppassword || true

          if [ "${LDAP_ENABLED:-false}" = "true" ]; then
            php occ ldap:set-config s01 ldapEmailAttribute mail || true
            php occ ldap:set-config s01 ldapLoginFilterEmail 1 || true
          fi

          if [ "${NEXTCLOUD_OIDC_ENABLED:-false}" = "true" ]; then
            php occ config:system:set allow_local_remote_servers --type=boolean --value=true

            for i in $(seq 1 30); do
              if [ -n "${NEXTCLOUD_OIDC_CLIENT_ID:-}" ] && [ -n "${NEXTCLOUD_OIDC_CLIENT_SECRET:-}" ] && [ -n "${NEXTCLOUD_OIDC_DISCOVERY_URI:-}" ]; then
                break
              fi
              echo "OIDC: Waiting for secret/config injection... (attempt $i/30)"
              sleep 1
            done

            if [ -z "${NEXTCLOUD_OIDC_CLIENT_ID:-}" ] || [ -z "${NEXTCLOUD_OIDC_CLIENT_SECRET:-}" ] || [ -z "${NEXTCLOUD_OIDC_DISCOVERY_URI:-}" ]; then
              echo "OIDC enabled but required NEXTCLOUD_OIDC_* values are missing; skipping OIDC bootstrap."
            elif php occ app:enable user_oidc || php occ app:install user_oidc; then
              OIDC_PROVIDER_ID="${NEXTCLOUD_OIDC_PROVIDER_ID:-authelia}"
              php occ user_oidc:provider "${OIDC_PROVIDER_ID}" \
                --clientid="${NEXTCLOUD_OIDC_CLIENT_ID}" \
                --clientsecret-env=NEXTCLOUD_OIDC_CLIENT_SECRET \
                --discoveryuri="${NEXTCLOUD_OIDC_DISCOVERY_URI}" \
                --scope="${NEXTCLOUD_OIDC_SCOPE:-openid email profile groups}" \
                --unique-uid="${NEXTCLOUD_OIDC_UNIQUE_UID:-0}" \
                --mapping-uid="${NEXTCLOUD_OIDC_MAPPING_UID:-preferred_username}" \
                --mapping-email="${NEXTCLOUD_OIDC_MAPPING_EMAIL:-email}" \
                --mapping-display-name="${NEXTCLOUD_OIDC_MAPPING_DISPLAY_NAME:-name}" \
                --mapping-groups="${NEXTCLOUD_OIDC_MAPPING_GROUPS:-groups}" \
                --group-provisioning="${NEXTCLOUD_OIDC_GROUP_PROVISIONING:-0}" \
                --check-bearer="${NEXTCLOUD_OIDC_CHECK_BEARER:-0}" \
                --bearer-provisioning="${NEXTCLOUD_OIDC_BEARER_PROVISIONING:-0}"
              php occ config:app:set --type=string --value="${NEXTCLOUD_OIDC_ALLOW_MULTIPLE_USER_BACKENDS:-1}" user_oidc allow_multiple_user_backends
              php occ config:app:set --type=boolean --value=true user_oidc auto_provision
              php occ config:app:set --type=boolean --value=true user_oidc soft_auto_provision
            else
              echo "OIDC: failed to install or enable user_oidc; skipping provider bootstrap."
            fi
          fi

          if php occ app:list | grep -q '^  - mail:' && [ -n "${NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD:-}" ]; then
            php -r '
          require_once "/var/www/html/lib/base.php";

          $data = [
              "provisioningDomain" => "myrobertson.net",
              "emailTemplate" => "%EMAIL%",
              "imapUser" => "%EMAIL%*nextcloud",
              "imapHost" => "mailu-dovecot.default.svc.cluster.local",
              "imapPort" => 143,
              "imapSslMode" => "none",
              "smtpUser" => "",
              "smtpHost" => "mailu-postfix.default.svc.cluster.local",
              "smtpPort" => 25,
              "smtpSslMode" => "none",
              "masterPasswordEnabled" => true,
              "masterPassword" => getenv("NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD"),
              "sieveEnabled" => false,
              "sieveHost" => "",
              "sieveUser" => "",
              "sievePort" => null,
              "sieveSslMode" => "",
              "ldapAliasesProvisioning" => false,
              "ldapAliasesAttribute" => "",
          ];

          $manager = \OC::$server->get(\OCA\Mail\Service\Provisioning\Manager::class);
          $configs = $manager->getConfigs();
          $existing = null;
          foreach ($configs as $config) {
              if ($config->getProvisioningDomain() === "myrobertson.net") {
                  $existing = $config;
                  break;
              }
          }

          if ($existing !== null) {
              $data["id"] = $existing->getId();
              $manager->updateProvisioning($data);
          } else {
              $manager->newProvisioning($data);
          }

          $count = $manager->provision();
          $userManager = \OC::$server->get(\OCP\IUserManager::class);
          $configs = $manager->getConfigs();
          $userManager->callForAllUsers(function (\OCP\IUser $user) use ($manager, $configs) {
              $email = $user->getEMailAddress();
              if ($email !== null && str_ends_with(strtolower($email), "@myrobertson.net")) {
                  $manager->updatePassword($user, getenv("NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD"), $configs);
              }
          });

          echo "Mail: provisioned or updated {$count} accounts.\n";
          '

            php occ user:list --output=json | python3 -c 'import json, sys; print("\n".join(json.load(sys.stdin).keys()))' | while IFS= read -r MAIL_USER_ID; do
              USER_INFO="$(php occ user:info "${MAIL_USER_ID}" 2>/dev/null || true)"
              MAIL_ADDRESS="$(printf '%s\n' "${USER_INFO}" | awk -F': ' '/  - email: / {print $2; exit}')"
              DISPLAY_NAME="$(printf '%s\n' "${USER_INFO}" | awk -F': ' '/  - display_name: / {print $2; exit}')"

              case "${MAIL_ADDRESS}" in
                *@myrobertson.net) ;;
                *) continue ;;
              esac

              DISPLAY_NAME="${DISPLAY_NAME:-${MAIL_ADDRESS}}"
              ACCOUNT_ID="$(
                php occ mail:account:export "${MAIL_USER_ID}" 2>/dev/null \
                  | awk -v email="${MAIL_ADDRESS}" '
                      /^Account [0-9]+:/ { id = $2; sub(":", "", id) }
                      $0 == "- E-Mail: " email { print id; exit }
                    '
              )"

              if [ -n "${ACCOUNT_ID}" ]; then
                php occ mail:account:update "${ACCOUNT_ID}" \
                  --name="${DISPLAY_NAME}" \
                  --email="${MAIL_ADDRESS}" \
                  --imap-host=mailu-dovecot.default.svc.cluster.local \
                  --imap-port=143 \
                  --imap-ssl-mode=none \
                  --imap-user="${MAIL_ADDRESS}*nextcloud" \
                  --imap-password="${NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD}" \
                  --smtp-host=mailu-postfix.default.svc.cluster.local \
                  --smtp-port=25 \
                  --smtp-ssl-mode=none \
                  --smtp-user="" \
                  --smtp-password=""
              else
                php occ mail:account:create "${MAIL_USER_ID}" "${DISPLAY_NAME}" "${MAIL_ADDRESS}" \
                  mailu-dovecot.default.svc.cluster.local 143 none "${MAIL_ADDRESS}*nextcloud" "${NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD}" \
                  mailu-postfix.default.svc.cluster.local 25 none "" "" \
                  password
              fi
            done
          fi

          if [ -n "${COLLABORA_PUBLIC_URL:-}" ]; then
            COLLABORA_WOPI_URL="${COLLABORA_WOPI_URL:-${COLLABORA_PUBLIC_URL}}"

            if php occ app:enable richdocuments || php occ app:install richdocuments; then
              collabora_activate() {
                php occ richdocuments:activate-config \
                  --wopi-url="${COLLABORA_WOPI_URL}" \
                  --callback-url="${NEXTCLOUD_PUBLIC_URL}"
              }

              for i in $(seq 1 30); do
                if collabora_activate; then
                  php occ app:disable richdocumentscode || true
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "Collabora: unable to validate discovery after 30 attempts; keeping configured values for the next startup."
                  break
                fi
                echo "Collabora: waiting for discovery endpoint... (attempt $i/30)"
                sleep 2
              done
            else
              echo "Collabora: failed to install or enable richdocuments; skipping Office bootstrap."
            fi
          fi

          if [ "${LDAP_ENABLED:-false}" != "true" ]; then
            exit 0
          fi

          if [ -z "${LDAP_HOST:-}" ] || [ -z "${LDAP_BASE_DN:-}" ] || [ -z "${LDAP_BIND_DN:-}" ] || [ -z "${LDAP_BIND_PASSWORD:-}" ]; then
             # Wait for Vault secret injection (up to 30 seconds)
             for i in $(seq 1 30); do
               if [ -z "${LDAP_HOST:-}" ] || [ -z "${LDAP_BASE_DN:-}" ] || [ -z "${LDAP_BIND_DN:-}" ] || [ -z "${LDAP_BIND_PASSWORD:-}" ]; then
                 echo "LDAP: Waiting for secret injection... (attempt $i/30)"
                 sleep 1
               else
                 break
               fi
             done
             if [ -z "${LDAP_HOST:-}" ] || [ -z "${LDAP_BASE_DN:-}" ] || [ -z "${LDAP_BIND_DN:-}" ] || [ -z "${LDAP_BIND_PASSWORD:-}" ]; then
               echo "LDAP enabled but required LDAP_* values are missing; skipping LDAP bootstrap."
               exit 0
             fi
          fi

          LDAP_PORT="${LDAP_PORT:-389}"
          LDAP_LOGIN_FILTER="${LDAP_LOGIN_FILTER:-(&(|(objectclass=person)(objectclass=user))(|(sAMAccountName=%uid)(userPrincipalName=%uid)(mail=%uid)))}"
          LDAP_USER_FILTER="${LDAP_USER_FILTER:-(|(objectclass=person)(objectclass=user))}"
          LDAP_GROUP_FILTER="${LDAP_GROUP_FILTER:-(|(objectclass=group)(objectclass=groupOfNames))}"
          LDAP_TLS="${LDAP_TLS:-1}"
          LDAP_ADMIN_GROUP="${LDAP_ADMIN_GROUP:-Domain Admins}"

          php occ app:enable user_ldap || php occ app:install user_ldap || true

          if php occ ldap:show-config s01 >/dev/null 2>&1; then
            LDAP_CFG_ID="s01"
          else
            LDAP_CFG_ID="$(php occ ldap:create-empty-config 2>/dev/null | awk '/Created new config ID/{print $5}' | tail -1)"
            LDAP_CFG_ID="${LDAP_CFG_ID:-s01}"
          fi

          php occ ldap:set-config ${LDAP_CFG_ID} ldapConfigurationActive 1
          php occ ldap:set-config ${LDAP_CFG_ID} ldapHost "${LDAP_HOST}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapPort "${LDAP_PORT}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapBase "${LDAP_BASE_DN}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapBaseUsers "${LDAP_BASE_DN}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapBaseGroups "${LDAP_BASE_DN}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapAgentName "${LDAP_BIND_DN}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapAgentPassword "${LDAP_BIND_PASSWORD}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapLoginFilter "${LDAP_LOGIN_FILTER}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapUserFilter "${LDAP_USER_FILTER}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapGroupFilter "${LDAP_GROUP_FILTER}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapAdminGroup "${LDAP_ADMIN_GROUP}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapTLS "${LDAP_TLS}"
          php occ ldap:set-config ${LDAP_CFG_ID} turnOffCertCheck 1

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-cnpg-rw:5432
      database: nextcloud
      user: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-cnpg-app
        usernameKey: user
        passwordKey: password

    persistence:
      enabled: true
      existingClaim: nextcloud-data-pvc-ceph-v2

    redis:
      enabled: true
      image:
        repository: bitnamilegacy/redis
      auth:
        enabled: false
      master:
        persistence:
          enabled: false
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 192Mi
      replica:
        persistence:
          enabled: false
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 192Mi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: false

    service:
      type: ClusterIP
      port: 80

    ingress:
      enabled: false

    cronjob:
      enabled: true

    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 1

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
