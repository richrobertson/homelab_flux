apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  interval: 1h
  chart:
    spec:
      chart: nextcloud
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
  install:
    disableWait: true
  upgrade:
    disableWait: true
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: nextcloud
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/livenessProbe/httpGet/httpHeaders
                value:
                  - name: Host
                    value: localhost
              - op: add
                path: /spec/template/spec/containers/0/readinessProbe/httpGet/httpHeaders
                value:
                  - name: Host
                    value: localhost
  values:
    replicaCount: 1

    image:
      repository: nextcloud
      tag: 30-apache
      pullPolicy: IfNotPresent

    nextcloud:
      host: cloud.myrobertson.com
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: NEXTCLOUD_ADMIN_USER
        passwordKey: NEXTCLOUD_ADMIN_PASSWORD
        smtpUsernameKey: SMTP_USERNAME
        smtpPasswordKey: SMTP_PASSWORD
      extraEnv:
        - name: OVERWRITEPROTOCOL
          value: "https"
        - name: OVERWRITECLIURL
          value: "https://cloud.myrobertson.com"
        - name: LDAP_ENABLED
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_ENABLED
              optional: true
        - name: LDAP_HOST
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_HOST
              optional: true
        - name: LDAP_PORT
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_PORT
              optional: true
        - name: LDAP_BASE_DN
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BASE_DN
              optional: true
        - name: LDAP_BIND_DN
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BIND_DN
              optional: true
        - name: LDAP_BIND_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BIND_PASSWORD
              optional: true
        - name: LDAP_LOGIN_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_LOGIN_FILTER
              optional: true
        - name: LDAP_USER_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_USER_FILTER
              optional: true
        - name: LDAP_GROUP_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_GROUP_FILTER
              optional: true
        - name: LDAP_TLS
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_TLS
              optional: true
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_proxies' => ['10.0.0.0/8'],
            'forwarded_for_headers' => ['HTTP_X_FORWARDED_FOR'],
            'overwrite.cli.url' => 'https://cloud.myrobertson.com',
            'overwriteprotocol' => 'https',
          );
      hooks:
        before-starting: |-
          #!/bin/sh
          set -eu

          if [ "${LDAP_ENABLED:-false}" != "true" ]; then
            exit 0
          fi

          if [ -z "${LDAP_HOST:-}" ] || [ -z "${LDAP_BASE_DN:-}" ] || [ -z "${LDAP_BIND_DN:-}" ] || [ -z "${LDAP_BIND_PASSWORD:-}" ]; then
             # Wait for Vault secret injection (up to 30 seconds)
             for i in $(seq 1 30); do
               if [ -z "${LDAP_HOST:-}" ] || [ -z "${LDAP_BASE_DN:-}" ] || [ -z "${LDAP_BIND_DN:-}" ] || [ -z "${LDAP_BIND_PASSWORD:-}" ]; then
                 echo "LDAP: Waiting for secret injection... (attempt $i/30)"
                 sleep 1
               else
                 break
               fi
             done
             if [ -z "${LDAP_HOST:-}" ] || [ -z "${LDAP_BASE_DN:-}" ] || [ -z "${LDAP_BIND_DN:-}" ] || [ -z "${LDAP_BIND_PASSWORD:-}" ]; then
               echo "LDAP enabled but required LDAP_* values are missing; skipping LDAP bootstrap."
               exit 0
             fi
          fi

          LDAP_PORT="${LDAP_PORT:-389}"
          LDAP_LOGIN_FILTER="${LDAP_LOGIN_FILTER:-(&(|(objectclass=person)(objectclass=user))(|(sAMAccountName=%uid)(userPrincipalName=%uid)(mail=%uid)))}"
          LDAP_USER_FILTER="${LDAP_USER_FILTER:-(|(objectclass=person)(objectclass=user))}"
          LDAP_GROUP_FILTER="${LDAP_GROUP_FILTER:-(|(objectclass=group)(objectclass=groupOfNames))}"
          LDAP_TLS="${LDAP_TLS:-1}"

          php occ app:enable user_ldap || php occ app:install user_ldap || true

          if php occ ldap:show-config s01 >/dev/null 2>&1; then
            LDAP_CFG_ID="s01"
          else
            LDAP_CFG_ID="$(php occ ldap:create-empty-config 2>/dev/null | awk '/Created new config ID/{print $5}' | tail -1)"
            LDAP_CFG_ID="${LDAP_CFG_ID:-s01}"
          fi

          php occ ldap:set-config ${LDAP_CFG_ID} ldapConfigurationActive 1
          php occ ldap:set-config ${LDAP_CFG_ID} ldapHost "${LDAP_HOST}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapPort "${LDAP_PORT}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapBase "${LDAP_BASE_DN}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapBaseUsers "${LDAP_BASE_DN}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapBaseGroups "${LDAP_BASE_DN}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapAgentName "${LDAP_BIND_DN}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapAgentPassword "${LDAP_BIND_PASSWORD}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapLoginFilter "${LDAP_LOGIN_FILTER}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapUserFilter "${LDAP_USER_FILTER}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapGroupFilter "${LDAP_GROUP_FILTER}"
          php occ ldap:set-config ${LDAP_CFG_ID} ldapTLS "${LDAP_TLS}"
          php occ ldap:set-config ${LDAP_CFG_ID} turnOffCertCheck 1

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-cnpg-rw:5432
      database: nextcloud
      user: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-cnpg-app
        usernameKey: user
        passwordKey: password

    persistence:
      enabled: true
      existingClaim: nextcloud-data-pvc-ceph-v2

    redis:
      enabled: false

    metrics:
      enabled: true
      serviceMonitor:
        enabled: false

    service:
      type: ClusterIP
      port: 80

    ingress:
      enabled: false

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
