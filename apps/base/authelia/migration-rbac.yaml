apiVersion: v1
kind: ServiceAccount
metadata:
  name: authelia-migration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: authelia-migration
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authelia-migration
subjects:
  - kind: ServiceAccount
    name: authelia-migration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: authelia-migration