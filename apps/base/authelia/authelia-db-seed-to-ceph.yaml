apiVersion: batch/v1
kind: Job
metadata:
  name: authelia-db-seed-to-ceph
spec:
  suspend: true
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie
          env:
            - name: SOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-authelia-app
                  key: password
            - name: TARGET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-authelia-ceph-app
                  key: password
          command:
            - /bin/sh
            - -ec
            - |
              for attempt in $(seq 1 60); do
                if PGPASSWORD="$TARGET_PASSWORD" pg_isready -h cluster-authelia-ceph-rw.default.svc.cluster.local -U authelia -d authelia; then
                  break
                fi
                sleep 5
              done

              PGPASSWORD="$SOURCE_PASSWORD" pg_dump \
                --clean \
                --if-exists \
                --no-owner \
                --no-privileges \
                -h cluster-authelia-rw.default.svc.cluster.local \
                -U authelia \
                -d authelia \
              | PGPASSWORD="$TARGET_PASSWORD" psql \
                -v ON_ERROR_STOP=1 \
                -h cluster-authelia-ceph-rw.default.svc.cluster.local \
                -U authelia \
                -d authelia