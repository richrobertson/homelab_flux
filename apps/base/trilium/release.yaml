apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trilium
spec:
  chart:
    spec:
      chart: trilium
      version: ">=1.3.0"
      sourceRef:
        kind: HelmRepository
        name: trilium
  interval: 1h
  install:
    remediation:
      retries: 3
  values:
    controllers:
      main:
        replicas: 0
    configini:
      network:
        trustedReverseProxy: true
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: trilium-data-ceph
