apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vikunja
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: vikunja
  values:
    vikunja:
      env:
        VIKUNJA_DATABASE_TYPE: postgres
        VIKUNJA_DATABASE_HOST: task-control-plane-cnpg-rw.default.svc.cluster.local
        VIKUNJA_DATABASE_PORT: "5432"
        VIKUNJA_DATABASE_DATABASE:
          valueFrom:
            secretKeyRef:
              name: task-control-plane-cnpg-app
              key: dbname
        VIKUNJA_DATABASE_USER:
          valueFrom:
            secretKeyRef:
              name: task-control-plane-cnpg-app
              key: username
        VIKUNJA_DATABASE_PASSWORD:
          valueFrom:
            secretKeyRef:
              name: task-control-plane-cnpg-app
              key: password
      configMaps:
        config:
          enabled: true
          data:
            config.yml: |
              service:
                publicurl: https://tasks.myrobertson.com/
                enableregistration: false
                timezone: UTC
              log:
                level: INFO
      persistence:
        database:
          enabled: true
          storageClass: csi-cephfs-sc
          accessMode: ReadWriteMany
          size: 5Gi
        data:
          enabled: true
          existingClaim: vikunja-data
      ingress:
        main:
          enabled: false
