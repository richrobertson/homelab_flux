apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  labels:
    app.kubernetes.io/name: agent-service
    app.kubernetes.io/part-of: task-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-service
        app.kubernetes.io/part-of: task-control-plane
    spec:
      containers:
        - name: agent-service
          image: ghcr.io/richrobertson/agent-service:0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: agent-service-config
          env:
            - name: PYTHONPATH
              value: /app/src
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-openai
                  key: OPENAI_API_KEY
                  optional: true
            - name: VIKUNJA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-vikunja
                  key: VIKUNJA_API_TOKEN
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-app
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-app
                  key: TELEGRAM_WEBHOOK_SECRET
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
