apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-service-config
data:
  APP_NAME: agent-service
  ENVIRONMENT: base
  LOG_LEVEL: INFO
  OPENAI_MODEL: gpt-4.1-mini
  OPENAI_BASE_URL: https://api.openai.com/v1
  OPENAI_TIMEOUT_SECONDS: "30"
  VIKUNJA_BASE_URL: https://tasks.myrobertson.com
  VIKUNJA_PROJECT_ID: "1"
  VIKUNJA_TIMEOUT_SECONDS: "20"
  SESSION_TTL_SECONDS: "3600"
  SESSION_MAX_MESSAGES: "20"
  TOOL_MAX_ITERATIONS: "4"
  REDIS_URL: redis://task-control-plane-redis.default.svc.cluster.local:6379/0
  REDIS_KEY_PREFIX: tcp
  POSTGRES_HOST: task-control-plane-cnpg-rw.default.svc.cluster.local
  POSTGRES_PORT: "5432"
