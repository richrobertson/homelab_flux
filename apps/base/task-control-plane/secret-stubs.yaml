apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: task-control-plane-openai
spec:
  type: kv-v2
  mount: secret
  path: task-control-plane/env/openai
  refreshAfter: 60s
  destination:
    create: true
    name: task-control-plane-openai
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: task-control-plane-app
spec:
  type: kv-v2
  mount: secret
  path: task-control-plane/env/app
  refreshAfter: 60s
  destination:
    create: true
    name: task-control-plane-app
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vikunja-oidc-secret
spec:
  type: kv-v2
  mount: secret
  path: task-control-plane/env/vikunja-oidc
  refreshAfter: 60s
  destination:
    create: true
    name: vikunja-oidc-secret
