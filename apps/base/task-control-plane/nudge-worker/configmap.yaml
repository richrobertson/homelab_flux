apiVersion: v1
kind: ConfigMap
metadata:
  name: nudge-worker-config
data:
  APP_NAME: nudge-worker
  ENVIRONMENT: base
  LOG_LEVEL: INFO
  SCAN_INTERVAL_SECONDS: "300"
  DUE_SOON_MINUTES: "15"
  INACTIVITY_MINUTES: "90"
  NUDGE_COOLDOWN_MINUTES: "60"
  REPEATED_NUDGE_THRESHOLD: "3"
  MAX_TASKS_PER_SCAN: "50"
  OPENAI_MODEL: gpt-4.1-mini
  OPENAI_BASE_URL: https://api.openai.com/v1
  OPENAI_TIMEOUT_SECONDS: "30"
  VIKUNJA_BASE_URL: https://tasks.myrobertson.com
  VIKUNJA_PROJECT_ID: "1"
  VIKUNJA_TIMEOUT_SECONDS: "20"
  NTFY_BASE_URL: https://ntfy.example.com
  NTFY_FOCUS_TOPIC: focus
  NTFY_REMINDERS_TOPIC: reminders
  NTFY_ESCALATION_TOPIC: escalation
  AGENT_SERVICE_BASE_URL: http://agent-service.default.svc.cluster.local:8080
  NUDGE_SESSION_PREFIX: coach
  REDIS_URL: redis://task-control-plane-redis.default.svc.cluster.local:6379/0
  REDIS_KEY_PREFIX: tcp
  POSTGRES_HOST: task-control-plane-cnpg-rw.default.svc.cluster.local
  POSTGRES_PORT: "5432"
  TELEGRAM_PRIORITY_MINUTES: "90"
  METRICS_PORT: "9109"
