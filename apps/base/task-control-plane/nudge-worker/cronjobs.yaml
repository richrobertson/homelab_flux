apiVersion: batch/v1
kind: CronJob
metadata:
  name: nudge-worker-morning-planning
spec:
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: nudge-worker-morning-planning
        spec:
          restartPolicy: Never
          containers:
            - name: nudge-worker
              image: ghcr.io/richrobertson/nudge-worker:0.1.0
              imagePullPolicy: IfNotPresent
              args: ["--mode", "job", "--job", "morning-planning"]
              envFrom:
                - configMapRef:
                    name: nudge-worker-config
              env:
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: task-control-plane-openai
                      key: OPENAI_API_KEY
                      optional: true
                - name: VIKUNJA_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: task-control-plane-vikunja
                      key: VIKUNJA_API_TOKEN
                      optional: true
                - name: NTFY_ACCESS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: task-control-plane-app
                      key: NTFY_ACCESS_TOKEN
                      optional: true
---
