apiVersion: apps/v1
kind: Deployment
metadata:
  name: nudge-worker
  labels:
    app.kubernetes.io/name: nudge-worker
    app.kubernetes.io/part-of: task-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nudge-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nudge-worker
        app.kubernetes.io/part-of: task-control-plane
    spec:
      containers:
        - name: nudge-worker
          image: ghcr.io/richrobertson/nudge-worker:0.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9109
          envFrom:
            - configMapRef:
                name: nudge-worker-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-openai
                  key: OPENAI_API_KEY
                  optional: true
            - name: VIKUNJA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-vikunja
                  key: VIKUNJA_API_TOKEN
                  optional: true
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-cnpg-app
                  key: username
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-cnpg-app
                  key: password
                  optional: true
            - name: POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-cnpg-app
                  key: dbname
                  optional: true
            - name: NTFY_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-app
                  key: NTFY_ACCESS_TOKEN
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-app
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_PRIMARY_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: task-control-plane-app
                  key: TELEGRAM_PRIMARY_CHAT_ID
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
