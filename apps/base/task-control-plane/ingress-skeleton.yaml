apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: task-control-plane
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: myrobertson-com-gateway
      namespace: default
  hostnames:
    - tasks.myrobertson.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /chat
      backendRefs:
        - name: agent-service
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /webhooks/telegram
      backendRefs:
        - name: agent-service
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vikunja
          port: 3456
