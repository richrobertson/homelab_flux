apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - configmaps.yaml
  - secret-stubs.yaml
  - postgres
  - redis
  - vikunja
  - agent-service
  - nudge-worker
  - ingress-skeleton.yaml
replacements:
  - source:
      kind: ConfigMap
      name: task-control-plane-settings
      fieldPath: data.ingressHost
    targets:
      - select:
          kind: HTTPRoute
          name: task-control-plane
        fieldPaths:
          - spec.hostnames.0
  - source:
      kind: ConfigMap
      name: task-control-plane-settings
      fieldPath: data.ingressGatewayRef
    targets:
      - select:
          kind: HTTPRoute
          name: task-control-plane
        fieldPaths:
          - spec.parentRefs.0.name
