---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: mealie
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    mealie:
      api:
        general:
          baseUrl: https://mealie.dev.myrobertson.net
    persistence:
      data:
        enabled: true
        existingClaim: mealie-data-ceph
        targetSelector:
          main:
            main:
              mountPath: /app/data
    cnpg:
      main:
        cluster:
          instances: 1
          storage:
            storageClass: ceph-block
          walStorage:
            storageClass: ceph-block
        