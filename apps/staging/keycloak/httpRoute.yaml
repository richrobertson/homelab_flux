apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: default
spec:
  parentRefs:
    - name: myrobertson-com-gateway
      namespace: default
      sectionName: keycloak
  hostnames: ["keycloak.staging.myrobertson.net"]
  rules:
    - backendRefs:
        - name: keycloak
          port: 80
