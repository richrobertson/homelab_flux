apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/task-control-plane
patches:
  - patch: |
      - op: replace
        path: /data/environment
        value: staging
      - op: replace
        path: /data/ingressHost
        value: tasks.staging.myrobertson.net
      - op: replace
        path: /data/ingressGatewayRef
        value: myrobertson-com-gateway
    target:
      kind: ConfigMap
      name: task-control-plane-settings
  - patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: staging
      - op: replace
        path: /data/VIKUNJA_BASE_URL
        value: https://tasks.staging.myrobertson.net
    target:
      kind: ConfigMap
      name: agent-service-config
  - patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: staging
      - op: replace
        path: /data/VIKUNJA_BASE_URL
        value: https://tasks.staging.myrobertson.net
    target:
      kind: ConfigMap
      name: nudge-worker-config
  - patch: |
      - op: replace
        path: /spec/path
        value: task-control-plane/staging/openai
    target:
      kind: VaultStaticSecret
      name: task-control-plane-openai
  - patch: |
      - op: replace
        path: /spec/path
        value: task-control-plane/staging/vikunja-oidc
    target:
      kind: VaultStaticSecret
      name: vikunja-oidc-secret
  - patch: |
      - op: replace
        path: /spec/path
        value: task-control-plane/staging/vikunja
    target:
      kind: VaultStaticSecret
      name: task-control-plane-vikunja
  - patch: |
      - op: replace
        path: /spec/values/vikunja/env/VIKUNJA_AUTH_OPENID_PROVIDER
        value: https://auth.staging.myrobertson.net
      - op: replace
        path: /spec/values/vikunja/env/VIKUNJA_AUTH_OPENID_LOGOUTURL
        value: https://auth.staging.myrobertson.net/logout
      - op: replace
        path: /spec/values/vikunja/configMaps/config/data/config\.yml
        value: |
          service:
            publicurl: https://tasks.staging.myrobertson.net/
            enableregistration: false
            timezone: UTC
          log:
            level: INFO
    target:
      kind: HelmRelease
      name: vikunja
  - patch: |
      - op: replace
        path: /spec/path
        value: task-control-plane/staging/vikunja-oidc
    target:
      kind: VaultStaticSecret
      name: vikunja-oidc-secret
  - patch: |
      - op: replace
        path: /spec/path
        value: task-control-plane/staging/vikunja
    target:
      kind: VaultStaticSecret
      name: task-control-plane-vikunja
  - patch: |
      - op: replace
        path: /spec/values/vikunja/env/VIKUNJA_AUTH_OPENID_PROVIDER
        value: https://auth.staging.myrobertson.net
    target:
      kind: HelmRelease
      name: vikunja
