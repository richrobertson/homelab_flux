apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/task-control-plane
  - secret-stubs.yaml
patches:
  - patch: |
      - op: replace
        path: /data/environment
        value: staging
      - op: replace
        path: /data/ingressHost
        value: tasks.staging.myrobertson.net
      - op: replace
        path: /data/ingressGatewayRef
        value: myrobertson-com-gateway
    target:
      kind: ConfigMap
      name: task-control-plane-settings
  - patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: staging
      - op: replace
        path: /data/VIKUNJA_BASE_URL
        value: https://tasks.staging.myrobertson.net
    target:
      kind: ConfigMap
      name: agent-service-config
  - patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: staging
      - op: replace
        path: /data/VIKUNJA_BASE_URL
        value: https://tasks.staging.myrobertson.net
      - op: replace
        path: /data/NTFY_BASE_URL
        value: http://ntfy.default.svc.cluster.local
    target:
      kind: ConfigMap
      name: nudge-worker-config
  - patch: |
      $patch: delete
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultStaticSecret
      metadata:
        name: task-control-plane-openai
    target:
      kind: VaultStaticSecret
      name: task-control-plane-openai
  - patch: |
      $patch: delete
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultStaticSecret
      metadata:
        name: task-control-plane-app
    target:
      kind: VaultStaticSecret
      name: task-control-plane-app
  - patch: |
      - op: replace
        path: /stringData/client_id
        value: vikunja_staging
    target:
      kind: Secret
      name: vikunja-oidc-secret
  - patch: |
      $patch: delete
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultStaticSecret
      metadata:
        name: task-control-plane-vikunja
    target:
      kind: VaultStaticSecret
      name: task-control-plane-vikunja
  - patch: |
      - op: replace
        path: /spec/values/vikunja/env/VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_AUTHURL
        value: https://auth.staging.myrobertson.net
      - op: replace
        path: /spec/values/vikunja/env/VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_LOGOUTURL
        value: https://auth.staging.myrobertson.net/logout
      - op: replace
        path: /spec/values/vikunja/configMaps/config/data/config.yml
        value: |
          service:
            publicurl: https://tasks.staging.myrobertson.net/
            enableregistration: false
            timezone: UTC
          auth:
            local:
              enabled: false
            openid:
              enabled: true
              providers:
                authelia:
                  name: Authelia
                  authurl: https://auth.staging.myrobertson.net
                  logouturl: https://auth.staging.myrobertson.net/logout
                  clientid: ""
                  clientsecret: ""
                  scope: openid profile email groups
          log:
            level: INFO
    target:
      kind: HelmRelease
      name: vikunja
  - patch: |
      - op: add
        path: /spec/postRenderers
        value:
          - kustomize:
              patches:
                - target:
                    kind: Deployment
                    name: vikunja
                  patch: |
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: vikunja
                    spec:
                      template:
                        spec:
                          containers:
                            - name: vikunja
                              env:
                                - name: SSL_CERT_FILE
                                  value: /etc/ssl/certs/auth-staging-ca.crt
                              volumeMounts:
                                - name: auth-staging-ca
                                  mountPath: /etc/ssl/certs/auth-staging-ca.crt
                                  subPath: ca.crt
                                  readOnly: true
                          volumes:
                            - name: auth-staging-ca
                              secret:
                                secretName: auth-staging-myrobertson-net-cert
                                items:
                                  - key: ca.crt
                                    path: ca.crt
    target:
      kind: HelmRelease
      name: vikunja
  - patch: |
      - op: replace
        path: /spec/hostnames/0
        value: tasks.staging.myrobertson.net
      - op: remove
        path: /metadata/annotations/external-dns.alpha.kubernetes.io~1cloudflare-proxied
    target:
      kind: HTTPRoute
      name: task-control-plane
