apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/netbootxyz
  - httpRoute.yaml
  - config-ceph-pvc-v2.yaml
  - assets-ceph-pvc-v2.yaml
patches:
  - patch: |
      - op: replace
        path: /spec/template/spec/volumes/0/persistentVolumeClaim/claimName
        value: netbootxyz-config-ceph-v2
      - op: replace
        path: /spec/template/spec/volumes/1/persistentVolumeClaim/claimName
        value: netbootxyz-assets-ceph-v2
    target:
      kind: Deployment
      name: netbootxyz
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: netbootxyz-config-ceph
        namespace: default
    target:
      kind: PersistentVolumeClaim
      name: netbootxyz-config-ceph
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: netbootxyz-assets-ceph
        namespace: default
    target:
      kind: PersistentVolumeClaim
      name: netbootxyz-assets-ceph
