apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nextcloud-migration-cnpg
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: nextcloud-migration
spec:
  instances: 1
  enableSuperuserAccess: false
  storage:
    size: 5Gi
    storageClass: ceph-block
  walStorage:
    size: 1Gi
    storageClass: ceph-block
  managed:
    roles:
      - name: nextcloud
        login: true
        superuser: false
  bootstrap:
    initdb:
      database: nextcloud
      owner: nextcloud
