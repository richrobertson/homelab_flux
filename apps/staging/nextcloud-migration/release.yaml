apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-migration
spec:
  interval: 1h
  chart:
    spec:
      chart: nextcloud
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    replicaCount: 1

    image:
      repository: nextcloud
      tag: 33-apache
      pullPolicy: IfNotPresent

    nextcloud:
      host: nextcloud-migration.nextcloud.svc.cluster.local
      trustedDomains:
        - nextcloud-migration
        - nextcloud-migration.nextcloud
        - nextcloud-migration.nextcloud.svc
        - nextcloud-migration.nextcloud.svc.cluster.local
      existingSecret:
        enabled: true
        secretName: nextcloud-migration-secret
        usernameKey: NEXTCLOUD_ADMIN_USER
        passwordKey: NEXTCLOUD_ADMIN_PASSWORD
        smtpUsernameKey: SMTP_USERNAME
        smtpPasswordKey: SMTP_PASSWORD
      extraEnv:
        - name: OVERWRITEPROTOCOL
          value: "http"
        - name: OVERWRITECLIURL
          value: "http://nextcloud-migration.nextcloud.svc.cluster.local"
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_proxies' => ['10.0.0.0/8'],
            'forwarded_for_headers' => ['HTTP_X_FORWARDED_FOR'],
            'overwrite.cli.url' => getenv('OVERWRITECLIURL') ?: 'http://nextcloud-migration.nextcloud.svc.cluster.local',
            'overwriteprotocol' => getenv('OVERWRITEPROTOCOL') ?: 'http',
          );
        migration-sandbox.config.php: |-
          <?php
          $CONFIG = array(
            'maintenance_window_start' => 7,
            'default_phone_region' => 'US',
            'enable_previews' => false,
          );
      phpConfigs:
        migration.ini: |-
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
          memory_limit = 1G
      hooks:
        before-starting: |-
          #!/bin/sh
          set -eu

          OCC_STATUS="$(php occ status 2>/dev/null || true)"
          if ! printf '%s\n' "${OCC_STATUS}" | grep -q 'installed: true'; then
            echo "Nextcloud not installed yet; skipping full-text search bootstrap."
            exit 0
          fi

          if printf '%s\n' "${OCC_STATUS}" | grep -q 'needsDbUpgrade: true'; then
            echo "Nextcloud upgrade pending; skipping full-text search bootstrap."
            exit 0
          fi

          install_or_enable_app() {
            app="$1"
            if php occ app:enable "${app}"; then
              return 0
            fi
            if php occ app:install "${app}"; then
              php occ app:enable "${app}" || true
              return 0
            fi
            echo "WARNING: unable to install or enable Nextcloud app ${app}"
            return 0
          }

          for app in fulltextsearch fulltextsearch_elasticsearch files_fulltextsearch; do
            install_or_enable_app "${app}"
          done

          app_enabled() {
            php occ app:list | grep -q "^  - $1:"
          }

          if app_enabled fulltextsearch && \
             app_enabled fulltextsearch_elasticsearch && \
             app_enabled files_fulltextsearch; then
            php occ fulltextsearch:configure '{"search_platform":"OCA\\FullTextSearch_Elasticsearch\\Platform\\ElasticSearchPlatform"}'
            php occ fulltextsearch_elasticsearch:configure '{"elastic_host":"http://nextcloud-search-es-http.nextcloud.svc.cluster.local:9200","elastic_index":"nextcloud_staging","elastic_logger_enabled":false,"analyzer_tokenizer":"standard","allow_self_signed_cert":false}'
            php occ files_fulltextsearch:configure '{"files_local":true,"files_external":0,"files_group_folders":false,"files_size":20,"files_office":true,"files_pdf":true,"files_zip":false,"files_chunk_size":2,"files_open_result_directly":false}'
          else
            echo "Full-text search apps are not all enabled; skipping Elasticsearch bootstrap."
          fi

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-migration-cnpg-rw:5432
      database: nextcloud
      user: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-migration-cnpg-app
        usernameKey: user
        passwordKey: password

    persistence:
      enabled: true
      existingClaim: nextcloud-migration-html
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data
        accessMode: ReadWriteMany
        size: 10Ti

    redis:
      enabled: true
      image:
        repository: bitnamilegacy/redis
      auth:
        enabled: false
      master:
        persistence:
          enabled: false
      replica:
        persistence:
          enabled: false

    metrics:
      enabled: false

    service:
      type: ClusterIP
      port: 80

    ingress:
      enabled: false

    cronjob:
      enabled: true

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
