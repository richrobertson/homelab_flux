- op: replace
  path: /spec/values/nextcloud/host
  value: cloud.staging.myrobertson.net
- op: replace
  path: /spec/values/nextcloud/extraEnv/1/value
  value: https://cloud.staging.myrobertson.net
- op: add
  path: /spec/values/nextcloud/extraEnv/-
  value:
    name: COLLABORA_PUBLIC_URL
    value: https://office.staging.myrobertson.net
- op: add
  path: /spec/values/collabora
  value:
    enabled: true
    collabora:
      aliasgroups:
        - host: "https://cloud.staging.myrobertson.net:443"
      extra_params: "--o:ssl.enable=false --o:ssl.termination=true"
      server_name: office.staging.myrobertson.net
      existingSecret:
        enabled: true
        secretName: collabora-secret
    ingress:
      enabled: false
- op: add
  path: /spec/values/nextcloud/configs/objectstore-s3.config.php
  value: |-
    <?php
    $CONFIG = array(
      'objectstore' => array(
        'class' => '\\OC\\Files\\ObjectStore\\S3',
        'arguments' => array(
          'bucket'         => getenv('BUCKET_NAME'),
          'key'            => getenv('AWS_ACCESS_KEY_ID'),
          'secret'         => getenv('AWS_SECRET_ACCESS_KEY'),
          'hostname'       => getenv('BUCKET_HOST'),
          'port'           => 443,
          'use_ssl'        => true,
          'use_path_style' => true,
          'region'         => 'us-east-1',
        ),
      ),
    );
- op: add
  path: /spec/values/nextcloud/extraEnvFrom
  value:
    - secretRef:
        name: nextcloud-s3-staging
    - configMapRef:
        name: nextcloud-s3-staging
