apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  values:
    plex:
      disableGDM: false
      requireHTTPS: false

    workload:
      main:
        podSpec:
          containers:
            main:
              securityContext:
                # Staging-only POC override: allow access to DRM char devices for hardware transcode validation.
                privileged: true
              env:
                ALLOWED_NETWORKS: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16"
