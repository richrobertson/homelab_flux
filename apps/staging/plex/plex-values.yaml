apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: plex
            patch: |
              - op: replace
                path: /spec/template/spec/affinity
                value: {}
              - op: add
                path: /spec/template/spec/nodeSelector/kubernetes.io~1hostname
                value: k8s-stg-worker-0
  values:
    plex:
      disableGDM: false
      requireHTTPS: false

    resources:
      limits:
        cpu: 4000m
        memory: 8Gi
        gpu.intel.com/i915: "1"

    workload:
      main:
        replicas: 1
        podSpec:
          containers:
            main:
              securityContext:
                privileged: false
                allowPrivilegeEscalation: false
              env:
                ALLOWED_NETWORKS: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16"
