apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: mealie
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: mealie
              spec:
                template:
                  spec:
                    containers:
                      - name: mealie
                        env:
                          - name: SSL_CERT_FILE
                            value: /etc/ssl/certs/keycloak-staging-ca-bundle.crt
                        volumeMounts:
                          - name: keycloak-staging-ca-bundle
                            mountPath: /etc/ssl/certs/keycloak-staging-ca-bundle.crt
                            subPath: keycloak-staging-ca-bundle.crt
                            readOnly: true
                    volumes:
                      - name: keycloak-staging-ca-bundle
                        configMap:
                          name: keycloak-staging-ca-bundle
                          items:
                            - key: keycloak-staging-ca-bundle.crt
                              path: keycloak-staging-ca-bundle.crt
  values:

    # service:
    #   main:
    #     ports:
    #       main:
    #         port: 10018
    #         protocol: http
    mealie:
      api:
        general:
          baseUrl: https://mealie.staging.myrobertson.net
    server:
      controllers:
        main:
          replicas: 1
    workload:
      main:
        podSpec:
          containers:
            main:
              env: 
                API_PORT: "10018"
                LOG_LEVEL: debug
                DB_ENGINE: postgres
                POSTGRES_USER: mealie
                POSTGRES_SERVER: mealie-cnpg-main-rw
                POSTGRES_DB: mealie
                POSTGRES_PORT: "5432"
                POSTGRES_PASSWORD:
                  secretKeyRef:
                    name: mealie-cnpg-main-user
                    key: password
                    expandObjectName: false
                ALLOW_PASSWORD_LOGIN: "false"
                OIDC_ADMIN_GROUP: proxAdmins
                OIDC_AUTH_ENABLED: "true"
                OIDC_AUTO_REDIRECT: "true"
                OIDC_CLIENT_ID: mealie_staging
                OIDC_CLIENT_SECRET:
                  secretKeyRef:
                    name: keycloak-secret
                    key: mealie-staging-client-secret
                    expandObjectName: false
                OIDC_CONFIGURATION_URL: https://sso.staging.myrobertson.net/realms/homelab/.well-known/openid-configuration
                OIDC_GROUPS_CLAIM: groups
                OIDC_NAME_CLAIM: name
                OIDC_SIGNUP_ENABLED: "true"
                OIDC_TLS_CACERTFILE: /etc/ssl/certs/keycloak-staging-ca-bundle.crt
                OIDC_USER_CLAIM: preferred_username
                OIDC_USER_GROUP: proxAdmins
              envFrom:
                - secretRef:
                    name: mealie-oidc
                    expandObjectName: false
   
