apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  values:

    # service:
    #   main:
    #     ports:
    #       main:
    #         port: 10018
    #         protocol: http
    mealie:
      api:
        general:
          baseUrl: https://mealie.staging.myrobertson.net
    server:
      controllers:
        main:
          replicas: 1
    workload:
      main:
        podSpec:
          containers:
            main:
              env: 
                API_PORT: "10018"
                LOG_LEVEL: debug
              envFrom:
                - secretRef:
                    name: mealie-oidc
                    expandObjectName: false
   