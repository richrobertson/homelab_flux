apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-migration-clean
spec:
  interval: 1h
  chart:
    spec:
      chart: nextcloud
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    replicaCount: 1

    image:
      repository: nextcloud
      tag: 33-apache
      pullPolicy: IfNotPresent

    nextcloud:
      host: nextcloud-migration-clean.nextcloud.svc.cluster.local
      trustedDomains:
        - nextcloud-migration-clean
        - nextcloud-migration-clean.nextcloud
        - nextcloud-migration-clean.nextcloud.svc
        - nextcloud-migration-clean.nextcloud.svc.cluster.local
      existingSecret:
        enabled: true
        secretName: nextcloud-migration-secret
        usernameKey: NEXTCLOUD_ADMIN_USER
        passwordKey: NEXTCLOUD_ADMIN_PASSWORD
        smtpUsernameKey: SMTP_USERNAME
        smtpPasswordKey: SMTP_PASSWORD
      extraEnv:
        - name: OVERWRITEPROTOCOL
          value: "http"
        - name: OVERWRITECLIURL
          value: "http://nextcloud-migration-clean.nextcloud.svc.cluster.local"
        - name: NEXTCLOUD_ENABLE_SERVER_SIDE_ENCRYPTION
          value: "true"
        - name: NEXTCLOUD_ELASTICSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-search-es-elastic-user
              key: elastic
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_domains' => [
              'localhost',
              'nextcloud-migration-clean',
              'nextcloud-migration-clean.nextcloud',
              'nextcloud-migration-clean.nextcloud.svc',
              'nextcloud-migration-clean.nextcloud.svc.cluster.local',
            ],
            'trusted_proxies' => ['10.0.0.0/8'],
            'forwarded_for_headers' => ['HTTP_X_FORWARDED_FOR'],
            'overwrite.cli.url' => getenv('OVERWRITECLIURL') ?: 'http://nextcloud-migration-clean.nextcloud.svc.cluster.local',
            'overwriteprotocol' => getenv('OVERWRITEPROTOCOL') ?: 'http',
          );
        migration-clean.config.php: |-
          <?php
          $CONFIG = array(
            'maintenance_window_start' => 7,
            'default_phone_region' => 'US',
            'enable_previews' => false,
            'skeletondirectory' => '',
          );
      phpConfigs:
        migration.ini: |-
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
          memory_limit = 1G
      hooks:
        before-starting: |-
          #!/bin/sh
          set -eu

          OCC_STATUS="$(php occ status 2>/dev/null || true)"
          if ! printf '%s\n' "${OCC_STATUS}" | grep -q 'installed: true'; then
            echo "Nextcloud not installed yet; skipping migration sandbox encryption bootstrap."
            exit 0
          fi

          if printf '%s\n' "${OCC_STATUS}" | grep -q 'needsDbUpgrade: true'; then
            echo "Nextcloud upgrade pending; skipping migration sandbox encryption bootstrap."
            exit 0
          fi

          if [ "${NEXTCLOUD_ENABLE_SERVER_SIDE_ENCRYPTION:-false}" = "true" ]; then
            php occ app:enable encryption || true
            php occ encryption:enable || true
            php occ encryption:set-default-module OC_DEFAULT_MODULE || true
            php occ encryption:status | grep -q 'enabled: true'
            php occ encryption:status | grep -q 'defaultModule: OC_DEFAULT_MODULE'
          fi

          install_or_enable_app() {
            app="$1"
            if php occ app:enable "${app}"; then
              return 0
            fi
            if php occ app:install "${app}"; then
              php occ app:enable "${app}" || true
              return 0
            fi
            echo "WARNING: unable to install or enable Nextcloud app ${app}"
            return 0
          }

          for app in fulltextsearch fulltextsearch_elasticsearch files_fulltextsearch; do
            install_or_enable_app "${app}"
          done

          app_enabled() {
            php occ app:list | grep -q "^  - $1:"
          }

          if app_enabled fulltextsearch && \
             app_enabled fulltextsearch_elasticsearch && \
             app_enabled files_fulltextsearch; then
            ELASTICSEARCH_PASSWORD_ENCODED="$(php -r 'echo rawurlencode(getenv("NEXTCLOUD_ELASTICSEARCH_PASSWORD") ?: "");')"
            ELASTICSEARCH_HOST="http://elastic:${ELASTICSEARCH_PASSWORD_ENCODED}@nextcloud-search-es-http.nextcloud.svc.cluster.local:9200"
            php occ fulltextsearch:configure --quiet '{"search_platform":"OCA\\FullTextSearch_Elasticsearch\\Platform\\ElasticSearchPlatform"}'
            php occ fulltextsearch_elasticsearch:configure --quiet "{\"elastic_host\":\"${ELASTICSEARCH_HOST}\",\"elastic_index\":\"nextcloud_staging_clean\",\"elastic_logger_enabled\":false,\"analyzer_tokenizer\":\"standard\",\"allow_self_signed_cert\":false}"
            php occ files_fulltextsearch:configure --quiet '{"files_local":true,"files_external":0,"files_group_folders":false,"files_size":20,"files_office":true,"files_pdf":true,"files_zip":false,"files_chunk_size":2,"files_open_result_directly":false}'
          else
            echo "Full-text search apps are not all enabled; skipping Elasticsearch bootstrap."
          fi

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-migration-clean-cnpg-rw:5432
      database: nextcloud
      user: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-migration-clean-cnpg-app
        usernameKey: user
        passwordKey: password

    persistence:
      enabled: true
      existingClaim: nextcloud-migration-clean-html
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data
        subPath: strategy-a-clean-data
        accessMode: ReadWriteMany
        size: 10Ti

    redis:
      enabled: true
      image:
        repository: bitnamilegacy/redis
      auth:
        enabled: false
      master:
        persistence:
          enabled: false
      replica:
        persistence:
          enabled: false

    metrics:
      enabled: false

    service:
      type: ClusterIP
      port: 80

    ingress:
      enabled: false

    cronjob:
      enabled: true

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
