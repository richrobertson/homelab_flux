apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/syncthing
  - httpRoute.yaml
  - auth-policy.yaml
  - config-ceph-pvc-v2.yaml
patches:
  - path: syncthing-values.yaml
    target:
      kind: HelmRelease
  - patch: |
      - op: replace
        path: /spec/values/persistence/config/existingClaim
        value: syncthing-config-ceph-v2
    target:
      kind: HelmRelease
      name: syncthing
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: syncthing-config-ceph
        namespace: default
    target:
      kind: PersistentVolumeClaim
      name: syncthing-config-ceph
