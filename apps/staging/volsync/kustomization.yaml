apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/volsync
  - gateway.yaml
patches:
  - path: volsync-values.yaml
    target:
      kind: HelmRelease
  - patch: |
      - op: replace
        path: /metadata/annotations/cert-manager.io~1common-name
        value: volsync.staging.myrobertson.net
      - op: replace
        path: /spec/listeners/0/hostname
        value: volsync.staging.myrobertson.net
      - op: replace
        path: /spec/infrastructure/annotations/external-dns.alpha.kubernetes.io~1hostname
        value: volsync.staging.myrobertson.net
    target:
      kind: Gateway
      name: volsync
  - patch: |
      - op: replace
        path: /spec/hostnames/0
        value: volsync.staging.myrobertson.net
    target:
      kind: HTTPRoute
      name: volsync
  - patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi
    target:
      kind: PersistentVolumeClaim
      name: volsync-data-files-pvc
  - patch: |
      - op: replace
        path: /spec/path
        value: oidc/staging
    target:
      kind: VaultStaticSecret
      name: volsync-oidc-secret