apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - authelia
  - bitwarden
  - code-server
  - external-dns
  - gotify
  - guacamole
  - immich
  - lidarr
  - loki-stack
  - mealie
  - n8n
  - netbootxyz
  - ntfy
  - overseerr
  - plex
  - prowlarr
  - radarr
  - redis-operator-namespace.yaml
  - sonarr
  - task-control-plane
  - tautulli
  - nextcloud
  - nextcloud-migration
  - nextcloud-migration-clean
  - trilium
patches:
  - patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 1Gi
    target:
      kind: PersistentVolumeClaim
      name: bitwarden-data-ceph|gotify-data-ceph-v3|overseerr-config-ceph|prowlarr-config-ceph|radarr-config-ceph|tautulli-config-ceph-v2|trilium-data-ceph-v2
  - patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi
    target:
      kind: PersistentVolumeClaim
      name: code-server-data-ceph|netbootxyz-assets-ceph-v2|netbootxyz-config-ceph-v2|nextcloud-data-pvc-ceph-v2|plex-config-ceph|syncthing-config-ceph-v2|immich-data-files-pvc-ceph-v2
  - patch: |
      - op: replace
        path: /spec/storage/size
        value: 2Gi
    target:
      kind: Cluster
      name: cluster-authelia-ceph|cluster-immich-ceph
  - patch: |
      - op: replace
        path: /spec/storage/size
        value: 2Gi
      - op: replace
        path: /spec/walStorage/size
        value: 1Gi
    target:
      kind: Cluster
      name: n8n-cnpg|nextcloud-cnpg
  - patch: |
      - op: replace
        path: /spec/storage/volumeClaimTemplate/spec/resources/requests/storage
        value: 1Gi
    target:
      kind: Redis
      name: n8n-redis|task-control-plane-redis
  - patch: |
      - op: replace
        path: /spec/values/singleBinary/persistence/size
        value: 2Gi
    target:
      kind: HelmRelease
      name: loki
  - patch: |
      - op: replace
        path: /spec/values/vikunja/persistence/database/size
        value: 5Gi
    target:
      kind: HelmRelease
      name: vikunja
