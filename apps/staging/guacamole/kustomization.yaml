apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: guacamole
resources:
  - ../../base/guacamole
  - httpRoute.yaml
patches:
  - path: patch-env.yaml
    target:
      kind: Deployment
      name: guacamole
  - patch: |
      - op: replace
        path: /spec/storage/size
        value: 2Gi
      - op: replace
        path: /spec/walStorage/size
        value: 1Gi
    target:
      kind: Cluster
      name: guacamole-cnpg

