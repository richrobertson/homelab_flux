apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole
spec:
  template:
    spec:
      containers:
        - name: guacamole
          env:
            - name: OPENID_CLIENT_ID
              value: guacamole_staging
            - name: OPENID_ISSUER
              value: https://sso.staging.myrobertson.net/realms/homelab
            - name: OPENID_AUTHORIZATION_ENDPOINT
              value: https://sso.staging.myrobertson.net/realms/homelab/protocol/openid-connect/auth
            - name: OPENID_JWKS_ENDPOINT
              value: https://sso.staging.myrobertson.net/realms/homelab/protocol/openid-connect/certs
            - name: OPENID_REDIRECT_URI
              value: https://rdp.staging.myrobertson.net
