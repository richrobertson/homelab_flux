apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
spec:
  values:
    configMap:
      storage:
        postgres:
          address: tcp://cluster-authelia-ceph-rw.default.svc.cluster.local:5432
      identity_providers:
        oidc:
          enabled: true
          jwks:
            - key_id: main
              algorithm: RS256
              use: sig
              key:
                path: /secrets/internal/identity_providers.oidc.jwks.key
          clients:
            - client_id: mealie_staging
              client_name: Mealie Staging
              client_secret: '$2b$12$G4e2wFGmXCHkQowZZZKOrecbdJik.gd7L5ORyoRVOL7uMZue8SpBW'
              public: false
              authorization_policy: one_factor
              consent_mode: implicit
              redirect_uris:
                - https://mealie.staging.myrobertson.net/login
              scopes:
                - openid
                - profile
                - email
                - groups
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: grafana_staging
              client_name: Grafana Staging
              client_secret: '$2b$12$G4e2wFGmXCHkQowZZZKOrecbdJik.gd7L5ORyoRVOL7uMZue8SpBW'
              public: false
              authorization_policy: one_factor
              consent_mode: implicit
              redirect_uris:
                - https://grafana.staging.myrobertson.net/login/generic_oauth
              scopes:
                - openid
                - profile
                - email
                - groups
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: vikunja_staging
              client_name: Vikunja Staging
              client_secret: '$2b$12$kjY20tnxH8rVDpNccpFqs.fFQYD/F5WkKF8Gr9FOx.z0G5z7qJv4a'
              public: false
              authorization_policy: one_factor
              consent_mode: implicit
              redirect_uris:
                - https://tasks.staging.myrobertson.net/auth/openid/authelia
              scopes:
                - openid
                - profile
                - email
                - groups
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
    secret:
      additionalSecrets: {}
   
