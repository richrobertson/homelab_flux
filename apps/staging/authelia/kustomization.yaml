apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/authelia
  - gateway.yaml
  - auth-policy.yaml
patches:
  - path: remove-legacy-postgres-cluster.yaml
    target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: cluster-authelia
  # Enable after the Ceph seed/final-sync jobs complete.
  # - path: ../../base/authelia/release-ceph-cutover.yaml
  #   target:
  #     kind: HelmRelease
  #     name: authelia
  - path: authelia-values.yaml
    target:
      kind: HelmRelease
      name: authelia
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: authelia-config-ceph
        namespace: default
    target:
      kind: PersistentVolumeClaim
      name: authelia-config-ceph
  - patch: |
      - op: replace
        path: /metadata/annotations/cert-manager.io~1common-name
        value: auth.staging.myrobertson.net
      - op: replace
        path: /spec/listeners/0/hostname
        value: auth.staging.myrobertson.net
      - op: replace
        path: /spec/infrastructure/annotations/external-dns.alpha.kubernetes.io~1hostname
        value: auth.staging.myrobertson.net
    target:
      kind: Gateway
      name: authelia
  - patch: |
      - op: replace
        path: /spec/hostnames/0
        value: auth.staging.myrobertson.net
    target:
      kind: HTTPRoute
      name: authelia
  # - patch: |
  #     - op: replace
  #       path: /spec/path
  #       value: oidc/staging
  #   target:
  #     kind: VaultStaticSecret
  #     name: authelia-oidc-secret