apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/authelia
  - httpRoute.yaml
patches:
  - path: remove-legacy-postgres-cluster.yaml
    target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: cluster-authelia
  - path: authelia-values.yaml
    target:
      kind: HelmRelease
      name: authelia
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: authelia-config-ceph
        namespace: default
    target:
      kind: PersistentVolumeClaim
      name: authelia-config-ceph
