apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/authelia
  - gateway.yaml
patches:
  # - path: authelia-values.yaml
  #   target:
  #     kind: HelmRelease
  - patch: |
      - op: replace
        path: /metadata/annotations/cert-manager.io~1common-name
        value: auth.staging.myrobertson.net
      - op: replace
        path: /spec/listeners/0/hostname
        value: auth.staging.myrobertson.net
      - op: replace
        path: /spec/infrastructure/annotations/external-dns.alpha.kubernetes.io~1hostname
        value: auth.staging.myrobertson.net
    target:
      kind: Gateway
      name: authelia
  - patch: |
      - op: replace
        path: /spec/hostnames/0
        value: auth.staging.myrobertson.net
    target:
      kind: HTTPRoute
      name: authelia
  # - patch: |
  #     - op: replace
  #       path: /spec/path
  #       value: oidc/staging
  #   target:
  #     kind: VaultStaticSecret
  #     name: authelia-oidc-secret