---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cluster-immich 
spec:
  managed:
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: "cluster-immich-lb"
              annotations:
                external-dns.alpha.kubernetes.io/hostname: immich-db.staging.myrobertson.net
            spec:
              type: LoadBalancer