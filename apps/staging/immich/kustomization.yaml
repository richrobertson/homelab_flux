apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - gateway.yaml
  - ../../base/immich
patches:
  - path: immich-values.yaml
    target:
      kind: HelmRelease
  - patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi
    target:
      kind: PersistentVolumeClaim
      name: immich-data-files-pvc
  - patch: |
      - op: replace
        path: /spec/imageName
        value: ghcr.io/tensorchord/cloudnative-vectorchord:16.5@sha256:72c2c656c65b9ae345f92028a236a763d40a02339676e6ad4ada63f85e95795e
      - op: add
        path: /spec/postgresql/shared_preload_libraries/-
        value: "vchord.so"
      - op: replace
        path: /spec/bootstrap/initdb/postInitSql
        value: |
          CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
    target:
      kind: Cluster
      name: cluster-immich