apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - gateway.yaml
  - ../../base/immich
patches:
  - path: immich-values.yaml
    target:
      kind: HelmRelease
  - patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi
    target:
      kind: PersistentVolumeClaim
      name: immich-data-files-pvc
  - path: immich-cluster.yaml
    target:
      kind: Cluster

  - patch: |
     - op: remove
        path: /spec/bootstrap/initdb/postInitSQL
    target:
      kind: Cluster
      name: cluster-immich