apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: redis-operator
resources:
  - ../../base/redis-operator
patches:
  - target:
      version: v1
      kind: Namespace
      name: redis-operator
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: redis-operator
