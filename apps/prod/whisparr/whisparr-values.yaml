apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whisparr
spec:
  values:
    image:
      repository: ghcr.io/hotio/whisparr
      pullPolicy: IfNotPresent
      tag: latest
    whisparr:
      api:
        general:
          baseUrl: https://whisparr.myrobertson.com
    workload:
      main:
        replicas: 1
    persistence:
      media:
        enabled: true
      downloads:
        enabled: true
   