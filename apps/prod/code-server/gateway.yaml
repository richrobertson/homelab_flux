---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: code-server
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
    cert-manager.io/common-name: code.myrobertson.com
    cert-manager.io/private-key-algorithm: "ECDSA"
spec:
  gatewayClassName: istio
  listeners:
  - name: code-server
    hostname: code.myrobertson.com
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: code-server-cert
  infrastructure:
    labels:
      istio-injection: enabled
    annotations:
      external-dns.alpha.kubernetes.io/hostname: code.myrobertson.com
