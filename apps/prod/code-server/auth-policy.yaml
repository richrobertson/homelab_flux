apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: auth-policy-code-server
  namespace: default
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: code-server
  action: CUSTOM
  provider:
    name: authelia-net
  rules:
    - to:
        - operation:
            hosts:
              - code.prod.myrobertson.net
