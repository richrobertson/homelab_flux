apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/syncthing
  - httpRoute.yaml
  - auth-policy.yaml
patches:
  - path: syncthing-values.yaml
    target:
      kind: HelmRelease
  - patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 100Gi
    target:
      kind: PersistentVolumeClaim
      name: syncthing-config-ceph
  - path: syncthing-config-pvc-storageclass-patch.yaml
    target:
      kind: PersistentVolumeClaim
      name: syncthing-config-ceph
