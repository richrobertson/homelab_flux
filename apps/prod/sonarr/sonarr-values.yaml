apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ServiceMonitor
              name: sonarr
            patch: |
              - op: add
                path: /spec/endpoints/0/scrapeTimeout
                value: "30s"
          - target:
              kind: Deployment
              name: sonarr
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: sonarr
              spec:
                template:
                  spec:
                    containers:
                      - name: sonarr
                        resources:
                          requests:
                            memory: 1Gi
                      - name: sonarr-exportarr
                        resources:
                          requests:
                            memory: 128Mi
  values:

    sonarr:
      api:
        general:
          baseUrl: https://sonarr.myrobertson.com
    workload:
      main:
        replicas: 1
    persistence:
      media:
        enabled: true
      downloads:
        enabled: true
