apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: guacamole
resources:
  - ../../base/guacamole
  - httpRoute.yaml
  - httpRedirect.yaml
patches:
  - path: patch-env.yaml
    target:
      kind: Deployment
      name: guacamole
  - patch: |
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: guacamole-cnpg
        annotations:
          cnpg.io/skipEmptyWalArchiveCheck: enabled
    target:
      kind: Cluster
      name: guacamole-cnpg
