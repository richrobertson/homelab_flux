apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lidarr
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: lidarr
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: lidarr
              spec:
                template:
                  spec:
                    containers:
                      - name: lidarr
                        resources:
                          requests:
                            memory: 512Mi
                      - name: lidarr-exportarr
                        resources:
                          requests:
                            memory: 128Mi
  values:

    lidarr:
      api:
        general:
          baseUrl: https://lidarr.myrobertson.com
    workload:
      main:
        replicas: 1
    persistence:
      media:
        enabled: true
      downloads:
        enabled: true
