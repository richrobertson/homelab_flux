---
apiVersion: v1
kind: ConfigMap
metadata:
  name: restic-unlock-script
  namespace: default
data:
  unlock.sh: |
    #!/bin/sh
    set -e
    
    echo "=== Starting volsync stale lock cleanup ==="
    echo "Time: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
    
    # Install restic
    apk add --no-cache restic > /dev/null 2>&1

    # Detect and clean stuck volsync mover pods.
    # A pod is considered stuck if it is not making progress for >= 5 minutes.
    # Include Error so failed movers that leave repository locks are cleaned quickly.
    MAX_STUCK_MINUTES="${STUCK_POD_MAX_AGE_MINUTES:-5}"
    STUCK_FOUND=0
    STUCK_CLEANED=0

    age_to_minutes() {
      age="$1"
      num="${age%[smhd]}"
      unit="${age#${num}}"
      case "$unit" in
        s) echo 0 ;;
        m) echo "$num" ;;
        h) echo $((num * 60)) ;;
        d) echo $((num * 1440)) ;;
        *) echo 0 ;;
      esac
    }

    echo "=== Checking for stuck/failed volsync backup pods (>= ${MAX_STUCK_MINUTES}m) ==="
    POD_LINES=$(kubectl get pods -n default --no-headers 2>/dev/null | awk '/^volsync-src-/ {print $1" "$3" "$5}')
    if [ -n "$POD_LINES" ]; then
      echo "$POD_LINES" >/tmp/volsync_pods.txt
      while read -r POD STATUS AGE; do
        [ -z "$POD" ] && continue
        AGE_MIN=$(age_to_minutes "$AGE")
        case "$STATUS" in
          Pending|ContainerCreating|Running|Error)
            if [ "$AGE_MIN" -ge "$MAX_STUCK_MINUTES" ]; then
              STUCK_FOUND=$((STUCK_FOUND + 1))
              BASE=$(echo "$POD" | sed -E 's/^volsync-src-(.*)-[a-z0-9]{5}$/\1/')
              echo "Stuck mover pod detected: $POD status=$STATUS age=$AGE"
              kubectl delete pod -n default "$POD" --ignore-not-found >/dev/null 2>&1 || true
              kubectl delete job -n default "volsync-src-${BASE}" --ignore-not-found >/dev/null 2>&1 || true
              kubectl delete pvc -n default "volsync-${BASE}-src" --ignore-not-found >/dev/null 2>&1 || true
              kubectl delete pvc -n default "volsync-src-${BASE}-cache" --ignore-not-found >/dev/null 2>&1 || true
              echo "Cleaned stuck resources for base=$BASE"
              STUCK_CLEANED=$((STUCK_CLEANED + 1))
            fi
            ;;
        esac
      done </tmp/volsync_pods.txt
      rm -f /tmp/volsync_pods.txt
    fi
    echo "Stuck pods found:   $STUCK_FOUND"
    echo "Stuck pods cleaned: $STUCK_CLEANED"
    
    # Get all restic-config Secrets
    SECRETS=$(kubectl get secret -n default -o name | grep restic-config- || true)
    
    if [ -z "$SECRETS" ]; then
      echo "No restic-config secrets found"
      exit 0
    fi
    
    TOTAL=0
    CLEANED=0
    FAILED=0
    SKIPPED_UNREFERENCED=0
    SKIPPED_UNINITIALIZED=0

    # Build an allowlist of repositories currently referenced by active VolSync objects.
    # This avoids noisy warnings from operator-managed secrets that are no longer in use.
    REFERENCED_REPOS_FILE="/tmp/referenced-restic-repos.txt"
    {
      kubectl get replicationsources.volsync.backube -n default -o jsonpath='{range .items[*]}{.spec.restic.repository}{"\n"}{end}' 2>/dev/null || true
      kubectl get replicationdestinations.volsync.backube -n default -o jsonpath='{range .items[*]}{.spec.restic.repository}{"\n"}{end}' 2>/dev/null || true
    } | sed '/^$/d' | sort -u > "$REFERENCED_REPOS_FILE"
    
    for SECRET_REF in $SECRETS; do
      SECRET_NAME=$(echo "$SECRET_REF" | cut -d'/' -f2)

      if [ -s "$REFERENCED_REPOS_FILE" ] && ! grep -Fxq "$SECRET_NAME" "$REFERENCED_REPOS_FILE"; then
        echo ""
        echo "--- Skipping $SECRET_NAME ---"
        echo "ℹ️  Not referenced by active VolSync objects"
        SKIPPED_UNREFERENCED=$((SKIPPED_UNREFERENCED + 1))
        continue
      fi

      TOTAL=$((TOTAL + 1))
      
      echo ""
      echo "--- Processing $SECRET_NAME ---"
      
      # Extract restic credentials from the Secret
      export AWS_ACCESS_KEY_ID=$(kubectl get secret "$SECRET_NAME" -n default -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' 2>/dev/null | base64 -d || echo "")
      export AWS_SECRET_ACCESS_KEY=$(kubectl get secret "$SECRET_NAME" -n default -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' 2>/dev/null | base64 -d || echo "")
      export AWS_REGION=$(kubectl get secret "$SECRET_NAME" -n default -o jsonpath='{.data.AWS_REGION}' 2>/dev/null | base64 -d || echo "")
      export AWS_DEFAULT_REGION=$(kubectl get secret "$SECRET_NAME" -n default -o jsonpath='{.data.AWS_DEFAULT_REGION}' 2>/dev/null | base64 -d || echo "")
      export RESTIC_PASSWORD=$(kubectl get secret "$SECRET_NAME" -n default -o jsonpath='{.data.RESTIC_PASSWORD}' 2>/dev/null | base64 -d || echo "")
      export RESTIC_REPOSITORY=$(kubectl get secret "$SECRET_NAME" -n default -o jsonpath='{.data.RESTIC_REPOSITORY}' 2>/dev/null | base64 -d || echo "")
      
      # Validate required fields
      if [ -z "$RESTIC_PASSWORD" ] || [ -z "$RESTIC_REPOSITORY" ]; then
        echo "⚠️  Missing required restic credentials in $SECRET_NAME, skipping..."
        FAILED=$((FAILED + 1))
        continue
      fi
      
      # Try to detect and remove stale locks
      if OUTPUT=$(restic list locks 2>&1); then
        LOCK_COUNT=$(echo "$OUTPUT" | wc -l)
        if [ "$LOCK_COUNT" -gt 0 ]; then
          echo "Found $LOCK_COUNT lock(s), attempting to remove stale locks..."
          if restic unlock --remove-all 2>&1; then
            echo "✓ Successfully removed stale locks from $SECRET_NAME"
            CLEANED=$((CLEANED + 1))
          else
            echo "✗ Failed to remove locks from $SECRET_NAME"
            FAILED=$((FAILED + 1))
          fi
        else
          echo "✓ No locks found in $SECRET_NAME"
          CLEANED=$((CLEANED + 1))
        fi
      else
        if echo "$OUTPUT" | grep -Eqi 'is there a repository at the following location|unable to open config file'; then
          echo "ℹ️  Repository for $SECRET_NAME is not initialized yet, skipping..."
          SKIPPED_UNINITIALIZED=$((SKIPPED_UNINITIALIZED + 1))
        else
          echo "⚠️  Could not list locks for $SECRET_NAME, skipping..."
          FAILED=$((FAILED + 1))
        fi
      fi
      
      # Clear env vars for next iteration
      unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_REGION AWS_DEFAULT_REGION RESTIC_PASSWORD RESTIC_REPOSITORY
    done
    
    echo ""
    echo "=== Cleanup Summary ==="
    echo "Total repositories checked: $TOTAL"
    echo "Successfully processed:     $CLEANED"
    echo "Skipped (unreferenced):     $SKIPPED_UNREFERENCED"
    echo "Skipped (uninitialized):    $SKIPPED_UNINITIALIZED"
    echo "Failures:                   $FAILED"
    
    if [ "$FAILED" -gt 0 ]; then
      echo "⚠️  Some repositories had issues, but continuing..."
    fi
    
    echo "Completed at: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
    rm -f "$REFERENCED_REPOS_FILE"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: volsync-stale-lock-cleanup
  namespace: default
spec:
  # Run every 10 minutes so stale restic locks are cleared promptly.
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: volsync-cleanup
        spec:
          serviceAccountName: volsync-cleanup
          restartPolicy: Never
          containers:
            - name: unlock
              image: alpine:3.20
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache kubectl > /dev/null 2>&1
                  exec /unlock.sh
              volumeMounts:
                - name: script
                  mountPath: /unlock.sh
                  subPath: unlock.sh
                  readOnly: true
              securityContext:
                runAsNonRoot: false
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
          volumes:
            - name: script
              configMap:
                name: restic-unlock-script
                defaultMode: 0555
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: volsync-cleanup
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: volsync-cleanup
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources", "replicationdestinations"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: volsync-cleanup
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: volsync-cleanup
subjects:
  - kind: ServiceAccount
    name: volsync-cleanup
    namespace: default
