apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-migration-ldap
spec:
  interval: 1h
  chart:
    spec:
      chart: nextcloud
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    replicaCount: 1

    image:
      repository: nextcloud
      tag: 33-apache
      pullPolicy: IfNotPresent

    nextcloud:
      host: cloud.myrobertson.com
      trustedDomains:
        - localhost
        - cloud.myrobertson.com
        - nextcloud-migration-ldap
        - nextcloud-migration-ldap.nextcloud
        - nextcloud-migration-ldap.nextcloud.svc
        - nextcloud-migration-ldap.nextcloud.svc.cluster.local
      existingSecret:
        enabled: true
        secretName: nextcloud-migration-secret
        usernameKey: NEXTCLOUD_ADMIN_USER
        passwordKey: NEXTCLOUD_ADMIN_PASSWORD
      extraEnv:
        - name: OVERWRITEPROTOCOL
          value: "https"
        - name: OVERWRITECLIURL
          value: "https://cloud.myrobertson.com"
        - name: NEXTCLOUD_ENABLE_SERVER_SIDE_ENCRYPTION
          value: "true"
        - name: LDAP_ENABLED
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_ENABLED
              optional: true
        - name: LDAP_HOST
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_HOST
              optional: true
        - name: LDAP_PORT
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_PORT
              optional: true
        - name: LDAP_BASE_DN
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BASE_DN
              optional: true
        - name: LDAP_BIND_DN
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BIND_DN
              optional: true
        - name: LDAP_BIND_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BIND_PASSWORD
              optional: true
        - name: LDAP_LOGIN_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_LOGIN_FILTER
              optional: true
        - name: LDAP_USER_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_USER_FILTER
              optional: true
        - name: LDAP_GROUP_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_GROUP_FILTER
              optional: true
        - name: LDAP_TLS
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_TLS
              optional: true
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_domains' => [
              'localhost',
              'cloud.myrobertson.com',
              'nextcloud-migration-ldap',
              'nextcloud-migration-ldap.nextcloud',
              'nextcloud-migration-ldap.nextcloud.svc',
              'nextcloud-migration-ldap.nextcloud.svc.cluster.local',
            ],
            'trusted_proxies' => ['10.0.0.0/8'],
            'forwarded_for_headers' => ['HTTP_X_FORWARDED_FOR'],
            'overwrite.cli.url' => getenv('OVERWRITECLIURL') ?: 'https://cloud.myrobertson.com',
            'overwriteprotocol' => getenv('OVERWRITEPROTOCOL') ?: 'https',
          );
        migration-ldap.config.php: |-
          <?php
          $CONFIG = array(
            'maintenance_window_start' => 7,
            'default_phone_region' => 'US',
            'enable_previews' => false,
            'skeletondirectory' => '',
          );
      phpConfigs:
        migration.ini: |-
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
          memory_limit = 1G
      hooks:
        before-starting: |-
          #!/bin/sh
          set -eu

          OCC_STATUS="$(php occ status 2>/dev/null || true)"
          if ! printf '%s\n' "${OCC_STATUS}" | grep -q 'installed: true'; then
            echo "Nextcloud not installed yet; skipping LDAP and encryption bootstrap."
            exit 0
          fi

          if printf '%s\n' "${OCC_STATUS}" | grep -q 'needsDbUpgrade: true'; then
            echo "Nextcloud upgrade pending; skipping LDAP and encryption bootstrap."
            exit 0
          fi

          if [ "${NEXTCLOUD_ENABLE_SERVER_SIDE_ENCRYPTION:-false}" = "true" ]; then
            php occ app:enable encryption || true
            php occ encryption:enable || true
            php occ encryption:set-default-module OC_DEFAULT_MODULE || true
            php occ encryption:status | grep -q 'enabled: true'
            php occ encryption:status | grep -q 'defaultModule: OC_DEFAULT_MODULE'
          fi

          if [ "${LDAP_ENABLED:-false}" != "true" ]; then
            exit 0
          fi

          if [ -z "${LDAP_HOST:-}" ] || [ -z "${LDAP_BASE_DN:-}" ] || [ -z "${LDAP_BIND_DN:-}" ] || [ -z "${LDAP_BIND_PASSWORD:-}" ]; then
            echo "LDAP enabled but required LDAP_* values are missing; skipping LDAP bootstrap."
            exit 0
          fi

          php occ app:enable user_ldap || php occ app:install user_ldap || true

          if php occ ldap:show-config s01 >/dev/null 2>&1; then
            LDAP_CFG_ID="s01"
          else
            LDAP_CFG_ID="$(php occ ldap:create-empty-config 2>/dev/null | awk '/Created new config/{print $6}' | tail -1)"
            LDAP_CFG_ID="${LDAP_CFG_ID:-s01}"
          fi

          LDAP_PORT="${LDAP_PORT:-389}"
          LDAP_LOGIN_FILTER="${LDAP_LOGIN_FILTER:-(&(|(objectclass=person)(objectclass=user))(|(sAMAccountName=%uid)(userPrincipalName=%uid)(mail=%uid)))}"
          LDAP_USER_FILTER="${LDAP_USER_FILTER:-(|(objectclass=person)(objectclass=user))}"
          LDAP_GROUP_FILTER="${LDAP_GROUP_FILTER:-(|(objectclass=group)(objectclass=groupOfNames))}"
          LDAP_TLS="${LDAP_TLS:-1}"

          php occ ldap:set-config "${LDAP_CFG_ID}" ldapConfigurationActive 1
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapHost "${LDAP_HOST}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapPort "${LDAP_PORT}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapBase "${LDAP_BASE_DN}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapBaseUsers "${LDAP_BASE_DN}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapBaseGroups "${LDAP_BASE_DN}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapAgentName "${LDAP_BIND_DN}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapAgentPassword "${LDAP_BIND_PASSWORD}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapLoginFilter "${LDAP_LOGIN_FILTER}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapUserFilter "${LDAP_USER_FILTER}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapGroupFilter "${LDAP_GROUP_FILTER}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapTLS "${LDAP_TLS}"
          php occ ldap:set-config "${LDAP_CFG_ID}" turnOffCertCheck 1
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapEmailAttribute mail
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapLoginFilterEmail 1
          php occ ldap:test-config "${LDAP_CFG_ID}"

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-migration-ldap-cnpg-rw:5432
      database: nextcloud
      user: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-migration-ldap-cnpg-app
        usernameKey: user
        passwordKey: password

    persistence:
      enabled: true
      existingClaim: nextcloud-migration-ldap-html
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data
        subPath: strategy-a-prod-ldap-data
        accessMode: ReadWriteMany
        size: 10Ti

    redis:
      enabled: true
      image:
        repository: bitnamilegacy/redis
      auth:
        enabled: false
      master:
        persistence:
          enabled: false
      replica:
        persistence:
          enabled: false

    metrics:
      enabled: false

    service:
      type: ClusterIP
      port: 80

    ingress:
      enabled: false

    cronjob:
      enabled: true

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
