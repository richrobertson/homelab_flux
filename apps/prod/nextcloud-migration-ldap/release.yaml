apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-migration-ldap
spec:
  interval: 1h
  chart:
    spec:
      chart: nextcloud
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  install:
    disableWait: true
  upgrade:
    disableWait: true
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: nextcloud-migration-ldap
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/startupProbe
                value:
                  httpGet:
                    path: /status.php
                    port: 80
                    scheme: HTTP
                    httpHeaders:
                      - name: Host
                        value: localhost
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
                  successThreshold: 1
              - op: add
                path: /spec/template/spec/containers/0/livenessProbe/httpGet/httpHeaders
                value:
                  - name: Host
                    value: localhost
              - op: add
                path: /spec/template/spec/containers/0/readinessProbe/httpGet/httpHeaders
                value:
                  - name: Host
                    value: localhost
              - op: add
                path: /spec/template/spec/containers/0/args
                value:
                  - apache2-foreground
                  - -C
                  - ServerName cloud.myrobertson.com
  values:
    replicaCount: 1

    image:
      repository: nextcloud
      tag: 33.0.3-apache
      pullPolicy: IfNotPresent

    nextcloud:
      host: cloud.myrobertson.com
      trustedDomains:
        - localhost
        - cloud.myrobertson.com
        - nextcloud-migration-ldap
        - nextcloud-migration-ldap.nextcloud
        - nextcloud-migration-ldap.nextcloud.svc
        - nextcloud-migration-ldap.nextcloud.svc.cluster.local
      existingSecret:
        enabled: true
        secretName: nextcloud-migration-secret
        usernameKey: NEXTCLOUD_ADMIN_USER
        passwordKey: NEXTCLOUD_ADMIN_PASSWORD
      extraEnv:
        - name: OVERWRITEPROTOCOL
          value: "https"
        - name: OVERWRITECLIURL
          value: "https://cloud.myrobertson.com"
        - name: NEXTCLOUD_ENABLE_SERVER_SIDE_ENCRYPTION
          value: "true"
        - name: NEXTCLOUD_OIDC_ENABLED
          value: "true"
        - name: NEXTCLOUD_OIDC_PROVIDER_ID
          value: keycloak
        - name: NEXTCLOUD_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: nextcloud-oidc-secret
              key: OIDC_CLIENT_ID
        - name: NEXTCLOUD_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: nextcloud-oidc-secret
              key: OIDC_CLIENT_SECRET
        - name: NEXTCLOUD_OIDC_DISCOVERY_URI
          value: https://sso.myrobertson.com/realms/homelab/.well-known/openid-configuration
        - name: NEXTCLOUD_OIDC_SCOPE
          value: "openid email profile groups nextcloud_uid"
        - name: NEXTCLOUD_OIDC_EXTRA_CLAIMS
          value: "nextcloud_uid"
        - name: NEXTCLOUD_ELASTICSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-search-es-elastic-user
              key: elastic
        - name: NEXTCLOUD_OIDC_MAPPING_UID
          value: nextcloud_uid
        - name: NEXTCLOUD_OIDC_ALLOW_MULTIPLE_USER_BACKENDS
          value: "1"
        - name: NEXTCLOUD_OIDC_GROUP_PROVISIONING
          value: "0"
        - name: LDAP_ENABLED
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_ENABLED
              optional: true
        - name: LDAP_HOST
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_HOST
              optional: true
        - name: LDAP_PORT
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_PORT
              optional: true
        - name: LDAP_BASE_DN
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BASE_DN
              optional: true
        - name: LDAP_BIND_DN
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BIND_DN
              optional: true
        - name: LDAP_BIND_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_BIND_PASSWORD
              optional: true
        - name: LDAP_LOGIN_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_LOGIN_FILTER
              optional: true
        - name: LDAP_USER_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_USER_FILTER
              optional: true
        - name: LDAP_GROUP_FILTER
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_GROUP_FILTER
              optional: true
        - name: LDAP_TLS
          valueFrom:
            secretKeyRef:
              name: nextcloud-ldap-secret
              key: LDAP_TLS
              optional: true
        - name: NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-mail-provisioning
              key: MASTER_PASSWORD
              optional: true
        - name: COLLABORA_PUBLIC_URL
          value: https://office.myrobertson.com
        - name: COLLABORA_WOPI_URL
          value: http://nextcloud-migration-ldap-collabora.nextcloud.svc.cluster.local:9980
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_domains' => [
              'localhost',
              'cloud.myrobertson.com',
              'nextcloud-migration-ldap',
              'nextcloud-migration-ldap.nextcloud',
              'nextcloud-migration-ldap.nextcloud.svc',
              'nextcloud-migration-ldap.nextcloud.svc.cluster.local',
            ],
            'trusted_proxies' => ['10.0.0.0/8'],
            'forwarded_for_headers' => ['HTTP_X_FORWARDED_FOR'],
            'overwrite.cli.url' => getenv('OVERWRITECLIURL') ?: 'https://cloud.myrobertson.com',
            'overwriteprotocol' => getenv('OVERWRITEPROTOCOL') ?: 'https',
          );
        migration-ldap.config.php: |-
          <?php
          $CONFIG = array(
            'maintenance_window_start' => 7,
            'default_phone_region' => 'US',
            'enable_previews' => false,
            'skeletondirectory' => '',
            'user_oidc' => [
              'auto_provision' => true,
              'soft_auto_provision' => true,
              'disable_account_creation' => true,
              'enrich_login_id_token_with_userinfo' => true,
            ],
          );
      phpConfigs:
        migration.ini: |-
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
          memory_limit = 1G
      extraSidecarContainers:
        - name: nextcloud-fulltext-live
          image: nextcloud:33.0.3-apache
          imagePullPolicy: IfNotPresent
          workingDir: /var/www/html
          command:
            - sh
            - -c
            - |
              set -eu
              until php occ status 2>/dev/null | grep -q 'installed: true'; do
                sleep 15
              done
              while php occ status 2>/dev/null | grep -q 'needsDbUpgrade: true'; do
                sleep 60
              done
              while true; do
                php occ fulltextsearch:live --service --no-warnings || true
                sleep 30
              done
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/
              subPath: root
            - name: nextcloud-main
              mountPath: /var/www/html
              subPath: html
            - name: nextcloud-data
              mountPath: /var/www/html/data
              subPath: strategy-a-prod-ldap-data/data
            - name: nextcloud-main
              mountPath: /var/www/html/config
              subPath: config
            - name: nextcloud-main
              mountPath: /var/www/html/custom_apps
              subPath: custom_apps
            - name: nextcloud-main
              mountPath: /var/www/tmp
              subPath: tmp
            - name: nextcloud-main
              mountPath: /var/www/html/themes
              subPath: themes
            - name: nextcloud-config
              mountPath: /var/www/html/config/migration-ldap.config.php
              subPath: migration-ldap.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/proxy.config.php
              subPath: proxy.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/.htaccess
              subPath: .htaccess
            - name: nextcloud-config
              mountPath: /var/www/html/config/apache-pretty-urls.config.php
              subPath: apache-pretty-urls.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/apcu.config.php
              subPath: apcu.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/apps.config.php
              subPath: apps.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/autoconfig.php
              subPath: autoconfig.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/redis.config.php
              subPath: redis.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/reverse-proxy.config.php
              subPath: reverse-proxy.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/s3.config.php
              subPath: s3.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/smtp.config.php
              subPath: smtp.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/swift.config.php
              subPath: swift.config.php
            - name: nextcloud-config
              mountPath: /var/www/html/config/upgrade-disable-web.config.php
              subPath: upgrade-disable-web.config.php
            - name: nextcloud-phpconfig
              mountPath: /usr/local/etc/php/conf.d/migration.ini
              subPath: migration.ini
        - name: nextcloud-log-tail
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              while [ ! -f /var/www/html/data/nextcloud.log ]; do
                sleep 5
              done
              tail -n 1000 -F /var/www/html/data/nextcloud.log
          volumeMounts:
            - name: nextcloud-data
              mountPath: /var/www/html/data
              subPath: strategy-a-prod-ldap-data/data
      hooks:
        before-starting: |-
          #!/bin/sh
          set -eu

          OCC_STATUS="$(php occ status 2>/dev/null || true)"
          if ! printf '%s\n' "${OCC_STATUS}" | grep -q 'installed: true'; then
            echo "Nextcloud not installed yet; skipping LDAP and encryption bootstrap."
            exit 0
          fi

          if printf '%s\n' "${OCC_STATUS}" | grep -q 'needsDbUpgrade: true'; then
            echo "Nextcloud upgrade pending; skipping LDAP and encryption bootstrap."
            exit 0
          fi

          php occ config:system:set mail_smtpmode --value=smtp
          php occ config:system:set mail_smtphost --value=mailu-postfix.default.svc.cluster.local
          php occ config:system:set mail_smtpport --type=integer --value=25
          php occ config:system:set mail_smtpauth --type=boolean --value=false
          php occ config:system:set mail_from_address --value=calendar
          php occ config:system:set mail_domain --value=myrobertson.net
          php occ config:system:delete mail_smtpsecure || true
          php occ config:system:delete mail_smtpname || true
          php occ config:system:delete mail_smtppassword || true

          if [ "${NEXTCLOUD_ENABLE_SERVER_SIDE_ENCRYPTION:-false}" = "true" ]; then
            php occ app:enable encryption || true
            php occ encryption:enable || true
            php occ encryption:set-default-module OC_DEFAULT_MODULE || true
            php occ encryption:status | grep -q 'enabled: true'
            php occ encryption:status | grep -q 'defaultModule: OC_DEFAULT_MODULE'
          fi

          if [ "${NEXTCLOUD_OIDC_ENABLED:-false}" = "true" ]; then
            php occ config:system:set allow_local_remote_servers --type=boolean --value=true

            if [ -z "${NEXTCLOUD_OIDC_CLIENT_ID:-}" ] || [ -z "${NEXTCLOUD_OIDC_CLIENT_SECRET:-}" ] || [ -z "${NEXTCLOUD_OIDC_DISCOVERY_URI:-}" ]; then
              echo "OIDC enabled but required NEXTCLOUD_OIDC_* values are missing; skipping OIDC bootstrap."
            elif php occ app:enable user_oidc || php occ app:install user_oidc; then
              OIDC_PROVIDER_ID="${NEXTCLOUD_OIDC_PROVIDER_ID:-keycloak}"
              php occ user_oidc:provider "${OIDC_PROVIDER_ID}" \
                --clientid="${NEXTCLOUD_OIDC_CLIENT_ID}" \
                --clientsecret-env=NEXTCLOUD_OIDC_CLIENT_SECRET \
                --discoveryuri="${NEXTCLOUD_OIDC_DISCOVERY_URI}" \
                --scope="${NEXTCLOUD_OIDC_SCOPE:-openid email profile groups}" \
                --extra-claims="${NEXTCLOUD_OIDC_EXTRA_CLAIMS:-}" \
                --unique-uid="${NEXTCLOUD_OIDC_UNIQUE_UID:-0}" \
                --mapping-uid="${NEXTCLOUD_OIDC_MAPPING_UID:-sub}" \
                --mapping-email="${NEXTCLOUD_OIDC_MAPPING_EMAIL:-email}" \
                --mapping-display-name="${NEXTCLOUD_OIDC_MAPPING_DISPLAY_NAME:-name}" \
                --mapping-groups="${NEXTCLOUD_OIDC_MAPPING_GROUPS:-groups}" \
                --group-provisioning="${NEXTCLOUD_OIDC_GROUP_PROVISIONING:-0}" \
                --check-bearer="${NEXTCLOUD_OIDC_CHECK_BEARER:-0}" \
                --bearer-provisioning="${NEXTCLOUD_OIDC_BEARER_PROVISIONING:-0}"
              if [ "${OIDC_PROVIDER_ID}" != "authelia" ]; then
                php occ user_oidc:provider:delete authelia --force || true
              fi
              php occ config:app:set --type=string --value="${NEXTCLOUD_OIDC_ALLOW_MULTIPLE_USER_BACKENDS:-1}" user_oidc allow_multiple_user_backends
            else
              echo "OIDC: failed to install or enable user_oidc; skipping provider bootstrap."
            fi
          fi

          install_or_enable_app() {
            app="$1"
            if php occ app:enable "${app}"; then
              return 0
            fi
            if php occ app:install "${app}"; then
              php occ app:enable "${app}" || true
              return 0
            fi
            echo "WARNING: unable to install or enable Nextcloud app ${app}"
            return 0
          }

          for app in \
            calendar \
            contacts \
            drawio \
            end_to_end_encryption \
            files_fulltextsearch \
            fulltextsearch \
            fulltextsearch_elasticsearch \
            integration_giphy \
            integration_google \
            integration_immich \
            libresign \
            mail \
            notes \
            richdocuments \
            spreed \
            tables \
            whiteboard
          do
            install_or_enable_app "${app}"
          done

          app_enabled() {
            php occ app:list | grep -q "^  - $1:"
          }

          configure_elasticsearch_index() {
            INDEX_NAME="$1"
            if ! command -v curl >/dev/null 2>&1; then
              return 0
            fi
            curl -fsS -o /dev/null \
              -u "elastic:${NEXTCLOUD_ELASTICSEARCH_PASSWORD}" \
              -H 'Content-Type: application/json' \
              -X PUT 'http://nextcloud-search-es-http.nextcloud.svc.cluster.local:9200/_index_template/nextcloud-fulltext' \
              -d '{"index_patterns":["nextcloud_*"],"template":{"settings":{"number_of_replicas":0}}}' || true
            curl -fsS -o /dev/null \
              -u "elastic:${NEXTCLOUD_ELASTICSEARCH_PASSWORD}" \
              -H 'Content-Type: application/json' \
              -X PUT "http://nextcloud-search-es-http.nextcloud.svc.cluster.local:9200/${INDEX_NAME}/_settings" \
              -d '{"index":{"number_of_replicas":0}}' || true
          }

          if app_enabled fulltextsearch && \
             app_enabled fulltextsearch_elasticsearch && \
             app_enabled files_fulltextsearch; then
            ELASTICSEARCH_PASSWORD_ENCODED="$(php -r 'echo rawurlencode(getenv("NEXTCLOUD_ELASTICSEARCH_PASSWORD") ?: "");')"
            ELASTICSEARCH_HOST="http://elastic:${ELASTICSEARCH_PASSWORD_ENCODED}@nextcloud-search-es-http.nextcloud.svc.cluster.local:9200"
            php occ fulltextsearch:configure --quiet '{"search_platform":"OCA\\FullTextSearch_Elasticsearch\\Platform\\ElasticSearchPlatform"}'
            php occ fulltextsearch_elasticsearch:configure --quiet "{\"elastic_host\":\"${ELASTICSEARCH_HOST}\",\"elastic_index\":\"nextcloud_prod\",\"elastic_logger_enabled\":false,\"analyzer_tokenizer\":\"standard\",\"allow_self_signed_cert\":false}"
            php occ files_fulltextsearch:configure --quiet '{"files_local":true,"files_external":0,"files_group_folders":false,"files_size":20,"files_office":true,"files_pdf":true,"files_zip":false,"files_chunk_size":2,"files_open_result_directly":false}'
            configure_elasticsearch_index nextcloud_prod
          else
            echo "Full-text search apps are not all enabled; skipping Elasticsearch bootstrap."
          fi

          if [ -n "${COLLABORA_PUBLIC_URL:-}" ]; then
            COLLABORA_WOPI_URL="${COLLABORA_WOPI_URL:-${COLLABORA_PUBLIC_URL}}"

            collabora_activate() {
              php occ richdocuments:activate-config \
                --wopi-url="${COLLABORA_WOPI_URL}" \
                --callback-url="${OVERWRITECLIURL:-https://cloud.myrobertson.com}"
            }

            for i in $(seq 1 30); do
              if collabora_activate; then
                php occ app:disable richdocumentscode || true
                php occ config:app:set richdocuments public_wopi_url --value="${COLLABORA_PUBLIC_URL}" || true
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Collabora: unable to validate discovery after 30 attempts; keeping configured values for the next startup."
                php occ config:app:set richdocuments wopi_url --value="${COLLABORA_WOPI_URL}" || true
                php occ config:app:set richdocuments wopi_callback_url --value="${OVERWRITECLIURL:-https://cloud.myrobertson.com}" || true
                php occ config:app:set richdocuments public_wopi_url --value="${COLLABORA_PUBLIC_URL}" || true
                break
              fi
              echo "Collabora: waiting for discovery endpoint... (attempt $i/30)"
              sleep 2
            done
          fi

          if php occ app:list | grep -q '^  - mail:' && [ -n "${NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD:-}" ]; then
            php -r '
          require_once "/var/www/html/lib/base.php";

          $data = [
              "provisioningDomain" => "myrobertson.net",
              "emailTemplate" => "%EMAIL%",
              "imapUser" => "%EMAIL%*nextcloud",
              "imapHost" => "mailu-dovecot.default.svc.cluster.local",
              "imapPort" => 143,
              "imapSslMode" => "none",
              "smtpUser" => "%EMAIL%*nextcloud",
              "smtpHost" => "mailu-postfix.default.svc.cluster.local",
              "smtpPort" => 10025,
              "smtpSslMode" => "none",
              "masterPasswordEnabled" => true,
              "masterPassword" => getenv("NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD"),
              "sieveEnabled" => false,
              "sieveHost" => "",
              "sieveUser" => "",
              "sievePort" => null,
              "sieveSslMode" => "",
              "ldapAliasesProvisioning" => false,
              "ldapAliasesAttribute" => "",
          ];

          $manager = \OC::$server->get(\OCA\Mail\Service\Provisioning\Manager::class);
          $configs = $manager->getConfigs();
          $existing = null;
          foreach ($configs as $config) {
              if ($config->getProvisioningDomain() === "myrobertson.net") {
                  $existing = $config;
                  break;
              }
          }

          if ($existing !== null) {
              $data["id"] = $existing->getId();
              $manager->updateProvisioning($data);
          } else {
              $manager->newProvisioning($data);
          }

          $count = $manager->provision();
          $userManager = \OC::$server->get(\OCP\IUserManager::class);
          $configs = $manager->getConfigs();
          $userManager->callForAllUsers(function (\OCP\IUser $user) use ($manager, $configs) {
              $email = $user->getEMailAddress();
              if ($email !== null && str_ends_with(strtolower($email), "@myrobertson.net")) {
                  $manager->updatePassword($user, getenv("NEXTCLOUD_MAIL_PROVISIONING_MASTER_PASSWORD"), $configs);
              }
          });

          echo "Mail: provisioned or updated {$count} accounts.\n";
          '
          fi

          if [ "${LDAP_ENABLED:-false}" != "true" ]; then
            exit 0
          fi

          if [ -z "${LDAP_HOST:-}" ] || [ -z "${LDAP_BASE_DN:-}" ] || [ -z "${LDAP_BIND_DN:-}" ] || [ -z "${LDAP_BIND_PASSWORD:-}" ]; then
            echo "LDAP enabled but required LDAP_* values are missing; skipping LDAP bootstrap."
            exit 0
          fi

          php occ app:enable user_ldap || php occ app:install user_ldap || true

          if php occ ldap:show-config s01 >/dev/null 2>&1; then
            LDAP_CFG_ID="s01"
          else
            LDAP_CFG_ID="$(php occ ldap:create-empty-config 2>/dev/null | awk '/Created new config/{print $6}' | tail -1)"
            LDAP_CFG_ID="${LDAP_CFG_ID:-s01}"
          fi

          LDAP_PORT="${LDAP_PORT:-389}"
          LDAP_LOGIN_FILTER="${LDAP_LOGIN_FILTER:-(&(|(objectclass=person)(objectclass=user))(|(sAMAccountName=%uid)(userPrincipalName=%uid)(mail=%uid)))}"
          LDAP_USER_FILTER="${LDAP_USER_FILTER:-(|(objectclass=person)(objectclass=user))}"
          LDAP_GROUP_FILTER="${LDAP_GROUP_FILTER:-(|(objectclass=group)(objectclass=groupOfNames))}"
          LDAP_TLS="${LDAP_TLS:-1}"
          LDAP_ADMIN_GROUP="${LDAP_ADMIN_GROUP:-Domain Admins}"

          php occ ldap:set-config "${LDAP_CFG_ID}" ldapConfigurationActive 1
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapHost "${LDAP_HOST}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapPort "${LDAP_PORT}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapBase "${LDAP_BASE_DN}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapBaseUsers "${LDAP_BASE_DN}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapBaseGroups "${LDAP_BASE_DN}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapAgentName "${LDAP_BIND_DN}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapAgentPassword "${LDAP_BIND_PASSWORD}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapLoginFilter "${LDAP_LOGIN_FILTER}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapUserFilter "${LDAP_USER_FILTER}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapGroupFilter "${LDAP_GROUP_FILTER}"
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapTLS "${LDAP_TLS}"
          php occ ldap:set-config "${LDAP_CFG_ID}" turnOffCertCheck 1
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapEmailAttribute mail
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapLoginFilterEmail 1
          php occ ldap:set-config "${LDAP_CFG_ID}" ldapAdminGroup "${LDAP_ADMIN_GROUP}"
          php occ ldap:test-config "${LDAP_CFG_ID}"
          php occ user:list --output=json | php -r '
          $users = json_decode(stream_get_contents(STDIN), true) ?: [];
          foreach (array_keys($users) as $uid) {
              if (preg_match("/^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$/", $uid)) {
                  passthru("php occ user:setting " . escapeshellarg($uid) . " user_ldap isDeleted 0", $rc);
                  if ($rc !== 0) {
                      exit($rc);
                  }
              }
          }
          '

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-migration-ldap-cnpg-rw:5432
      database: nextcloud
      user: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-migration-ldap-cnpg-app
        usernameKey: user
        passwordKey: password

    persistence:
      enabled: true
      existingClaim: nextcloud-migration-ldap-html
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data
        subPath: strategy-a-prod-ldap-data
        accessMode: ReadWriteMany
        size: 10Ti

    collabora:
      enabled: true
      collabora:
        aliasgroups:
          - host: "https://cloud.myrobertson.com:443"
        extra_params: "--o:ssl.enable=false --o:ssl.termination=true"
