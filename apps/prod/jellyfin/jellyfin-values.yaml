apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chart:
    spec:
      version: ">=2.0.0"
  test:
    enable: false
  values:
    # -- Additional volumes to mount in the Jellyfin pod.
    volumes: 
      - name: xxx
        nfs:
          path: /volume1/janice/xxx
          server: scooter.myrobertson.net

    # -- Additional volume mounts for the Jellyfin container.
    volumeMounts: 
      - name: xxx
        mountPath: /var/xxx