apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: myrobertson-com-gateway
      namespace: default
      sectionName: keycloak
  hostnames: ["sso.myrobertson.com"]
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /admin/homelab/console/
            statusCode: 302
    - matches:
        - path:
            type: Exact
            value: /admin
        - path:
            type: Exact
            value: /admin/
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /admin/homelab/console/
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /realms/master
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /admin/homelab/console/
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /admin/master
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /admin/homelab/console/
            statusCode: 302
    - backendRefs:
        - name: keycloak
          port: 80
