apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/mealie
  - httpRoute.yaml
  - postgres-scheduled-backup.yaml
patches:
  - path: mealie-values.yaml
    target:
      kind: HelmRelease
  - patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi
    target:
      kind: PersistentVolumeClaim
      name: mealie-data-files-pvc
  - patch: |
      - op: replace
        path: /spec/path
        value: oidc/prod
    target:
      kind: VaultStaticSecret
      name: mealie-oidc-secret
  - patch: |
      - op: add
        path: /spec/backup
        value:
          barmanObjectStore:
            destinationPath: s3://myrobertson-homelab-terraform/cnpg/mealie-cnpg-main
            endpointURL: https://s3.us-west-2.amazonaws.com
            wal:
              compression: gzip
              encryption: AES256
            data:
              compression: gzip
              encryption: AES256
            s3Credentials:
              accessKeyId:
                name: cnpg-backup-s3
                key: AWS_ACCESS_KEY_ID
              secretAccessKey:
                name: cnpg-backup-s3
                key: AWS_SECRET_ACCESS_KEY
          retentionPolicy: 30d
    target:
      kind: Cluster
      name: mealie-cnpg-main