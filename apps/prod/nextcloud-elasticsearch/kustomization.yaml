apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nextcloud
resources:
  - ../../base/nextcloud-elasticsearch
patches:
  - patch: |
      - op: replace
        path: /spec/nodeSets/0/count
        value: 3
      - op: add
        path: /spec/nodeSets/0/podTemplate/spec/affinity
        value:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node-role.kubernetes.io/control-plane
                      operator: DoesNotExist
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    elasticsearch.k8s.elastic.co/cluster-name: nextcloud-search
                topologyKey: kubernetes.io/hostname
      - op: add
        path: /spec/nodeSets/0/podTemplate/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                elasticsearch.k8s.elastic.co/cluster-name: nextcloud-search
    target:
      kind: Elasticsearch
      name: nextcloud-search
