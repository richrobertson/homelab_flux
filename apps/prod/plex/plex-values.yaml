apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  interval: 1h
  values:
    image:
      registry: ghcr.io
      repository: richrobertson/plex-vaapi
      tag: "20260411-160525"
      pullPolicy: IfNotPresent
    nodeSelector:
      intel.feature.node.kubernetes.io/gpu: "true"
    # Do not reintroduce ADVERTISE_IP here.
    # On April 23-24, 2026, forcing custom advertised URLs caused
    # plex.myrobertson.com gateway requests and local playback to fail
    # until the override was removed and Plex was restarted.
    pms:
      resources:
        requests:
          cpu: 500m
          gpu.intel.com/i915: "1"
          memory: 1Gi
        limits:
          cpu: 12000m
          gpu.intel.com/i915: "1"
          memory: 8Gi
