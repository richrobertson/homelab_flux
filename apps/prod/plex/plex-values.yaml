apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  interval: 1h
  values:
    image:
      registry: ghcr.io
      repository: richrobertson/plex-vaapi
      tag: "20260411-160525"
      pullPolicy: IfNotPresent
    nodeSelector:
      intel.feature.node.kubernetes.io/gpu: "true"
    extraEnv:
      ADVERTISE_IP: "https://plex.myrobertson.com/,http://10.31.0.67:32400/"
    pms:
      resources:
        requests:
          cpu: 500m
          gpu.intel.com/i915: "1"
          memory: 1Gi
        limits:
          cpu: 12000m
          gpu.intel.com/i915: "1"
          memory: 8Gi
