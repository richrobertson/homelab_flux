apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  interval: 1h
  values:
    pms:
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 8Gi
    # Temporary incident mitigation: keep Plex up without external NFS media mounts.
    # Re-enable in this file after scooter NFS exports are healthy.
    extraVolumes: []
    extraVolumeMounts: []
