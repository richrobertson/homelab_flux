apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
spec:
  values:
    configMap:
      identity_providers:
        oidc:
          enabled: true
          jwks:
            - key_id: main
              algorithm: RS256
              use: sig
              key:
                path: /secrets/internal/identity_providers.oidc.jwks.key
          clients:
            - client_id: mealie_prod
              client_name: Mealie
              client_secret: '$2b$12$G4e2wFGmXCHkQowZZZKOrecbdJik.gd7L5ORyoRVOL7uMZue8SpBW'
              public: false
              authorization_policy: one_factor
              redirect_uris:
                - https://mealie.myrobertson.com/login
              scopes:
                - openid
                - profile
                - email
                - groups
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: grafana_prod
              client_name: Grafana Prod
              client_secret: '$2b$12$G4e2wFGmXCHkQowZZZKOrecbdJik.gd7L5ORyoRVOL7uMZue8SpBW'
              public: false
              authorization_policy: one_factor
              redirect_uris:
                - https://grafana.prod.myrobertson.net/login/generic_oauth
              scopes:
                - openid
                - profile
                - email
                - groups
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: vikunja_prod
              client_name: Vikunja
              client_secret: '$2b$12$G4e2wFGmXCHkQowZZZKOrecbdJik.gd7L5ORyoRVOL7uMZue8SpBW'
              public: false
              authorization_policy: one_factor
              redirect_uris:
                - https://tasks.myrobertson.com/auth/openidCallback
              scopes:
                - openid
                - profile
                - email
                - groups
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
    secret:
      additionalSecrets: {}
   
