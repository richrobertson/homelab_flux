apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
spec:
  values:
    configMap:
      server:
        buffers:
          read: 32768
      storage:
        postgres:
          address: tcp://cluster-authelia-ceph-rw.default.svc.cluster.local:5432
      session:
        cookies:
          - domain: "myrobertson.com"
            authelia_url: "https://auth.myrobertson.com"
      definitions:
        user_attributes:
          nextcloud_uid:
            expression: 'username == "rich" ? "E2E0183E-3217-466A-9A90-03B75D668FCD" : username'
          proxmox_groups:
            expression: '"proxAdmins" in groups ? ["proxAdmins"] : []'
      identity_providers:
        oidc:
          enabled: true
          jwks:
            - key_id: main
              algorithm: RS256
              use: sig
              key:
                path: /secrets/internal/identity_providers.oidc.jwks.key
          authorization_policies:
            proxmox_domain_admins:
              default_policy: deny
              rules:
                - subject: 'group:proxAdmins'
                  policy: one_factor
          claims_policies:
            nextcloud:
              id_token:
                - email
                - groups
                - name
                - nextcloud_uid
                - preferred_username
              custom_claims:
                nextcloud_uid:
                  attribute: nextcloud_uid
            proxmox:
              custom_claims:
                proxmox_groups:
                  attribute: proxmox_groups
          scopes:
            nextcloud_uid:
              claims:
                - nextcloud_uid
            proxmox_groups:
              claims:
                - proxmox_groups
          clients:
            - client_id: mealie_prod
              client_name: Mealie
              client_secret: '$2b$12$G4e2wFGmXCHkQowZZZKOrecbdJik.gd7L5ORyoRVOL7uMZue8SpBW'
              public: false
              authorization_policy: one_factor
              consent_mode: implicit
              redirect_uris:
                - https://mealie.myrobertson.com/login
              scopes:
                - openid
                - profile
                - email
                - groups
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: grafana_prod
              client_name: Grafana Prod
              client_secret: '$2b$12$G4e2wFGmXCHkQowZZZKOrecbdJik.gd7L5ORyoRVOL7uMZue8SpBW'
              public: false
              authorization_policy: one_factor
              consent_mode: implicit
              redirect_uris:
                - https://grafana.prod.myrobertson.net/login/generic_oauth
              scopes:
                - openid
                - profile
                - email
                - groups
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: vikunja_prod
              client_name: Vikunja
              client_secret: '$2b$12$kjY20tnxH8rVDpNccpFqs.fFQYD/F5WkKF8Gr9FOx.z0G5z7qJv4a'
              public: false
              authorization_policy: one_factor
              consent_mode: implicit
              redirect_uris:
                - https://tasks.myrobertson.com/auth/openid/authelia
              scopes:
                - openid
                - profile
                - email
                - groups
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: nextcloud_prod
              client_name: Nextcloud
              client_secret: '$2b$12$huUtDpZ2PxHTcApJo2nN7OMigZlgH2ri5YKdukZvsiSvykX/WfDoe'
              public: false
              authorization_policy: one_factor
              consent_mode: implicit
              redirect_uris:
                - https://cloud.myrobertson.com/apps/user_oidc/code
                - https://cloud.myrobertson.com/index.php/apps/user_oidc/code
              scopes:
                - openid
                - profile
                - email
                - groups
                - nextcloud_uid
              claims_policy: nextcloud
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_post
            - client_id: proxmox_prod
              client_name: Proxmox VE cl0
              client_secret:
                path: /secrets/internal/pve_oidc
              public: false
              authorization_policy: proxmox_domain_admins
              claims_policy: proxmox
              consent_mode: implicit
              require_pkce: true
              pkce_challenge_method: S256
              redirect_uris:
                - https://cl0.myrobertson.net:8006
                - https://cl0.myrobertson.net:8006/
                - https://pve3.myrobertson.net:8006
                - https://pve3.myrobertson.net:8006/
                - https://pve4.myrobertson.net:8006
                - https://pve4.myrobertson.net:8006/
                - https://pve5.myrobertson.net:8006
                - https://pve5.myrobertson.net:8006/
              scopes:
                - openid
                - profile
                - email
                - groups
                - proxmox_groups
              response_types:
                - code
              grant_types:
                - authorization_code
              access_token_signed_response_alg: none
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: pbs_prod
              client_name: Proxmox Backup Server
              client_secret:
                path: /secrets/internal/pbs_oidc
              public: false
              authorization_policy: proxmox_domain_admins
              consent_mode: implicit
              redirect_uris:
                - https://pbs.myrobertson.net:8007
                - https://pbs.myrobertson.net:8007/
              scopes:
                - openid
                - profile
                - email
              response_types:
                - code
              grant_types:
                - authorization_code
              access_token_signed_response_alg: none
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: synology_scooter_prod
              client_name: Synology Scooter
              client_secret:
                path: /secrets/internal/synology_scooter_oidc
              public: false
              authorization_policy: one_factor
              consent_mode: implicit
              redirect_uris:
                - https://scooter.myrobertson.net:5011/webman/ssoclient/token_relay.html
                - https://scooter.myrobertson.net:5001/webman/ssoclient/token_relay.html
              scopes:
                - openid
                - profile
                - email
                - groups
              response_types:
                - code
              grant_types:
                - authorization_code
              access_token_signed_response_alg: none
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_post
            - client_id: synology_kermit_prod
              client_name: Synology Kermit
              client_secret:
                path: /secrets/internal/synology_kermit_oidc
              public: false
              authorization_policy: one_factor
              consent_mode: implicit
              redirect_uris:
                - https://kermit.myrobertson.com/webman/ssoclient/token_relay.html
              scopes:
                - openid
                - profile
                - email
                - groups
              response_types:
                - code
              grant_types:
                - authorization_code
              access_token_signed_response_alg: none
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_post
    secret:
      additionalSecrets: {}
   
