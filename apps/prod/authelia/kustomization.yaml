apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  #- change-pvc-permissions.yaml
  - httpRoute.yaml
  - postgres-scheduled-backup.yaml
  - authelia-config-ceph-pvc-v2.yaml
  - ../../base/authelia
patches:
  # Uncomment the following patch to perform the Ceph cutover in prod
  # after the Ceph seed/final-sync jobs complete.
  - path: ../../base/authelia/release-ceph-cutover.yaml
    target:
      kind: HelmRelease
      name: authelia
  - patch: |
      - op: replace
        path: /spec/values/persistence/existingClaim
        value: authelia-config-ceph-v2
    target:
      kind: HelmRelease
      name: authelia
  - path: authelia-values.yaml
    target:
      kind: HelmRelease
      name: authelia
  - patch: |
      $patch: delete
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: cluster-authelia
        namespace: default
    target:
      kind: Cluster
      name: cluster-authelia
  - patch: |
      - op: add
        path: /spec/backup
        value:
          barmanObjectStore:
            destinationPath: s3://homelab-prod-backups/cnpg/cluster-authelia-ceph
            endpointURL: https://s3.us-west-2.amazonaws.com
            wal:
              compression: gzip
              encryption: AES256
            data:
              compression: gzip
              encryption: AES256
            s3Credentials:
              accessKeyId:
                name: cnpg-backup-s3
                key: AWS_ACCESS_KEY_ID
              secretAccessKey:
                name: cnpg-backup-s3
                key: AWS_SECRET_ACCESS_KEY
          retentionPolicy: 30d
    target:
      kind: Cluster
      name: cluster-authelia-ceph
  - patch: |
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: cluster-authelia-ceph
        annotations:
          cnpg.io/skipEmptyWalArchiveCheck: enabled
    target:
      kind: Cluster
      name: cluster-authelia-ceph
  - patch: |
      - op: replace
        path: /spec/path
        value: authelia/prod
    target:
      kind: VaultStaticSecret
      name: authelia-secret
