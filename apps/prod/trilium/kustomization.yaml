apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/trilium
  - httpRoute.yaml
  - data-ceph-pvc-v2.yaml
  - ../../base/trilium/migration-secret.yaml
  - ../../base/trilium/pve3-data-seed-job.yaml
patches:
  - patch: |
      - op: replace
        path: /spec/values/persistence/data/existingClaim
        value: trilium-data-ceph-v3
    target:
      kind: HelmRelease
      name: trilium
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: trilium-data-ceph
        namespace: default
    target:
      kind: PersistentVolumeClaim
      name: trilium-data-ceph
