apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: restic-config-task-control-plane-vikunja
spec:
  type: kv-v2
  mount: secret
  path: volsync/prod/task-control-plane-vikunja-data
  refreshAfter: 60s
  destination:
    create: true
    name: restic-config-task-control-plane-vikunja
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: restic-config-task-control-plane-cnpg-data
spec:
  type: kv-v2
  mount: secret
  path: volsync/prod/task-control-plane-cnpg-1
  refreshAfter: 60s
  destination:
    create: true
    name: restic-config-task-control-plane-cnpg-data
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: task-control-plane-vikunja-data-backup
spec:
  sourcePVC: vikunja-data
  paused: false
  trigger:
    schedule: "8 * * * *"
  restic:
    repository: restic-config-task-control-plane-vikunja
    pruneIntervalDays: 1
    retain:
      hourly: 4
      daily: 0
      weekly: 0
      monthly: 0
      yearly: 0
    copyMethod: Clone
    cacheStorageClassName: csi-cephfs-sc
    moverResources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: task-control-plane-cnpg-data-backup
spec:
  sourcePVC: task-control-plane-cnpg-1
  paused: false
  trigger:
    schedule: "14 * * * *"
  restic:
    repository: restic-config-task-control-plane-cnpg-data
    pruneIntervalDays: 1
    retain:
      hourly: 4
      daily: 0
      weekly: 0
      monthly: 0
      yearly: 0
    copyMethod: Clone
    cacheStorageClassName: csi-cephfs-sc
    moverSecurityContext:
      runAsUser: 26
      runAsGroup: 26
      fsGroup: 26
    moverResources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"