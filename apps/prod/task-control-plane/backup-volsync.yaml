apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: restic-config-task-control-plane-vikunja
  annotations:
    volsync.myrobertson.net/repository-name: task-control-plane-vikunja-data
spec:
  type: kv-v2
  mount: secret
  path: backblaze/k8s/prod/volsync
  refreshAfter: 60s
  destination:
    create: true
    name: restic-config-task-control-plane-vikunja
    transformation:
      excludeRaw: true
      transformationRefs:
        - name: volsync-backblaze-b2
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: restic-config-task-control-plane-vikunja-db
  annotations:
    volsync.myrobertson.net/repository-name: vikunja-database
spec:
  type: kv-v2
  mount: secret
  path: backblaze/k8s/prod/volsync
  refreshAfter: 60s
  destination:
    create: true
    name: restic-config-task-control-plane-vikunja-db
    transformation:
      excludeRaw: true
      transformationRefs:
        - name: volsync-backblaze-b2
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: task-control-plane-vikunja-data-backup
spec:
  sourcePVC: vikunja-data
  paused: false
  trigger:
    schedule: "8 * * * *"
  restic:
    repository: restic-config-task-control-plane-vikunja
    pruneIntervalDays: 1
    retain:
      hourly: 4
      daily: 0
      weekly: 0
      monthly: 0
      yearly: 0
    copyMethod: Direct
    cacheStorageClassName: csi-cephfs-sc
    moverResources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: task-control-plane-vikunja-database-backup
spec:
  sourcePVC: vikunja-database
  paused: false
  trigger:
    schedule: "13 * * * *"
  restic:
    repository: restic-config-task-control-plane-vikunja-db
    pruneIntervalDays: 1
    retain:
      hourly: 4
      daily: 0
      weekly: 0
      monthly: 0
      yearly: 0
    copyMethod: Direct
    cacheStorageClassName: csi-cephfs-sc
    moverResources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
---
