apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  values:
    logLevel: debug
    provider:
      name: cloudflare
    sources:
      - gateway-httproute
      - service
    domainFilters:
      - myrobertson.net
      - myrobertson.com
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: apiToken
    
    
    
    
    
    
