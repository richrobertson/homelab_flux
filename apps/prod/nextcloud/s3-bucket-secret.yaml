# AWS S3 credentials for Nextcloud primary storage (prod)
# Vault path: nextcloud/prod/s3 should contain keys:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, S3_BUCKET, S3_REGION, S3_ENDPOINT
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: nextcloud-s3-secret
spec:
  type: kv-v2
  mount: secret
  path: nextcloud/prod/s3
  refreshAfter: 60s
  destination:
    create: true
    name: nextcloud-s3-secret
