apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mailu
spec:
  values:
    hostnames:
      - mail.myrobertson.net
      - autoconfig.myrobertson.net
      - autodiscover.myrobertson.net
      - webmail.myrobertson.com
    subnet: 10.244.0.0/16
    proxyAuth:
      whitelist: 10.244.0.0/16
      header: Remote-Email
      create: "true"
    front:
      overrides:
        autoconfiguration-starttls.conf: |
          location = /mail/config-v1.1.xml {
            default_type application/xml;
            return 200 '<?xml version="1.0"?>
          <clientConfig version="1.1">
          <emailProvider id="%EMAILDOMAIN%">
          <domain>%EMAILDOMAIN%</domain>
          <displayName>MyRobertson Mail</displayName>
          <displayShortName>MyRobertson</displayShortName>
          <incomingServer type="imap">
          <hostname>mail.myrobertson.net</hostname>
          <port>143</port>
          <socketType>STARTTLS</socketType>
          <username>%EMAILADDRESS%</username>
          <authentication>password-cleartext</authentication>
          </incomingServer>
          <outgoingServer type="smtp">
          <hostname>mail.myrobertson.net</hostname>
          <port>587</port>
          <socketType>STARTTLS</socketType>
          <username>%EMAILADDRESS%</username>
          <authentication>password-cleartext</authentication>
          <addThisServer>true</addThisServer>
          <useGlobalPreferredServer>false</useGlobalPreferredServer>
          </outgoingServer>
          <documentation url="https://mail.myrobertson.net/admin/client">
          <descr lang="en">Configure your email client</descr>
          </documentation>
          </emailProvider>
          </clientConfig>
          ';
          }

          location = /.well-known/autoconfig/mail/config-v1.1.xml {
            default_type application/xml;
            return 200 '<?xml version="1.0"?>
          <clientConfig version="1.1">
          <emailProvider id="%EMAILDOMAIN%">
          <domain>%EMAILDOMAIN%</domain>
          <displayName>MyRobertson Mail</displayName>
          <displayShortName>MyRobertson</displayShortName>
          <incomingServer type="imap">
          <hostname>mail.myrobertson.net</hostname>
          <port>143</port>
          <socketType>STARTTLS</socketType>
          <username>%EMAILADDRESS%</username>
          <authentication>password-cleartext</authentication>
          </incomingServer>
          <outgoingServer type="smtp">
          <hostname>mail.myrobertson.net</hostname>
          <port>587</port>
          <socketType>STARTTLS</socketType>
          <username>%EMAILADDRESS%</username>
          <authentication>password-cleartext</authentication>
          <addThisServer>true</addThisServer>
          <useGlobalPreferredServer>false</useGlobalPreferredServer>
          </outgoingServer>
          <documentation url="https://mail.myrobertson.net/admin/client">
          <descr lang="en">Configure your email client</descr>
          </documentation>
          </emailProvider>
          </clientConfig>
          ';
          }

          location = /Autodiscover/Autodiscover.xml {
            rewrite ^ /internal/autoconfig/microsoft break;
            include /etc/nginx/proxy.conf;
            proxy_set_header Accept-Encoding "";
            sub_filter_types text/xml application/xml;
            sub_filter_once off;
            sub_filter '<Port>993</Port>' '<Port>143</Port>';
            sub_filter '<Port>465</Port>' '<Port>587</Port>';
            sub_filter '<SSL>on</SSL>' '<SSL>off</SSL><Encryption>TLS</Encryption>';
            proxy_pass http://$admin;
          }

          location = /autodiscover/autodiscover.xml {
            rewrite ^ /internal/autoconfig/microsoft break;
            include /etc/nginx/proxy.conf;
            proxy_set_header Accept-Encoding "";
            sub_filter_types text/xml application/xml;
            sub_filter_once off;
            sub_filter '<Port>993</Port>' '<Port>143</Port>';
            sub_filter '<Port>465</Port>' '<Port>587</Port>';
            sub_filter '<SSL>on</SSL>' '<SSL>off</SSL><Encryption>TLS</Encryption>';
            proxy_pass http://$admin;
          }
      hostPort:
        enabled: false
      externalService:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: 10.31.0.73
        externalTrafficPolicy: Cluster
        annotations:
          metallb.io/allow-shared-ip: mailu-front
          metallb.universe.tf/allow-shared-ip: mailu-front
        ports:
          pop3: true
          pop3s: true
          imap: true
          imaps: true
          smtp: true
          smtps: true
          submission: true
          manageSieve: true
    admin:
      startupProbe:
        enabled: true
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 30
        successThreshold: 1
      extraEnvVars:
        - name: SKIP_DNS_CHECK
          value: "true"
      extraVolumes:
        - name: admin-start
          configMap:
            name: mailu-admin-start
            defaultMode: 0555
      extraVolumeMounts:
        - name: admin-start
          mountPath: /start.py
          subPath: start.py
    customization:
      siteName: MyRobertson Mail
      website: https://myrobertson.com
      logoUrl: /webmail/skins/myrobertson_gmail/images/logo.svg
      logoBackground: "#ffffff"
    webmail:
      extraVolumes:
        - name: webmail-branding
          configMap:
            name: mailu-webmail-branding
        - name: webmail-gmail-skin
          configMap:
            name: mailu-webmail-branding
            items:
              - key: meta.json
                path: meta.json
              - key: styles.min.css
                path: styles/styles.min.css
              - key: logo.svg
                path: images/logo.svg
      extraVolumeMounts:
        - name: webmail-branding
          mountPath: /overrides/myrobertson-branding.inc.php
          subPath: myrobertson-branding.inc.php
        - name: webmail-gmail-skin
          mountPath: /var/www/roundcube/skins/myrobertson_gmail
