apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mailu
spec:
  values:
    hostnames:
      - mail.myrobertson.net
      - webmail.myrobertson.com
    subnet: 10.244.0.0/16
    proxyAuth:
      whitelist: 10.244.0.0/16
      header: Remote-Email
      create: "true"
    front:
      hostPort:
        enabled: false
      externalService:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: 10.31.0.73
        externalTrafficPolicy: Cluster
        annotations:
          metallb.io/allow-shared-ip: mailu-front
          metallb.universe.tf/allow-shared-ip: mailu-front
        ports:
          pop3: false
          pop3s: true
          imap: false
          imaps: true
          smtp: true
          smtps: true
          submission: true
          manageSieve: true
    admin:
      startupProbe:
        enabled: true
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 30
        successThreshold: 1
      extraEnvVars:
        - name: SKIP_DNS_CHECK
          value: "true"
      extraVolumes:
        - name: admin-start
          configMap:
            name: mailu-admin-start
            defaultMode: 0555
      extraVolumeMounts:
        - name: admin-start
          mountPath: /start.py
          subPath: start.py
    customization:
      siteName: MyRobertson Mail
      website: https://myrobertson.com
      logoUrl: /webmail/skins/myrobertson_gmail/images/logo.svg
      logoBackground: "#ffffff"
    webmail:
      extraVolumes:
        - name: webmail-branding
          configMap:
            name: mailu-webmail-branding
        - name: webmail-gmail-skin
          configMap:
            name: mailu-webmail-branding
            items:
              - key: meta.json
                path: meta.json
              - key: styles.min.css
                path: styles/styles.min.css
              - key: logo.svg
                path: images/logo.svg
      extraVolumeMounts:
        - name: webmail-branding
          mountPath: /overrides/myrobertson-branding.inc.php
          subPath: myrobertson-branding.inc.php
        - name: webmail-gmail-skin
          mountPath: /var/www/roundcube/skins/myrobertson_gmail
