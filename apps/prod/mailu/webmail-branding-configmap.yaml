apiVersion: v1
kind: ConfigMap
metadata:
  name: mailu-webmail-branding
data:
  myrobertson-branding.inc.php: |
    <?php
    $config['product_name'] = 'MyRobertson Mail';
    $config['support_url'] = 'https://myrobertson.com';
    $config['skin'] = 'myrobertson_gmail';
    $config['display_product_info'] = 1;
  meta.json: |
    {
      "extends": "elastic",
      "name": "MyRobertson Gmail",
      "author": "MyRobertson",
      "url": "https://myrobertson.com",
      "license": "Private",
      "localization": false,
      "config": {
        "supported_layouts": ["widescreen"],
        "jquery_ui_colors_theme": "bootstrap",
        "embed_css_location": "/styles/embed.css",
        "editor_css_location": "/styles/embed.css",
        "dark_mode_support": false,
        "media_browser_css_location": "none",
        "additional_logo_types": []
      },
      "meta": {
        "viewport": "width=device-width, initial-scale=1.0, shrink-to-fit=no, maximum-scale=1.0",
        "theme-color": "#f8fafd",
        "msapplication-navbutton-color": "#f8fafd"
      }
    }
  styles.min.css: |
    @import url("../../elastic/styles/styles.min.css");

    :root {
      --mr-blue: #1a73e8;
      --mr-blue-dark: #1558b0;
      --mr-red: #d93025;
      --mr-yellow: #f9ab00;
      --mr-green: #188038;
      --mr-ink: #202124;
      --mr-muted: #5f6368;
      --mr-line: #dadce0;
      --mr-bg: #f8fafd;
      --mr-panel: #ffffff;
      --mr-hover: #f1f3f4;
      --mr-selected: #e8f0fe;
      --mr-shadow: 0 1px 2px rgba(60, 64, 67, 0.18), 0 1px 3px rgba(60, 64, 67, 0.12);
      --mr-header-height: 64px;
    }

    html,
    body,
    body.mail,
    body.task-mail,
    body.task-addressbook,
    body.task-settings {
      background: var(--mr-bg);
      color: var(--mr-ink);
      font-family: Roboto, Arial, sans-serif;
    }

    body:not(.task-login)::before {
      align-items: center;
      background: var(--mr-panel);
      border-bottom: 1px solid var(--mr-line);
      color: var(--mr-ink);
      content: "MyRobertson Mail";
      display: flex;
      font-size: 20px;
      font-weight: 500;
      height: var(--mr-header-height);
      left: 0;
      letter-spacing: 0;
      padding-left: 88px;
      position: fixed;
      right: 0;
      top: 0;
      z-index: 100;
    }

    body:not(.task-login)::after {
      background: url("../images/logo.svg") center / contain no-repeat;
      content: "";
      height: 42px;
      left: 24px;
      position: fixed;
      top: 11px;
      width: 48px;
      z-index: 101;
    }

    body:not(.task-login) #layout-menu,
    body:not(.task-login) #layout-sidebar,
    body:not(.task-login) #layout-list,
    body:not(.task-login) #layout-content {
      margin-top: var(--mr-header-height);
    }

    #layout-menu,
    #layout-sidebar,
    #layout-list,
    #layout-content,
    .listbox,
    .header {
      background-color: var(--mr-panel);
      border-color: var(--mr-line);
    }

    #layout-menu {
      border-right: 0;
      box-shadow: inset -1px 0 0 var(--mr-line);
      padding-top: 12px;
    }

    #layout-menu .menu a,
    #layout-menu a,
    #layout-sidebar a,
    .treelist li a {
      border-radius: 0 999px 999px 0;
      color: var(--mr-muted);
      font-weight: 500;
    }

    .button,
    .btn,
    button,
    input.button {
      border-radius: 999px;
      font-weight: 500;
    }

    .btn-primary,
    .button.primary,
    button.btn-primary {
      background: var(--mr-blue);
      border-color: var(--mr-blue);
      color: #fff;
      box-shadow: none;
    }

    .btn-primary:hover,
    .button.primary:hover,
    button.btn-primary:hover {
      background: var(--mr-blue-dark);
      border-color: var(--mr-blue-dark);
    }

    #compose-button,
    a.compose,
    .toolbar a.compose,
    .button.compose {
      background: #c2e7ff;
      border: 0;
      border-radius: 16px;
      box-shadow: var(--mr-shadow);
      color: #001d35;
      min-height: 46px;
      padding-inline: 18px;
    }

    #layout-menu a:hover,
    #layout-sidebar a:hover,
    .treelist li a:hover {
      background: var(--mr-hover);
      color: var(--mr-ink);
      text-decoration: none;
    }

    #compose-button:hover,
    a.compose:hover,
    .toolbar a.compose:hover,
    .button.compose:hover {
      background: #d3e3fd;
    }

    #mailsearchform,
    .searchbar {
      background: #edf2fa;
      border: 1px solid transparent;
      border-radius: 24px;
      box-shadow: none;
      color: var(--mr-ink);
    }

    #mailsearchform:focus-within,
    .searchbar:focus-within {
      background: #fff;
      border-color: #c7d2fe;
      box-shadow: var(--mr-shadow);
    }

    #layout-list .header,
    #layout-content .header,
    #layout-sidebar .header {
      min-height: 56px;
    }

    #mailboxlist li,
    .treelist li {
      border-radius: 0 999px 999px 0;
      margin-right: 8px;
    }

    #mailboxlist li.selected > a,
    #mailboxlist li.active > a,
    .treelist li.selected > a,
    .treelist li.active > a {
      background: #d3e3fd;
      color: #001d35;
      font-weight: 700;
    }

    .listing,
    table.messagelist,
    #messagelist tr,
    .messagelist tr {
      background: var(--mr-panel);
      border-bottom: 1px solid var(--mr-line);
    }

    #messagelist tr:hover,
    .messagelist tr:hover {
      background: var(--mr-hover);
      box-shadow: inset 1px 0 0 var(--mr-line), inset -1px 0 0 var(--mr-line);
    }

    #messagelist tr.selected,
    .messagelist tr.selected {
      background: var(--mr-selected);
    }

    #messagelist tr.unread td,
    .messagelist tr.unread td {
      color: var(--mr-ink);
      font-weight: 700;
    }

    #messagelist td,
    .messagelist td {
      min-height: 42px;
      padding-block: 10px;
    }

    #messagelist .subject,
    .messagelist .subject {
      color: var(--mr-ink);
      font-weight: 500;
    }

    #messagelist .date,
    #messagelist .fromto,
    .messagelist .date,
    .messagelist .fromto {
      color: var(--mr-muted);
    }

    .toolbar a,
    .toolbar .button,
    .toolbar-button,
    .header a.button {
      border-radius: 999px;
    }

    .toolbar a:hover,
    .toolbar .button:hover,
    .toolbar-button:hover,
    .header a.button:hover {
      background: var(--mr-hover);
    }

    .iframe-wrapper,
    .message-part,
    .mailview-left,
    .mailview-right {
      background: var(--mr-panel);
    }

    body.task-login {
      background:
        radial-gradient(circle at 20% 16%, rgba(26, 115, 232, 0.08), transparent 28%),
        radial-gradient(circle at 82% 20%, rgba(249, 171, 0, 0.10), transparent 24%),
        linear-gradient(180deg, #fff 0%, #f8fafd 100%);
    }

    body.task-login #layout-content {
      background: #fff;
      border: 1px solid var(--mr-line);
      border-radius: 24px;
      box-shadow: var(--mr-shadow);
      padding: 32px;
    }

    body.task-login #logo {
      display: block;
      height: auto;
      margin: 0 auto 28px;
      max-width: 260px;
      width: 72%;
    }

    body.task-login #login-form input,
    body.task-login #login-form .form-control {
      border: 1px solid var(--mr-line);
      border-radius: 12px;
      min-height: 44px;
    }

    body.task-login #login-form input:focus,
    body.task-login #login-form .form-control:focus {
      border-color: var(--mr-blue);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.16);
    }

    body.task-login #login-form button,
    body.task-login #login-form input[type="submit"] {
      background: var(--mr-blue);
      border-color: var(--mr-blue);
      border-radius: 999px;
      color: #fff;
      min-height: 42px;
      padding-inline: 22px;
    }

    #login-footer {
      color: var(--mr-muted);
    }

    @media (max-width: 768px) {
      body:not(.task-login)::before {
        font-size: 18px;
        padding-left: 74px;
      }

      body:not(.task-login)::after {
        left: 18px;
      }

      body:not(.task-login) #layout-menu,
      body:not(.task-login) #layout-sidebar,
      body:not(.task-login) #layout-list,
      body:not(.task-login) #layout-content {
        margin-top: 0;
      }
    }
  logo.svg: |
    <svg xmlns="http://www.w3.org/2000/svg" width="360" height="96" viewBox="0 0 360 96" role="img" aria-labelledby="title desc">
      <title id="title">MyRobertson Mail</title>
      <desc id="desc">MyRobertson Mail brand mark</desc>
      <rect width="360" height="96" rx="24" fill="#fff"/>
      <path d="M39 29h58c5.5 0 10 4.5 10 10v34c0 5.5-4.5 10-10 10H39c-5.5 0-10-4.5-10-10V39c0-5.5 4.5-10 10-10Z" fill="#1a73e8"/>
      <path d="M34 39l34 24 34-24" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M34 74l22-20M102 74L80 54" fill="none" stroke="#d3e3fd" stroke-width="6" stroke-linecap="round"/>
      <circle cx="102" cy="31" r="8" fill="#d93025"/>
      <circle cx="85" cy="25" r="7" fill="#f9ab00"/>
      <circle cx="112" cy="50" r="6" fill="#188038"/>
      <text x="128" y="47" fill="#202124" font-family="Roboto, Arial, sans-serif" font-size="26" font-weight="700">MyRobertson</text>
      <text x="129" y="72" fill="#5f6368" font-family="Roboto, Arial, sans-serif" font-size="18" font-weight="500">Mail</text>
    </svg>
