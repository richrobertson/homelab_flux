apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: auth-policy-mailu-sso
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: myrobertson-com-gateway
  action: CUSTOM
  provider:
    name: authelia
  rules:
    - to:
        - operation:
            hosts:
              - webmail.myrobertson.com
