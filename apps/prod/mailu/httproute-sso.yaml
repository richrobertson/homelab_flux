apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mailu-sso
spec:
  parentRefs:
    - name: myrobertson-com-gateway
      namespace: default
      sectionName: webmail
  hostnames:
    - webmail.myrobertson.com
  rules:
    - backendRefs:
        - name: mailu-front
          port: 80
