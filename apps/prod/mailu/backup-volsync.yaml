apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: mailu-admin-backup
spec:
  sourcePVC: mailu-admin
  paused: false
  trigger:
    schedule: "1 * * * *"
  restic:
    repository: restic-config-mailu-admin
    pruneIntervalDays: 1
    retain:
      hourly: 4
      daily: 0
      weekly: 0
      monthly: 0
      yearly: 0
    copyMethod: Direct
    cacheStorageClassName: csi-cephfs-sc
    moverResources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
---
