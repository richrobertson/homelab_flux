apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: restic-config-mailu-admin
  annotations:
    volsync.myrobertson.net/repository-name: mailu-admin
spec:
  type: kv-v2
  mount: secret
  path: backblaze/k8s/prod/volsync
  refreshAfter: 60s
  destination:
    create: true
    name: restic-config-mailu-admin
    transformation:
      excludeRaw: true
      transformationRefs:
        - name: volsync-backblaze-b2
---
