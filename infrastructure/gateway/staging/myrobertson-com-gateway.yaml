apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: myrobertson-com-gateway
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
spec:
  gatewayClassName: istio
  listeners:
  - name: auth
    hostname: auth.staging.myrobertson.net
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
        - name: auth-staging-myrobertson-net-cert
          kind: Secret

  - name: code
    hostname: code.staging.myrobertson.net
