
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: kermit-ext
  namespace: default
spec:
  endpoints:
  - address: 192.168.1.141
  hosts:
  - "kermit.myrobertson.net"
  location: MESH_EXTERNAL
  ports:
  - name: http
    number: 5010
    protocol: HTTP
  resolution: STATIC



---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kermit-ext-route
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name:  myrobertson-com-gateway # Reference your Gateway resource
  hostnames:
    - "kermit.myrobertson.com" # Hostname for which this route applies
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - group: networking.istio.io
          kind: Hostname
          name: "kermit.myrobertson.net"
          port: 5010
          weight: 1
