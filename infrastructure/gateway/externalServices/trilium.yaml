
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: trilium-ext
  namespace: default
spec:
  endpoints:
  - address: 192.168.7.130
  hosts:
  - "trilium.myrobertson.net"
  location: MESH_EXTERNAL
  ports:
  - name: http
    number: 8080
    protocol: HTTP
  resolution: STATIC

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: trilium-ext-route
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name:  myrobertson-com-gateway # Reference your Gateway resource
  hostnames:
    - "trilium.myrobertson.com" # Hostname for which this route applies
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - group: networking.istio.io
          kind: Hostname
          name: "trilium.myrobertson.net"
          port: 8080
          weight: 1
