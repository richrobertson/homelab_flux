apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: myrobertson-com-gateway
  namespace: default
  annotations:
    cert-manager.io/issuer: lets-encrypt-issuer
spec:
  gatewayClassName: istio
  listeners:
  - name: immich
    hostname: immich.myrobertson.com
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: immich-cert