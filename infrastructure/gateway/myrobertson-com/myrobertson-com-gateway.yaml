apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: myrobertson-com-gateway
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/target: myrobertson.com
    cert-manager.io/issuer: letsencrypt-prod
spec:
  gatewayClassName: istio
  addresses:
  - type: IPAddress
    value: 10.31.0.69
  infrastructure:
    annotations:
      metallb.io/address-pool: myrobertson-com-gateway-pool
  listeners:

  - name: apex-http
    hostname: myrobertson.com
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All

  - name: apex-https
    hostname: myrobertson.com
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: myrobertson-com-cert
        kind: Secret

  - name: auth
    hostname: auth.myrobertson.com
    port: 443
    protocol: HTTPS
    allowedRoutes:
