apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: myrobertson-com-redirect
  namespace: default
spec:
  parentRefs:
  - name: myrobertson-com-gateway
  hostnames:
  - myrobertson.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        hostname: www.myrobertson.com
        scheme: https
        statusCode: 301
