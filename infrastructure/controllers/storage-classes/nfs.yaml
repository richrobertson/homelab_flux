apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synostorage-nfs-delete
provisioner: csi.san.synology.com
parameters:
  protocol: nfs
  dsm: "192.168.1.215"
  location: '/volume1'
  mountPermissions: '0755'
mountOptions:
  - nfsvers=4.1
reclaimPolicy: Delete
allowVolumeExpansion: true