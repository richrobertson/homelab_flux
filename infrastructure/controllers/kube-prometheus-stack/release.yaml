apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  install:
    crds: Skip
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore:
      # Ignore "validated" annotation which is not inserted during install
      - paths: [ "/metadata/annotations/prometheus-operator-validated" ]
        target:
          kind: PrometheusRule
  valuesFrom:
  - kind: ConfigMap
    name: flux-kube-state-metrics-config
    valuesKey: kube-state-metrics-config.yaml
  # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
  values:
    defaultRules:
      rules:
        # This generated group is too expensive for the current homelab
        # Prometheus cardinality and misses its 30s evaluation interval.
        kubeApiserverBurnrate: false
    alertmanager:
      enabled: true
      podDisruptionBudget:
        enabled: true
        minAvailable: 2
      config:
        global:
          resolve_timeout: 3m
        inhibit_rules:
          - source_matchers:
              - 'severity = critical'
            target_matchers:
              - 'severity =~ warning|info'
            equal:
              - namespace
              - alertname
          - source_matchers:
              - 'severity = warning'
            target_matchers:
              - 'severity = info'
            equal:
              - namespace
              - alertname
          - source_matchers:
              - 'alertname = InfoInhibitor'
            target_matchers:
              - 'severity = info'
            equal:
              - namespace
        route:
          receiver: 'gotify-receiver'
          group_by: ['alertname']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - match:
                alertname: InfoInhibitor
              receiver: 'null'
            - match:
                alertname: Watchdog
              receiver: 'null'
            - match:
                alertname: FluxKustomizationHealthcheckfailed
              receiver: 'null'
            - matchers:
                - alertname = KubeJobFailed
                - namespace = monitoring
                - job_name =~ unifi-security-daily-email-.*
              receiver: 'null'
            - match_re:
                alertname: '^Flux.*'
              receiver: 'gotify-flux-receiver'
            - match:
                domain: backups
              receiver: backup-receiver
              group_by: ['alertname', 'severity']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 2h
            - match:
                severity: critical
              receiver: gotify-receiver
        receivers:
          - name: 'null'
          - name: 'backup-receiver'
            webhook_configs:
              - url: 'http://gotify-bridge.monitoring.svc.cluster.local/gotify_webhook'
                send_resolved: true
          - name: 'gotify-receiver'
            webhook_configs:
              - url: 'http://gotify-bridge.monitoring.svc.cluster.local/gotify_webhook'
                send_resolved: true
          - name: 'gotify-flux-receiver'
            webhook_configs:
              - url: 'http://gotify-bridge-flux.monitoring.svc.cluster.local/gotify_webhook'
                send_resolved: true
      alertmanagerSpec:
        replicas: 3
        podAntiAffinity: hard
        podAntiAffinityTopologyKey: kubernetes.io/hostname
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node-role.kubernetes.io/control-plane
                      operator: DoesNotExist
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: alertmanager
                alertmanager: kube-prometheus-stack-alertmanager
        storage:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi
              storageClassName: ceph-block

      
    
    grafana:
      env:
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: xQ.AhikX8cuKjp1VlNB9F7cDFILvMAeRZ7OSGBENPDjQSpesEYzDlzUJRlJdxTID9_FKvX5s
      grafana.ini:
        server:
          # Set the domain if using an Ingress or specific domain
          domain: "grafana.dev.myrobertson.net" 
          # Set the full external URL for Grafana, including protocol and any sub-path
          root_url: "https://grafana.dev.myrobertson.net/"
          # If using a sub-path, ensure this is enabled
          serve_from_sub_path: false 
        auth:
          disable_login_form: true
          oauth_auto_login: true
        auth.generic_oauth:
          enabled: true
          name: Keycloak
          allow_sign_up: true
          client_id: grafana_prod
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid profile email groups
          auth_url: https://sso.myrobertson.com/realms/homelab/protocol/openid-connect/auth
          token_url: https://sso.myrobertson.com/realms/homelab/protocol/openid-connect/token
          api_url: https://sso.myrobertson.com/realms/homelab/protocol/openid-connect/userinfo
          login_attribute_path: preferred_username
          email_attribute_path: email
          name_attribute_path: name
          groups_attribute_path: groups
          role_attribute_path: "(login == 'rich' || preferred_username == 'rich' || email == 'rich@myrobertson.com' || contains(join(' ', groups[*]), 'Domain Admins') || contains(join(' ', groups[*]), 'domain admins') || contains(join(' ', groups[*]), 'CN=Domain Admins') || contains(join(' ', groups[*]), 'domain_admins') || contains(join(' ', groups[*]), 'domain-admins') || contains(join(' ', groups[*]), 'proxAdmins') || contains(join(' ', groups[*]), 'proxadmins')) && 'GrafanaAdmin'"
          allow_assign_grafana_admin: true
          role_attribute_strict: true
    kubeScheduler:
      serviceMonitor:
        ## Skip TLS certificate validation when scraping
        insecureSkipVerify: true

    kubeControllerManager:
      serviceMonitor:
        ## Skip TLS certificate validation when scraping
        insecureSkipVerify: true

    kubeEtcd:
      enabled: true
      service:
        selector:
          k8s-app: kube-controller-manager 
        enabled: true
        port: 2381
        targetPort: 2381
      serviceMonitor:
        relabelings:   # Add nodename label
          - sourceLabels: [__meta_kubernetes_pod_node_name]
            separator: ;
            regex: ^(.*)$
            targetLabel: nodename
            replacement: $1
            action: replace
        metricRelabelings:   # Remove pod label
          - action: labeldrop
            regex: pod

    "prometheus-node-exporter":
      extraArgs:
        - --collector.hwmon
        - --collector.thermal_zone
    
    prometheus:
      prometheusSpec:
        podMonitorNamespaceSelector: { }
        podMonitorSelector:
          matchLabels:
            app.kubernetes.io/component: monitoring
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - memory-snapshot-on-shutdown
        additionalScrapeConfigs:
          - job_name: proxmox-node-exporter
            scrape_interval: 30s
            static_configs:
              - targets:
                  - pve3.myrobertson.net:9100
                  - pve4.myrobertson.net:9100
                  - pve5.myrobertson.net:9100
                labels:
                  domain: proxmox
          - job_name: powerdns-authoritative
            metrics_path: /metrics
            scrape_interval: 30s
            static_configs:
              - targets:
                  - 192.168.7.201:8001
                labels:
                  domain: powerdns
                  service: authoritative
          - job_name: powerdns-recursor
            metrics_path: /metrics
            scrape_interval: 30s
            static_configs:
              - targets:
                  - 192.168.7.202:8001
                labels:
                  domain: powerdns
                  service: recursor
        retention: 14d
        retentionSize: 50GB
        resources:
          requests:
            cpu: 1000m
            memory: 1Gi
          limits:
            memory: 3Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 100Gi
              storageClassName: ceph-block
        
   
