apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  install:
    crds: Skip
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore:
      # Ignore "validated" annotation which is not inserted during install
      - paths: [ "/metadata/annotations/prometheus-operator-validated" ]
        target:
          kind: PrometheusRule
  valuesFrom:
  - kind: ConfigMap
    name: flux-kube-state-metrics-config
    valuesKey: kube-state-metrics-config.yaml
  # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
  values:
    alertmanager:
      enabled: true
      config:
        global:
          resolve_timeout: 3m
        route:
          receiver: 'gotify-receiver'
          group_by: ['alertname']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - match:
                alertname: Watchdog
              receiver: 'null'
            - match:
                domain: backups
              receiver: backup-receiver
              group_by: ['alertname', 'severity']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 2h
            - match:
                severity: critical
              receiver: gotify-receiver
        receivers:
          - name: 'null'
          - name: 'backup-receiver'
            webhook_configs:
              - url: 'http://gotify-bridge.monitoring.svc.cluster.local/gotify_webhook'
                send_resolved: true
          - name: 'gotify-receiver'
            webhook_configs:
              - url: 'http://gotify-bridge.monitoring.svc.cluster.local/gotify_webhook'
                send_resolved: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi
              storageClassName: ceph-block

      
    
    grafana:
      grafana.ini:
        server:
          # Set the domain if using an Ingress or specific domain
          domain: "grafana.dev.myrobertson.net" 
          # Set the full external URL for Grafana, including protocol and any sub-path
          root_url: "https://grafana.dev.myrobertson.net/"
          # If using a sub-path, ensure this is enabled
          serve_from_sub_path: false 
        auth:
          disable_login_form: true
          oauth_auto_login: true
        auth.generic_oauth:
          enabled: true
          name: Authelia
          allow_sign_up: true
          client_id: grafana_prod
          client_secret: xQ.AhikX8cuKjp1VlNB9F7cDFILvMAeRZ7OSGBENPDjQSpesEYzDlzUJRlJdxTID9_FKvX5s
          scopes: openid profile email groups
          auth_url: https://auth.myrobertson.com/api/oidc/authorization
          token_url: https://auth.myrobertson.com/api/oidc/token
          api_url: https://auth.myrobertson.com/api/oidc/userinfo
          login_attribute_path: preferred_username
          email_attribute_path: email
          name_attribute_path: name
          role_attribute_path: contains(groups[*], 'proxAdmins') && 'Admin' || 'Viewer'
          allowed_groups: proxAdmins
    kubeScheduler:
      serviceMonitor:
        ## Skip TLS certificate validation when scraping
        insecureSkipVerify: true

    kubeControllerManager:
      serviceMonitor:
        ## Skip TLS certificate validation when scraping
        insecureSkipVerify: true

    kubeEtcd:
      enabled: true
      service:
        selector:
          k8s-app: kube-controller-manager 
        enabled: true
        port: 2381
        targetPort: 2381
      serviceMonitor:
        relabelings:   # Add nodename label
          - sourceLabels: [__meta_kubernetes_pod_node_name]
            separator: ;
            regex: ^(.*)$
            targetLabel: nodename
            replacement: $1
            action: replace
        metricRelabelings:   # Remove pod label
          - action: labeldrop
            regex: pod
    
    prometheus:
      prometheusSpec:
        podMonitorNamespaceSelector: { }
        podMonitorSelector:
          matchLabels:
            app.kubernetes.io/component: monitoring
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - memory-snapshot-on-shutdown
        retention: 14d
        retentionSize: 50GB
        resources:
          requests:
            cpu: 75m
            memory: 500Mi
          limits:
            memory: 2000Mi
            
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 100Gi
            storageClassName: ceph-block
        
   
