---
apiVersion: v1
kind: Namespace
metadata:
  name: synology-csi
  labels:
    toolkit.fluxcd.io/tenant: sre-team
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
data:
  client-info.yml: 
kind: Secret
metadata:
  creationTimestamp: null
  name: client-info-secret
  namespace: synology-csi
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: synology-csi-chart
  namespace: synology-csi
spec:
  interval: 24h
  url: https://zebernst.github.io/synology-csi-talos
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: synology-csi-chart
  namespace: synology-csi
spec:
  interval: 30m
  chart:
    spec:
      chart: synology-csi
      sourceRef:
        kind: HelmRepository
        name: synology-csi-chart
        namespace: synology-csi
      interval: 12h
  values:
    storageClasses: 
      synology-iscsi-storage:
        # One of true or false (default):
        disabled: false
        # One of true or false (default):
        isDefault: false
        # One of "Retain" or "Delete" (default):
        reclaimPolicy: Retain
        # One of "WaitForFirstConsumer" or "Immediate" (default):
        volumeBindingMode: Immediate

        # If not present, some location will be chosen to create volumes with the filesystem type ext4.
        # Note that these parameters cannot get updated once deployed - any subsequent changes get ignored!
        parameters:
          dsm: "192.168.1.215"
          fsType: ext4
          location: /volume1
      synology-iscsi-storage-delete:
        reclaimPolicy: Delete
