apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: base-controllers
  namespace: flux-system
resources:
  - cert-manager.yaml
  - ingress-nginx.yaml
  - vault-secrets-operator.yaml
  - rook-ceph.yaml
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: second-phase-controllers
  namespace: flux-system
resources:
  - synology-csi.yaml
  - rook-ceph-cluster.yaml
spec:
  dependsOn:
    - name: base-controllers
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: third-phase-controllers
  namespace: flux-system
resources:
  - rook-ceph-cluster-objstore.yaml
spec:
  dependsOn:
    - name: second-phase-controllers

