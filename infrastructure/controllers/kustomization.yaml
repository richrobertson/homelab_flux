apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: base-controllers
  namespace: flux-system
resources:
  - cert-manager.yaml
  - ingress-nginx.yaml
  - vault-secrets-operator.yaml
  - rook-ceph.yaml
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: second-phase-controllers
  namespace: flux-system
resources:
  - synology-csi.yaml
  - rook-ceph-cluster.yaml
spec:
  dependsOn:
    - name: base-controllers

