apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: istio-system
spec:
  interval: 30m
  chart:
    spec:
      chart: base
      sourceRef:
        kind: HelmRepository
        name: istio-release
        namespace: istio-system
      interval: 12h
  values:
    defaultRevision: default
    global:
      proxy:
        logLevel: debug
