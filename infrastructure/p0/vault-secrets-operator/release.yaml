---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-operator
  namespace: vault-secrets-operator-system
spec:
  interval: 30m
  chart:
    spec:
      chart: vault-secrets-operator
      sourceRef:
        kind: HelmRepository
        name: vault-secrets-operator
        namespace: vault-secrets-operator-system
      interval: 12h
  values:
    defaultVaultConnection:
      enabled: true
      address: "https://vault.myrobertson.net:8200"
      skipTLSVerify: true
    defaultAuthMethod:
      enabled: true
      mount: staging-kubernetes
      allowed_namespaces:
        - "*"
      kubernetes:
        role: "vault-secrets-operator-role"
        serviceAccountName: "default"
        namespace: "vault-secrets-operator-system"
        tokenAudiences:
          - "https://cp.staging.myrobertson.net:6443"