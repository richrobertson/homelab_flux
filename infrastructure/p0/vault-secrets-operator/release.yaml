---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-operator
  namespace: vault-secrets-operator-system
spec:
  interval: 30m
  chart:
    spec:
      chart: vault-secrets-operator
      sourceRef:
        kind: HelmRepository
        name: vault-secrets-operator
        namespace: vault-secrets-operator-system
      interval: 12h
  values:
    defaultVaultConnection:
      enabled: true
      address: "https://vault.myrobertson.net:8200"
      skipTLSVerify: true
    defaultAuthMethod:
      enabled: false
