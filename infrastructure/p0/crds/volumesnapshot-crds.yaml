apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: kubernetes-csi-extrernal-snapshotter
  namespace: flux-system
spec:
  interval: 4h
  url: https://github.com/kubernetes-csi/external-snapshotter.git
  ref:
    branch: master 
  sparseCheckout:
  - client/config/crd

---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: kubernetes-csi-extrernal-snapshotter
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: kubernetes-csi-extrernal-snapshotter
  path: client/config/crd 
  prune: true
  validation: client 


