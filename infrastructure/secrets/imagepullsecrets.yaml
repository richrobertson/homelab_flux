---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: imagepullsecrets
  namespace: external-dns
spec:
  type: kv-v2
  mount: secret
  path:  docker/creds
  refreshAfter: 60s
  destination:
    create: true
    name: imagepullsecrets
    type: "kubernetes.io/dockerconfigjson"