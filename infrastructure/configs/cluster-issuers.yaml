

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-vault-token-creator
  namespace: cert-manager # Or the namespace where your Vault Issuer/ClusterIssuer is
rules:
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  resourceNames: ["default"] # The name of the service account cert-manager needs to get a token for
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-vault-token-creator
  namespace: cert-manager
subjects:
  - kind: ServiceAccount
    name: default
    namespace: cert-manager 
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-vault-token-creator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-tokenreview
subjects:
  - kind: ServiceAccount
    name: default
    namespace: cert-manager 
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager 
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
  namespace: cert-manager
spec:
  vault:
    server: https://vault.myrobertson.net:8200
    path: pki_int_dev/sign/cluster_ssl_certs
    caBundle: 
    auth:
      kubernetes:
        mountPath: /v1/auth/dev-kubernetes
        role: vault-cert-issuer-role
        serviceAccountRef:
          name: default
          audiences: 
            - "https://cp.dev.myrobertson.net:6443"
        # secretRef:
        #   name: issuer-token-lmzpj
        #   key: token
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: vault-issuer
  namespace: cert-manager
spec:
  vault:
    server: https://vault.myrobertson.net:8200
    path: pki_int_dev/sign/cluster_ssl_certs
    caBundle: 
    auth:
      kubernetes:
        mountPath: /v1/auth/dev-kubernetes
        role: vault-cert-issuer-role
        serviceAccountRef:
          name: default
          audiences: 
            - "https://cp.dev.myrobertson.net:6443"