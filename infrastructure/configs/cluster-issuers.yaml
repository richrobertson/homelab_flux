
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: issuer
  namespace: cert-manager
---
apiVersion: v1
kind: Secret
metadata:
  name: issuer-token-lmzpj
  namespace: cert-manager
  annotations:
    kubernetes.io/service-account.name: issuer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-vault-token-creator
  namespace: cert-manager # Or the namespace where your Vault Issuer/ClusterIssuer is
rules:
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  resourceNames: ["issuer"] # The name of the service account cert-manager needs to get a token for
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-vault-token-creator
  namespace: cert-manager
subjects:
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-vault-token-creator
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
  namespace: cert-manager
spec:
  vault:
    server: https://vault.myrobertson.net:8200
    path: pki_int/sign/myrobertson-dot-net
    caBundle: 
    auth:
      kubernetes:
        mountPath: /v1/auth/staging-kubernetes
        role: vault-cert-issuer-role
        serviceAccountRef:
          name: default
          audiences: 
            - "https://cp.staging.myrobertson.net:6443"
        # secretRef:
        #   name: issuer-token-lmzpj
        #   key: token
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: vault-issuer
  namespace: cert-manager
spec:
  vault:
    server: https://vault.myrobertson.net:8200
    path: pki_int/sign/myrobertson-dot-net
    caBundle: 
    auth:
      kubernetes:
        mountPath: /v1/auth/staging-kubernetes
        role: vault-cert-issuer-role
        serviceAccountRef:
          name: issuer
          audiences: 
            - "https://cp.staging.myrobertson.net:6443"