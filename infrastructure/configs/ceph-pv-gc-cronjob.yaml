apiVersion: v1
kind: ServiceAccount
metadata:
  name: ceph-pv-gc
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ceph-pv-gc
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ceph-pv-gc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ceph-pv-gc
subjects:
  - kind: ServiceAccount
    name: ceph-pv-gc
    namespace: flux-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ceph-pv-gc
  namespace: flux-system
spec:
  schedule: "20 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: ceph-pv-gc
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: gc
              image: docker.io/bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
                runAsNonRoot: true
              command:
                - /bin/sh
                - -ec
                - |
                  KUBECTL_BIN=kubectl

                  echo "Scanning for Released+Retain Ceph PVs..."

                  CANDIDATES="$(${KUBECTL_BIN} get pv -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.persistentVolumeReclaimPolicy}{"\t"}{.status.phase}{"\t"}{.spec.storageClassName}{"\n"}{end}' | awk '
                    $3=="Released" && $2=="Retain" && ($4 ~ /ceph/ || $4 ~ /rook-ceph/) {
                      print $1
                    }
                  ')"

                  if [ -z "${CANDIDATES}" ]; then
                    echo "No orphaned Ceph PVs found."
                    exit 0
                  fi

                  echo "Found orphaned Ceph PVs:"
                  echo "${CANDIDATES}"

                  FAILURES=0
                  for PV in ${CANDIDATES}; do
                    echo "Patching ${PV} reclaimPolicy=Delete"
                    if ! ${KUBECTL_BIN} patch pv "${PV}" --type merge -p '{"spec":{"persistentVolumeReclaimPolicy":"Delete"}}'; then
                      echo "Failed to patch ${PV}; continuing"
                      FAILURES=$((FAILURES + 1))
                      continue
                    fi

                    echo "Deleting ${PV}"
                    if ! ${KUBECTL_BIN} delete pv "${PV}" --wait=false; then
                      echo "Failed to delete ${PV}; continuing"
                      FAILURES=$((FAILURES + 1))
                    fi
                  done

                  if [ "${FAILURES}" -gt 0 ]; then
                    echo "Ceph PV garbage collection completed with ${FAILURES} failure(s)."
                    exit 1
                  fi

                  echo "Ceph PV garbage collection run completed."