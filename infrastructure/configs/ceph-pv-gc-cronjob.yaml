apiVersion: v1
kind: ServiceAccount
metadata:
  name: ceph-pv-gc
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ceph-pv-gc
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ceph-pv-gc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ceph-pv-gc
subjects:
  - kind: ServiceAccount
    name: ceph-pv-gc
    namespace: flux-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ceph-pv-gc
  namespace: flux-system
spec:
  schedule: "20 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          serviceAccountName: ceph-pv-gc
          restartPolicy: OnFailure
          containers:
            - name: gc
              image: rancher/kubectl:v1.32.3
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  echo "Scanning for Released+Retain Ceph PVs..."

                  CANDIDATES="$(kubectl get pv --no-headers | awk '
                    $5=="Released" && $4=="Retain" && ($7 ~ /ceph/ || $7 ~ /rook-ceph/) {
                      print $1
                    }
                  ')"

                  if [ -z "${CANDIDATES}" ]; then
                    echo "No orphaned Ceph PVs found."
                    exit 0
                  fi

                  echo "Found orphaned Ceph PVs:"
                  echo "${CANDIDATES}"

                  for PV in ${CANDIDATES}; do
                    echo "Patching ${PV} reclaimPolicy=Delete"
                    kubectl patch pv "${PV}" --type merge -p '{"spec":{"persistentVolumeReclaimPolicy":"Delete"}}'

                    echo "Deleting ${PV}"
                    kubectl delete pv "${PV}" --wait=false
                  done

                  echo "Ceph PV garbage collection run completed."
---
apiVersion: batch/v1
kind: Job
metadata:
