---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: rook-ceph-external
spec:
  interval: 30m
  chart:
    spec:
      chart: rook-ceph-cluster
      version: "1.18.4"
      sourceRef:
        kind: HelmRepository
        name: rook-release
        namespace: rook-ceph
      interval: 12h
  values:
    cephClusterSpec:
      external:
        enable: true
      crashCollector:
        disable: true
      healthCheck:
        daemonHealth:
          mon:
            disabled: false
          interval: 45s
    # -- A list of CephBlockPool configurations to deploy
    # @default -- See [below](#ceph-block-pools)
    cephBlockPools: {}

    # -- A list of CephFileSystem configurations to deploy
    # @default -- See [below](#ceph-file-systems)
    cephFileSystems: {}


    # -- A list of CephObjectStore configurations to deploy
    # @default -- See [below](#ceph-object-stores)
    cephObjectStores: {}

---
apiVersion: v1
data:
  csi-cluster-config-json: '[{"clusterID":"rook-ceph-external","monitors":["192.168.10.3:6789"],"cephFS":{"netNamespaceFilePath":"","subvolumeGroup":"","radosNamespace":"cephfs-csi","kernelMountOptions":"","fuseMountOptions":""},"rbd":{"netNamespaceFilePath":"","radosNamespace":"","mirrorDaemonCount":0},"nfs":{"netNamespaceFilePath":""},"readAffinity":{"enabled":false,"crushLocationLabels":null},"namespace":""}]'
  data: pve3=192.168.10.3:6789
  externalMons: ""
  mapping: '{"node":{}}'
  maxMonId: "1"
  outOfQuorum: ""
kind: ConfigMap
metadata:
  name: rook-ceph-mon-endpoints
  namespace: rook-ceph-external
---
apiVersion: v1
data:
  args: |
    [Configurations]
    namespace = rook-ceph-external
    rgw-pool-prefix = default
    format = bash
    cephfs-filesystem-name = rook_prod
    cephfs-metadata-pool-name = rook_prod_metadata
    cephfs-data-pool-name = rook_prod_data
    rbd-data-pool-name = rook_prod
    rgw-endpoint = 192.168.10.3:8080
kind: ConfigMap
metadata:
  name: external-cluster-user-command
  namespace: rook-ceph-external
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-block
parameters:
  clusterID: rook-ceph-external
  csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph-external
  csi.storage.k8s.io/fstype: ext4
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph-external
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph-external
  imageFeatures: layering
  imageFormat: "2"
  pool: rook_prod
provisioner: rook-ceph.rbd.csi.ceph.com
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-filesystem
parameters:
  clusterID: rook-ceph-external
  csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph-external
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph-external
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph-external
  fsName: rook_prod
  pool: rook_prod_data
provisioner: rook-ceph.cephfs.csi.ceph.com
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
---
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: ceph-bucket
  namespace: rook-ceph-external
spec:
  gateway:
    port: 8080
    externalRgwEndpoints:
      - ip: 192.168.10.3
        # hostname: example.com
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rook-ceph-bucket
provisioner: rook-ceph-external.ceph.rook.io/bucket
parameters:
  objectStoreName: ceph-bucket
  objectStoreNamespace: rook-ceph-external
reclaimPolicy: Delete
volumeBindingMode: Immediate
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-client-config
  namespace: rook-ceph-external
data:
  ceph.conf: |
    [global]
    # RADOS operation timeouts to prevent indefinite hangs
    # Mon op timeout: time in seconds to wait for mon operations before timing out
    rados_mon_op_timeout = 30
    # OSD op timeout: time in seconds to wait for OSD operations before timing out
    rados_osd_op_timeout = 30
    # Client config to ensure explicit timeout handling
    client_mount_timeout = 30

