apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cluster-issuers.yaml
  - rook-external-cluster.yaml
  - ceph-pv-gc-cronjob.yaml
  - gotify-bridge.yml
  - bgp-config.yaml
  - flux-alertmanager.yaml
  - podmonitor.yaml
  - monitoring-prometheus-gateway.yaml
  - monitoring-alertmanager-gateway.yaml
  - monitoring-grafana-gateway.yaml
  - toolbox.yaml
  - ceph-servicemonitor.yaml
  - ceph-prometheus-rules.yaml
  - istio-servicemonitor.yaml
  - istio-gateway-alerts.yaml
  - backup-observability-alerts.yaml
  - proxmox-temperature-alerts.yaml
  - volsync
configMapGenerator:
  - name: flux-grafana-dashboards
    namespace: monitoring
    files:
      - dashboards/control-plane.json
      - dashboards/cluster.json
      - dashboards/logs.json
      - dashboards/proxmox-host-temperatures.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: flux
        app.kubernetes.io/component: monitoring
        kustomize.toolkit.fluxcd.io/substitute: disabled
  - name: istio-grafana-dashboards
    namespace: monitoring
    files:
      - dashboards/istio-mesh-dashboard.json
      - dashboards/istio-service-dashboard.json
      - dashboards/istio-workload-dashboard.json
      - dashboards/istio-pilot-dashboard.json
      - dashboards/istio-ztunnel-dashboard.json
      - dashboards/istio-performance-dashboard.json
      - dashboards/istio-gateway-case-metrics.json
      - dashboards/istio-gateway-service-drilldown.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: istio
        app.kubernetes.io/component: monitoring
        kustomize.toolkit.fluxcd.io/substitute: disabled
  - name: backup-grafana-dashboards
    namespace: monitoring
    files:
      - dashboards/backup-observability.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: backups
        app.kubernetes.io/component: monitoring
        kustomize.toolkit.fluxcd.io/substitute: disabled
  - name: immich-grafana-dashboards
    namespace: monitoring
    files:
      - dashboards/immich-overview.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: immich
        app.kubernetes.io/component: monitoring
        kustomize.toolkit.fluxcd.io/substitute: disabled
  - name: ceph-grafana-dashboards
    namespace: monitoring
    files:
      - dashboards/ceph-cluster.json
      - dashboards/ceph-osd.json
      - dashboards/ceph-pools.json
      - dashboards/ceph-rgw-overview.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: ceph
        app.kubernetes.io/component: monitoring
        kustomize.toolkit.fluxcd.io/substitute: disabled

