---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: client-info-secret
  namespace: synology-csi
spec:
  type: kv-v2
  mount: secret
  path: synology/staging/csi-client-info
  refreshAfter: 60s
  destination:
    create: true
    name: client-info-secret
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: rgw-admin-ops-user
  namespace: rook-ceph
spec:
  type: "kv-v2"
  mount: secret
  path: proxmox/cl0/ceph/rgw-admin-ops-user
  refreshAfter: 60s
  destination:
    create: true
    name: rgw-admin-ops-user
    type: kubernetes.io/rook