apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backup-observability-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: backups
    app.kubernetes.io/component: monitoring
spec:
  groups:
    - name: backup-observability
      rules:
        - alert: VolSyncReplicationSourceNotReady
          expr: homelab_resource_info{customresource_group="volsync.backube",customresource_kind="ReplicationSource",mover_result="Failed"} > 0
          for: 20m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: VolSync replication source failed
            description: VolSync ReplicationSource {{ $labels.exported_namespace }}/{{ $labels.name }} has a failed mover result.

        - alert: VolSyncReplicationSourceStale
          expr: >-
            max by (customresource_group, customresource_kind, customresource_version, exported_namespace, name, source_pvc)
              (homelab_resource_info{customresource_group="volsync.backube",customresource_kind="ReplicationSource",paused!="true"})
            * on (exported_namespace, name) group_right (source_pvc)
              (time() - max by (exported_namespace, name, source_pvc)
                (homelab_replicationsource_last_sync_timestamp_seconds{customresource_group="volsync.backube",customresource_kind="ReplicationSource"}))
            > 7200
          for: 15m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: VolSync replication source stale
            description: VolSync ReplicationSource {{ $labels.exported_namespace }}/{{ $labels.name }} has not completed a sync in over 2 hours.

        - alert: CNPGClusterNotReady
          expr: homelab_resource_info{customresource_group="postgresql.cnpg.io",customresource_kind="Cluster",ready!="True"} > 0
          for: 15m
          labels:
            domain: backups
            severity: critical
          annotations:
            summary: CNPG cluster not ready
            description: CloudNativePG Cluster {{ $labels.exported_namespace }}/{{ $labels.name }} is not ready.

        - alert: CNPGScheduledBackupSuspended
          expr: homelab_resource_info{customresource_group="postgresql.cnpg.io",customresource_kind="ScheduledBackup",suspended="true"} > 0
          for: 10m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: CNPG scheduled backup suspended
            description: CloudNativePG ScheduledBackup {{ $labels.exported_namespace }}/{{ $labels.name }} is suspended.

        - alert: CNPGScheduledBackupStale
          expr: (time() - homelab_scheduledbackup_last_schedule_timestamp_seconds{customresource_group="postgresql.cnpg.io",customresource_kind="ScheduledBackup"} > 93600) and on (exported_namespace, name) homelab_resource_info{customresource_group="postgresql.cnpg.io",customresource_kind="ScheduledBackup",suspended!="true"}
          for: 30m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: CNPG scheduled backup stale
            description: CloudNativePG ScheduledBackup {{ $labels.exported_namespace }}/{{ $labels.name }} has not run in over 26 hours.

        - alert: CNPGBackupFailedRecently
          expr: count((homelab_resource_info{customresource_group="postgresql.cnpg.io",customresource_kind="Backup",phase=~"failed|error"}) and on (cluster, exported_namespace) (homelab_resource_info{customresource_group="postgresql.cnpg.io",customresource_kind="Cluster",ready="True",last_backup_succeeded!="True"})) > 0
          for: 5m
          labels:
            domain: backups
            severity: critical
          annotations:
            summary: CNPG latest backup is failed
            description: A CloudNativePG cluster's latest backup state is failed or error.

        - alert: BackupJobsFailing
          expr: kube_job_status_failed{job_name=~".*(backup|volsync).*"} > 0
          for: 10m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: Backup job {{ $labels.namespace }}/{{ $labels.job_name }} is failing
            description: Kubernetes Job {{ $labels.namespace }}/{{ $labels.job_name }} currently has failed pods.
