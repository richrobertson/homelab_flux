apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backup-observability-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: backups
    app.kubernetes.io/component: monitoring
spec:
  groups:
    - name: backup-observability
      rules:
        - alert: VolSyncReplicationSourceNotReady
          expr: count(homelab_resource_info{customresource_group="volsync.backube",customresource_kind="ReplicationSource",exported_namespace="default",mover_result="Failed"}) > 0
          for: 20m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: VolSync replication source not ready
            description: One or more VolSync ReplicationSource objects have failed mover runs in the default namespace.

        - alert: CNPGClusterNotReady
          expr: count(homelab_resource_info{customresource_group="postgresql.cnpg.io",customresource_kind="Cluster",exported_namespace="default",ready!="True"}) > 0
          for: 15m
          labels:
            domain: backups
            severity: critical
          annotations:
            summary: CNPG cluster not ready
            description: One or more CloudNativePG Cluster resources are not ready in the default namespace.

        - alert: CNPGScheduledBackupSuspended
          expr: count(homelab_resource_info{customresource_group="postgresql.cnpg.io",customresource_kind="ScheduledBackup",exported_namespace="default",suspended="true"}) > 0
          for: 10m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: CNPG scheduled backup suspended
            description: A CloudNativePG ScheduledBackup resource is suspended in the default namespace.

        - alert: CNPGBackupFailedRecently
          expr: count((homelab_resource_info{customresource_group="postgresql.cnpg.io",customresource_kind="Backup",exported_namespace="default",phase=~"failed|error"}) and on (cluster, exported_namespace) (homelab_resource_info{customresource_group="postgresql.cnpg.io",customresource_kind="Cluster",exported_namespace="default",ready="True",last_backup_succeeded!="True"})) > 0
          for: 5m
          labels:
            domain: backups
            severity: critical
          annotations:
            summary: CNPG latest backup is failed
            description: A CloudNativePG cluster's latest backup state is failed or error.

        - alert: BackupJobsFailing
          expr: kube_job_status_failed{namespace="default",job_name=~".*(backup|volsync).*"} > 0
          for: 10m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: Backup job {{ $labels.namespace }}/{{ $labels.job_name }} is failing
            description: Kubernetes Job {{ $labels.namespace }}/{{ $labels.job_name }} currently has failed pods.
