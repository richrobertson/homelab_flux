---
# VSO syncs the per-cluster backup config from Vault into a K8s Secret.
# The base path targets the production cluster; the staging cluster
# overrides the path via a patch in clusters/staging/infrastructure.yaml.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: talos-etcd-backup-credentials
  namespace: talos-etcd-backup
spec:
  type: kv-v2
  mount: secret
  path: talos/backup/prod
  refreshAfter: 5m
  destination:
    create: true
    name: talos-etcd-backup-credentials
