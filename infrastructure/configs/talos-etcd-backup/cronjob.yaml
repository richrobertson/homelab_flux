---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: talos-etcd-backup
  namespace: talos-etcd-backup
spec:
  # Run every 6 hours.
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: secrets
              secret:
                secretName: talos-etcd-backup-credentials
            - name: tmp
              emptyDir: {}
          containers:
            - name: backup
              # talosctl binary + AWS CLI in a single image.
              # Build with: docker-builds/talosctl-aws/build.sh --push
              image: oci.trueforge.org/homelab/talosctl-aws:v1.12.6
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: secrets
                  mountPath: /etc/talos-backup-secrets
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail

                  SECRETS=/etc/talos-backup-secrets
                  TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  ENDPOINT=$(cat "${SECRETS}/TALOS_ENDPOINT")
                  ENV_NAME=$(cat "${SECRETS}/ENV_NAME")
                  S3_BUCKET=$(cat "${SECRETS}/S3_BUCKET")
                  S3_PREFIX=$(cat "${SECRETS}/S3_PREFIX")
                  SNAPSHOT="/tmp/etcd-${ENV_NAME}-${TIMESTAMP}.db"

                  export AWS_ACCESS_KEY_ID=$(cat "${SECRETS}/AWS_ACCESS_KEY_ID")
                  export AWS_SECRET_ACCESS_KEY=$(cat "${SECRETS}/AWS_SECRET_ACCESS_KEY")
                  export AWS_DEFAULT_REGION=$(cat "${SECRETS}/AWS_DEFAULT_REGION")
                  export TALOSCONFIG=/tmp/talosconfig

                  cp "${SECRETS}/TALOS_CONFIG" "${TALOSCONFIG}"
                  chmod 600 "${TALOSCONFIG}"

                  echo "Taking etcd snapshot from node ${ENDPOINT} ..."
                  talosctl etcd snapshot "${SNAPSHOT}" \
                    --talosconfig "${TALOSCONFIG}" \
                    --endpoints "${ENDPOINT}" \
                    --nodes "${ENDPOINT}"

                  echo "Uploading to s3://${S3_BUCKET}/${S3_PREFIX}/etcd-${ENV_NAME}-${TIMESTAMP}.db ..."
                  aws s3 cp "${SNAPSHOT}" \
                    "s3://${S3_BUCKET}/${S3_PREFIX}/etcd-${ENV_NAME}-${TIMESTAMP}.db"

                  echo "Backup complete: s3://${S3_BUCKET}/${S3_PREFIX}/etcd-${ENV_NAME}-${TIMESTAMP}.db"
                  rm -f "${TALOSCONFIG}" "${SNAPSHOT}"
