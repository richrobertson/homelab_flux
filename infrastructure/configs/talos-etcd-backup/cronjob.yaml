---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: talos-etcd-backup
  namespace: talos-etcd-backup
spec:
  # Run every 6 hours.
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: secrets
              secret:
                secretName: talos-etcd-backup-credentials
            - name: tmp
              emptyDir: {}
          initContainers:
            - name: snapshot
              image: ghcr.io/siderolabs/talosctl:v1.12.6
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: secrets
                  mountPath: /etc/talos-backup-secrets
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              env:
                - name: TALOS_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: talos-etcd-backup-credentials
                      key: TALOS_ENDPOINT
              command: ["/talosctl"]
              args:
                - etcd
                - snapshot
                - /tmp/etcd-snapshot.db
                - --talosconfig
                - /etc/talos-backup-secrets/TALOS_CONFIG
                - --endpoints
                - $(TALOS_ENDPOINT)
                - --nodes
                - $(TALOS_ENDPOINT)
          containers:
            - name: upload
              image: amazon/aws-cli:latest
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: secrets
                  mountPath: /etc/talos-backup-secrets
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  SECRETS=/etc/talos-backup-secrets
                  TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  ENV_NAME=$(cat "${SECRETS}/ENV_NAME")
                  SNAPSHOT=/tmp/etcd-snapshot.db
                  S3_BUCKET=$(cat "${SECRETS}/S3_BUCKET")
                  S3_PREFIX=$(cat "${SECRETS}/S3_PREFIX")
                  DEST="s3://${S3_BUCKET}/${S3_PREFIX}/etcd-${ENV_NAME}-${TIMESTAMP}.db"

                  export AWS_ACCESS_KEY_ID=$(cat "${SECRETS}/AWS_ACCESS_KEY_ID")
                  export AWS_SECRET_ACCESS_KEY=$(cat "${SECRETS}/AWS_SECRET_ACCESS_KEY")
                  export AWS_DEFAULT_REGION=$(cat "${SECRETS}/AWS_DEFAULT_REGION")

                  echo "Uploading ${SNAPSHOT} to ${DEST} ..."
                  aws s3 cp "${SNAPSHOT}" "${DEST}"
                  echo "Backup complete: ${DEST}"
