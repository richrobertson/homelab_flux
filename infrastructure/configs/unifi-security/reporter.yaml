apiVersion: v1
kind: ConfigMap
metadata:
  name: unifi-security-reporter-config
  namespace: monitoring
data:
  UNIFI_HOST: "192.168.1.1"
  POLL_INTERVAL_SECONDS: "60"
  QUERY_LOOKBACK_HOURS: "24"
  TOP_LIMIT: "10"
  METRICS_PORT: "8080"
  SMTP_HOST: "email-smtp.us-west-2.amazonaws.com"
  SMTP_PORT: "587"
  EMAIL_FROM: "security-reporter@myrobertson.com"
  EMAIL_TO: "roy@myrobertson.com"
  EMAIL_SUBJECT_PREFIX: "[homelab security]"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-security-reporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: unifi-security-reporter
    app.kubernetes.io/part-of: security-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unifi-security-reporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unifi-security-reporter
        app.kubernetes.io/part-of: security-monitoring
    spec:
      containers:
        - name: reporter
          image: ghcr.io/richrobertson/unifi-security-reporter:0.1.0
          imagePullPolicy: IfNotPresent
          args: ["exporter"]
          ports:
            - name: metrics
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: unifi-security-reporter-config
          env:
            - name: TZ
              value: US/Pacific
            - name: UNIFI_SSH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: unifi-security-ssh
                  key: username
            - name: UNIFI_SSH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unifi-security-ssh
                  key: password
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 60
            periodSeconds: 60
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: unifi-security-reporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: unifi-security-reporter
    app.kubernetes.io/part-of: security-monitoring
spec:
  selector:
    app.kubernetes.io/name: unifi-security-reporter
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: unifi-security-daily-email
  namespace: monitoring
  labels:
    app.kubernetes.io/name: unifi-security-reporter
    app.kubernetes.io/part-of: security-monitoring
spec:
  schedule: "30 7 * * *"
  timeZone: America/Los_Angeles
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 7
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: unifi-security-daily-email
            app.kubernetes.io/part-of: security-monitoring
        spec:
          restartPolicy: Never
          containers:
            - name: reporter
              image: ghcr.io/richrobertson/unifi-security-reporter:0.1.0
              imagePullPolicy: IfNotPresent
              args: ["daily-email"]
              envFrom:
                - configMapRef:
                    name: unifi-security-reporter-config
              env:
                - name: TZ
                  value: US/Pacific
                - name: UNIFI_SSH_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: unifi-security-ssh
                      key: username
                - name: UNIFI_SSH_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: unifi-security-ssh
                      key: password
                - name: SMTP_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: unifi-security-smtp
                      key: relay-username
                - name: SMTP_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: unifi-security-smtp
                      key: relay-password
              resources:
                requests:
                  cpu: 25m
                  memory: 96Mi
                limits:
                  cpu: 500m
                  memory: 384Mi
