# gotify-bridge.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotify-bridge
  namespace: monitoring
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: gotify-bridge
  template:
    metadata:
      labels:
        app: gotify-bridge
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: gotify-bridge
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gotify-bridge
      containers:
      - name: gotify-bridge
        image: druggeri/alertmanager_gotify_bridge@sha256:242441023c6a7956fc7bcdd30350a8fed38f791e703d670aa286fc0465f88b41
        env:
        - name: GOTIFY_ENDPOINT
          value: "https://gotify.myrobertson.com"
        - name: GOTIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: gotify-token
              key: token
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 512Mi
            cpu: "1"
          requests:
            memory: 256Mi
            cpu: "0.2"
---
apiVersion: v1
kind: Service
metadata:
  name: gotify-bridge
  namespace: monitoring
spec:
  selector:
    app: gotify-bridge
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gotify-bridge
  namespace: monitoring
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: gotify-bridge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotify-bridge-flux
  namespace: monitoring
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: gotify-bridge-flux
  template:
    metadata:
      labels:
        app: gotify-bridge-flux
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: gotify-bridge-flux
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gotify-bridge-flux
      containers:
      - name: gotify-bridge
        image: druggeri/alertmanager_gotify_bridge@sha256:242441023c6a7956fc7bcdd30350a8fed38f791e703d670aa286fc0465f88b41
        env:
        - name: GOTIFY_ENDPOINT
          value: "https://gotify.myrobertson.com"
        - name: GOTIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: gotify-token
              key: token
        - name: TITLE_ANNOTATION
          value: "summary"
        - name: MESSAGE_ANNOTATION
          value: "message"
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 512Mi
            cpu: "1"
          requests:
            memory: 256Mi
            cpu: "0.2"
---
apiVersion: v1
kind: Service
metadata:
  name: gotify-bridge-flux
  namespace: monitoring
spec:
  selector:
    app: gotify-bridge-flux
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gotify-bridge-flux
  namespace: monitoring
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: gotify-bridge-flux
