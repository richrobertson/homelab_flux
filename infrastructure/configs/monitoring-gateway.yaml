---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: grafana-gateway
  namespace: istio-ingress
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
    cert-manager.io/common-name: grafana.staging.myrobertson.net
spec:
  gatewayClassName: istio
  listeners:
  - name: grafana-http
    hostname: grafana.staging.myrobertson.net
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: grafana-cert
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grafana-gateway
  namespace: istio-ingress
spec:
  # Match the generated Deployment by reference
  # Note: Do not use `kind: Gateway`.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grafana-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: grafana-gateway
  namespace: istio-ingress
spec:
  minAvailable: 1
  selector:
    # Match the generated Deployment by label
    matchLabels:
      gateway.networking.k8s.io/gateway-name: grafana-gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-http
  namespace: monitoring
spec:
  parentRefs:
  - name: grafana-gateway
    namespace: istio-ingress
  hostnames: ["grafana.staging.myrobertson.net"]
  rules:
  - backendRefs:
    - name: kube-prometheus-stack-grafana
      port: 3000