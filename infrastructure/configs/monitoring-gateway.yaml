---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
    cert-manager.io/common-name: grafana.staging.myrobertson.net
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    hostname: grafana.staging.myrobertson.net
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: grafana-cert
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http
  namespace: monitoring
spec:
  parentRefs:
  - name: gateway
    namespace: monitoring
  hostnames: ["grafana.staging.myrobertson.net"]
  rules:
  - backendRefs:
    - name: kube-prometheus-stack-grafana
      port: 3000