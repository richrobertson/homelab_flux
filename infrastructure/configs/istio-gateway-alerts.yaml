apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: istio-gateway-case-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: istio
    app.kubernetes.io/component: monitoring
spec:
  groups:
    - name: istio-gateway-case-alerts
      rules:
        - alert: IstioGatewayHighTraffic
          expr: sum(rate(istio_requests_total{source_workload="myrobertson-com-gateway-istio",reporter="source"}[5m])) > 500
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: High gateway traffic volume
            description: Gateway traffic is above the configured upper bound of 500 req/s for 10m.

        - alert: IstioGatewayHigh4xxRate
          expr: sum(rate(istio_requests_total{source_workload="myrobertson-com-gateway-istio",reporter="source",response_code=~"4.."}[5m])) > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: High gateway 4xx rate
            description: Gateway 4xx rate is above the upper bound of 5 req/s for 10m.

        - alert: IstioGatewayHigh5xxRateWarning
          expr: sum(rate(istio_requests_total{source_workload="myrobertson-com-gateway-istio",reporter="source",response_code=~"5.."}[5m])) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Elevated gateway 5xx rate
            description: Gateway 5xx rate is above the warning upper bound of 0.5 req/s for 5m.

        - alert: IstioGatewayHigh5xxRateCritical
          expr: sum(rate(istio_requests_total{source_workload="myrobertson-com-gateway-istio",reporter="source",response_code=~"5.."}[5m])) > 2
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Critical gateway 5xx rate
            description: Gateway 5xx rate is above the critical upper bound of 2 req/s for 5m.

        - alert: IstioGatewayHighP95LatencyWarning
          expr: |
            histogram_quantile(0.95,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{source_workload="myrobertson-com-gateway-istio",reporter="source"}[5m])
              )
            ) > 1000
            and
            sum(rate(istio_requests_total{source_workload="myrobertson-com-gateway-istio",reporter="source"}[5m])) > 5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: High gateway p95 latency
            description: Gateway p95 latency is above the warning upper bound of 1000ms for 15m with sustained traffic.

        - alert: IstioGatewayHighP95LatencyCritical
          expr: |
            histogram_quantile(0.95,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{source_workload="myrobertson-com-gateway-istio",reporter="source"}[5m])
              )
            ) > 2000
            and
            sum(rate(istio_requests_total{source_workload="myrobertson-com-gateway-istio",reporter="source"}[5m])) > 5
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: Critical gateway p95 latency
            description: Gateway p95 latency is above the critical upper bound of 2000ms for 15m with sustained traffic.

        - alert: IstioGatewayServiceHigh5xxRate
          expr: sum by (destination_service_name) (rate(istio_requests_total{source_workload="myrobertson-com-gateway-istio",reporter="source",response_code=~"5.."}[5m])) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Service has high 5xx rate
            description: Gateway service {{ $labels.destination_service_name }} is above the upper bound of 1 req/s 5xx for 5m.

        - alert: IstioGatewayServiceHighP95Latency
          expr: |
            histogram_quantile(0.95,
              sum by (le, destination_service_name) (
                rate(istio_request_duration_milliseconds_bucket{source_workload="myrobertson-com-gateway-istio",reporter="source"}[5m])
              )
            ) > 1500
            and
            sum by (destination_service_name) (
              rate(istio_requests_total{source_workload="myrobertson-com-gateway-istio",reporter="source"}[5m])
            ) > 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Service has high p95 latency
            description: Gateway service {{ $labels.destination_service_name }} is above the upper bound of 1500ms p95 for 15m with sustained traffic.
