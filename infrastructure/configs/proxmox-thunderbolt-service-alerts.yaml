apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: proxmox-thunderbolt-service-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: proxmox
    app.kubernetes.io/component: monitoring
spec:
  groups:
    - name: proxmox.thunderbolt-service-traffic
      interval: 30s
      rules:
        - alert: ProxmoxBackupStorageNotUsingThunderbolt
          expr: |
            proxmox_backup_storage_route_up{job="proxmox-node-exporter", expected_network="thunderbolt"} == 0
          for: 10m
          labels:
            domain: proxmox
            severity: warning
          annotations:
            summary: Proxmox backup storage is not routed over Thunderbolt
            description: "{{ $labels.node }} routes backup storage {{ $labels.storage }} ({{ $labels.server }}/{{ $labels.datastore }}) through {{ $labels.route_dev }} instead of en05/en06."

        - alert: ProxmoxBackupTasksFailing
          expr: |
            proxmox_backup_restore_tasks_24h{job="proxmox-node-exporter", operation="backup", status="failed"} > 0
              and on(node)
            (
              proxmox_backup_restore_last_task_timestamp_seconds{job="proxmox-node-exporter", operation="backup", status="failed"}
                > on(node)
              proxmox_backup_restore_last_task_timestamp_seconds{job="proxmox-node-exporter", operation="backup", status="ok"}
              or
              proxmox_backup_restore_last_task_timestamp_seconds{job="proxmox-node-exporter", operation="backup", status="failed"}
                unless on(node)
              proxmox_backup_restore_last_task_timestamp_seconds{job="proxmox-node-exporter", operation="backup", status="ok"}
            )
          for: 15m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: Proxmox backup task failures detected
            description: "{{ $labels.node }} has a failed Proxmox backup task newer than its last successful backup. Check PBS route health and vzdump task logs before running soak or cutover work."

        - alert: ProxmoxBackupSuccessStale
          expr: |
            (time() - max by (node) (proxmox_backup_restore_last_task_timestamp_seconds{job="proxmox-node-exporter", operation="backup", status="ok"})) > 129600
          for: 30m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: Proxmox backup success is stale
            description: "{{ $labels.node }} has not reported a successful Proxmox backup task in more than 36 hours."

        - alert: ProxmoxBackupCompletedWithoutGuestAgentFreeze
          expr: |
            sum by (node) (proxmox_backup_guest_agent_freeze_tasks_24h{job="proxmox-node-exporter", freeze_status="missing"}) > 0
          for: 10m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: Proxmox VM backup completed without guest-agent filesystem freeze
            description: "{{ $labels.node }} has one or more successful QEMU VM backups in the last 24 hours whose task log did not include guest-agent fs-freeze."

        - alert: ProxmoxBackupGuestAgentFreezeFailed
          expr: |
            sum by (node) (proxmox_backup_guest_agent_freeze_tasks_24h{job="proxmox-node-exporter", freeze_status="failed"}) > 0
          for: 10m
          labels:
            domain: backups
            severity: warning
          annotations:
            summary: Proxmox VM backup guest-agent freeze failed
            description: "{{ $labels.node }} has one or more failed QEMU VM backup attempts in the last 24 hours where guest-agent freeze could not be confirmed."

        - alert: ProxmoxCephClusterNetworkNotUsingThunderbolt
          expr: |
            min(proxmox_ceph_network_configured{job="proxmox-node-exporter", network_role="cluster", expected_network="10.0.0.0/24"}) < 1
          for: 10m
          labels:
            domain: ceph
            severity: critical
          annotations:
            summary: Ceph backend cluster network is not on Thunderbolt
            description: One or more Proxmox nodes report Ceph cluster_network is not configured for 10.0.0.0/24.

        - alert: ProxmoxCephOSDBackendNotUsingThunderbolt
          expr: |
            proxmox_ceph_osd_address_on_thunderbolt{job="proxmox-node-exporter", address_role="back"} == 0
          for: 10m
          labels:
            domain: ceph
            severity: critical
          annotations:
            summary: Ceph OSD backend address is not on Thunderbolt
            description: "{{ $labels.node }} osd.{{ $labels.osd }} backend address is {{ $labels.address }}, not a 10.0.0.x Thunderbolt address."
