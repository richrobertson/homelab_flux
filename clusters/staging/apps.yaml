apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infra-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/staging
  prune: true
  wait: true
  timeout: 5m0s
  patches:
    - patch: |
        $patch: delete
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: volsync
      target:
        group: source.toolkit.fluxcd.io
        version: v1
        kind: OCIRepository
        name: volsync
    - patch: |
        $patch: delete
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: volsync
      target:
        group: helm.toolkit.fluxcd.io
        version: v2
        kind: HelmRelease
        name: volsync
    - patch: |
        $patch: delete
        apiVersion: image.toolkit.fluxcd.io/v1beta2
        kind: ImageRepository
        metadata:
          name: immich
      target:
        group: image.toolkit.fluxcd.io
        version: v1beta2
        kind: ImageRepository
        name: immich
    - patch: |
        $patch: delete
        apiVersion: image.toolkit.fluxcd.io/v1beta2
        kind: ImagePolicy
        metadata:
          name: immich
      target:
        group: image.toolkit.fluxcd.io
        version: v1beta2
        kind: ImagePolicy
        name: immich
    - patch: |
        $patch: delete
        apiVersion: image.toolkit.fluxcd.io/v1beta2
        kind: ImageRepository
        metadata:
          name: plex
      target:
        group: image.toolkit.fluxcd.io
        version: v1beta2
        kind: ImageRepository
        name: plex
    - patch: |
        $patch: delete
        apiVersion: image.toolkit.fluxcd.io/v1beta2
        kind: ImagePolicy
        metadata:
          name: plex
      target:
        group: image.toolkit.fluxcd.io
        version: v1beta2
        kind: ImagePolicy
        name: plex
