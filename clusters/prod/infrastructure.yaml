---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-p0
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/p0
  prune: true
  wait: true
  patches:
    - patch: |
        - op: replace
          path: /spec/mount
          value: prod-kubernetes
        - op: replace
          path: /spec/kubernetes/audiences/0
          value: https://cp.prod.myrobertson.net:6443
      target:
        kind: VaultAuth
        name: default
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-p0
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/controllers
  prune: true
  wait: true
  patches:
    - patch: |
        - op: replace
          path: /spec/values/meshConfig/extensionProviders/0/envoyExtAuthzHttp/includeAdditionalHeadersInCheck/X-Authelia-URL
          value: 'https://auth.myrobertson.com'
        - op: replace
          path: /spec/values/meshConfig/extensionProviders/1/envoyExtAuthzHttp/includeAdditionalHeadersInCheck/X-Authelia-URL
          value: 'https://auth.myrobertson.com'
      target:
        kind: HelmRelease
        name: istio-istiod
    - patch: |
        - op: replace
          path: /spec/path
          value: monitoring/gotify/prod
      target:
        kind: VaultStaticSecret
        name: gotify-token
    - patch: |
        - op: replace
          path: /spec/path
          value: synology/prod/csi-client-info
      target:
        kind: VaultStaticSecret
        name: client-info-secret
    - patch: |
        - op: replace
          path: /spec/values/grafana/grafana.ini/server/domain
          value: grafana.prod.myrobertson.net
        - op: replace
          path: /spec/values/grafana/grafana.ini/server/root_url
          value: https://grafana.prod.myrobertson.net/
        - op: replace
          path: /spec/values/grafana/grafana.ini/auth.generic_oauth/client_id
          value: grafana_prod
        - op: replace
          path: /spec/values/grafana/grafana.ini/auth.generic_oauth/auth_url
          value: https://sso.myrobertson.com/realms/homelab/protocol/openid-connect/auth
        - op: replace
          path: /spec/values/grafana/grafana.ini/auth.generic_oauth/token_url
          value: https://sso.myrobertson.com/realms/homelab/protocol/openid-connect/token
        - op: replace
          path: /spec/values/grafana/grafana.ini/auth.generic_oauth/api_url
          value: https://sso.myrobertson.com/realms/homelab/protocol/openid-connect/userinfo
      target:
        kind: HelmRelease
        name: kube-prometheus-stack
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-controllers
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/configs
  prune: true
  patches:
    - patch: |
        - op: replace
          path: /spec/addresses
          value:
            - 10.31.0.64/30
            - 10.31.0.68/32
            - 10.31.0.70/31
            - 10.31.0.72/29
      target:
        kind: IPAddressPool
        name: my-ip-pool
    - patch: |
        - op: replace
          path: /spec/addresses/0
          value: 10.31.0.69/32
      target:
        kind: IPAddressPool
        name: myrobertson-com-gateway-pool
    - patch: |
        - op: replace
          path: /metadata/annotations/cert-manager.io~1common-name
          value: prometheus.prod.myrobertson.net
        - op: replace
          path: /spec/listeners/0/hostname
          value: prometheus.prod.myrobertson.net
        - op: replace
          path: /spec/infrastructure/annotations/external-dns.alpha.kubernetes.io~1hostname
          value: prometheus.prod.myrobertson.net
      target:
        kind: Gateway
        name: prometheus
    - patch: |
        - op: replace
          path: /spec/hostnames/0
          value: prometheus.prod.myrobertson.net
      target:
        kind: HTTPRoute
        name: prometheus
    - patch: |
        - op: replace
          path: /metadata/annotations/cert-manager.io~1common-name
          value: grafana.prod.myrobertson.net
        - op: replace
          path: /spec/listeners/0/hostname
          value: grafana.prod.myrobertson.net
        - op: replace
          path: /spec/infrastructure/annotations/external-dns.alpha.kubernetes.io~1hostname
          value: grafana.prod.myrobertson.net
      target:
        kind: Gateway
        name: grafana
    - patch: |
        - op: replace
          path: /spec/hostnames/0
          value: grafana.prod.myrobertson.net
      target:
        kind: HTTPRoute
        name: grafana
    - patch: |
        - op: replace
          path: /metadata/annotations/cert-manager.io~1common-name
          value: alertmanager.prod.myrobertson.net
        - op: replace
          path: /spec/listeners/0/hostname
          value: alertmanager.prod.myrobertson.net
        - op: add
          path: /spec/addresses
          value:
            - type: IPAddress
              value: 10.31.0.70
        - op: replace
          path: /spec/infrastructure/annotations/external-dns.alpha.kubernetes.io~1hostname
          value: alertmanager.prod.myrobertson.net
      target:
        kind: Gateway
        name: alertmanager
    - patch: |
        - op: replace
          path: /spec/hostnames/0
          value: alertmanager.prod.myrobertson.net
      target:
        kind: HTTPRoute
        name: alertmanager
    - patch: |
        - op: replace
          path: /spec/eventMetadata/env
          value: prod
      target:
        kind: Alert
        name: alertmanager
    - patch: |
        - op: replace
          path: /spec/vault/path
          value: pki_int_prod/sign/cluster_ssl_certs
        - op: replace
          path: /spec/vault/auth/kubernetes/mountPath
          value: /v1/auth/prod-kubernetes
        - op: replace
          path: /spec/vault/auth/kubernetes/serviceAccountRef/audiences/0
          value: https://cp.prod.myrobertson.net:6443
      target:
        kind: ClusterIssuer
        name: vault-issuer
    - patch: |
        - op: replace
          path: /spec/vault/path
          value: pki_int_prod/sign/cluster_ssl_certs
        - op: replace
          path: /spec/vault/auth/kubernetes/mountPath
          value: /v1/auth/prod-kubernetes
        - op: replace 
          path: /spec/vault/auth/kubernetes/serviceAccountRef/audiences/0
          value: https://cp.prod.myrobertson.net:6443
      target:
        kind: Issuer
        name: vault-issuer
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-gateway
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-configs
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/gateway
  prune: true
