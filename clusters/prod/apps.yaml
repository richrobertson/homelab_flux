---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keycloak
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infra-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/prod/keycloak
  prune: true
  wait: true
  timeout: 5m0s
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nextcloud-storage-target
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infra-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/prod/nextcloud-storage-target
  prune: true
  wait: true
  timeout: 5m0s
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infra-gateway
    - name: keycloak
    - name: nextcloud-storage-target
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/prod
  prune: true
  wait: true
  timeout: 5m0s
