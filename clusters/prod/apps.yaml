---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-controller
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infra-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/prod/volsync-controller
  prune: true
  wait: true
  timeout: 5m0s
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-resources
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: volsync-controller
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/prod/volsync-resources
  prune: true
  wait: true
  timeout: 5m0s
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infra-gateway
    - name: volsync-resources
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/prod
  prune: true
  wait: true
  timeout: 5m0s
